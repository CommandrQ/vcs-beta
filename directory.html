<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fort Toward | Hub</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1); 
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        html, body {
            margin: 0; padding: 0; height: 100dvh; width: 100vw;
            overflow: hidden; background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        /* Animated Starfield */
        .universe-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star-layer { position: absolute; inset: -500px; background-image: radial-gradient(2px 2px at 20px 30px, #fff, transparent); background-size: 300px 300px; animation: drift 180s linear infinite; opacity: 0.2; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(500px); } }

        .viewport-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; padding: 15px 15px 50px 15px; box-sizing: border-box;
        }

        /* --- MAIN TERMINAL --- */
        .directory-terminal {
            width: 100%; max-width: 1100px; height: 85vh; display: flex; flex-direction: column;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .terminal-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .greeting-text { color: var(--gold); font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; text-transform: capitalize; }
        .pop-label { color: #fff; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; }
        .pop-count { font-size: 2.2rem; font-weight: 900; margin: 5px 0 0; color: #fff; }

        /* --- CATEGORY NAVIGATION --- */
        .category-menu {
            display: flex; gap: 12px; padding: 15px 20px; overflow-x: auto; white-space: nowrap;
            scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.05); justify-content: flex-start;
        }
        .category-menu::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* --- GRID ENGINE --- */
        .directory-content {
            flex: 1; overflow-y: auto; padding: 30px; display: grid; gap: 20px;
            grid-template-columns: 1fr; justify-items: center; align-content: start;
        }
        @media (min-width: 900px) {
            .directory-content { grid-template-columns: repeat(4, 1fr); max-width: 1000px; margin: 0 auto; }
        }

        /* --- MINI CARDS --- */
        .link-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 25px 20px; width: 100%; max-width: 230px;
            display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.4s var(--v-curve);
        }
        .link-card:hover { border-color: var(--gold); background: rgba(255,255,255,0.08); transform: translateY(-5px); }
        .card-title { font-size: 1rem; font-weight: 900; color: #fff; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 1px; }
        .card-desc { font-size: 0.85rem; color: #fff; line-height: 1.6; margin: 0 0 20px; flex-grow: 1; opacity: 0.9; }
        .card-btn {
            color: var(--gold); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; text-decoration: none; border: 2px solid var(--gold); padding: 8px 24px; border-radius: 30px; transition: 0.3s;
        }
        .card-btn:hover { background: var(--gold); color: #000; }

        /* --- ANIMATED FOOTER --- */
        .vanguard-footer {
            position: fixed; bottom: 0; width: 100%; height: 50px; background: #000;
            border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; z-index: 100; overflow: hidden;
        }
        .footer-container { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; height: 100%; }
        .footer-msg {
            position: absolute; margin: 0; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
            color: var(--gold); font-weight: bold; opacity: 0; clip-path: inset(0 100% 0 0); transition: opacity 1s ease, clip-path 1.2s ease; white-space: nowrap;
        }
        .footer-msg.active { opacity: 1; clip-path: inset(0 0 0 0); }
    </style>
</head>
<body>

    <div class="universe-bg"><div class="star-layer"></div></div>

    <div class="viewport-wrapper">
        <article class="directory-terminal">
            <header class="terminal-header">
                <div id="user-greeting" class="greeting-text">Welcome, Citizen</div>
                <span class="pop-label">Sanctuary Population</span>
                <div id="population-count" class="pop-count">...</div>
            </header>

            <nav class="category-menu" id="category-bar"></nav>

            <div class="directory-content" id="directory-list"></div>
        </article>
    </div>

    <footer class="vanguard-footer">
        <div class="footer-container">
            <p id="footer-msg-1" class="footer-msg active">Powered by Vanguard Citizen Services &copy; <span id="current-year"></span></p>
            <p id="footer-msg-2" class="footer-msg">Empower • Educate • Elevate</p>
        </div>
    </footer>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const directoryData = {
            "Help and Support": [
                { title: "Tech Consulting", desc: "Digital or in-person help understanding and connecting with technology.", url: "vsr/techhelp.html" }
            ],
            "Media Projects": [
                { title: "Coming Soon", desc: "The Vanguard Knights are currently in the archives preparing new media.", url: "#" }
            ],
            "Settings": [
                { title: "Citizen Profile", desc: "Manage your connection and sanctuary preferences here.", url: "settings.html" }
            ]
        };

        const ui = {
            greeting: document.getElementById('user-greeting'),
            pop: document.getElementById('population-count'),
            catBar: document.getElementById('category-bar'),
            dirList: document.getElementById('directory-list')
        };

        async function init() {
            // Check Cache First for Instant UI
            const cached = JSON.parse(localStorage.getItem('vanguard_profile'));
            if (cached && cached.name) {
                ui.greeting.innerText = `Welcome, ${cached.name}`;
            }

            // Sync with Supabase
            checkUser();
            fetchPop();
            renderHub();
            startFooterCycle();
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                const name = user.user_metadata?.full_name || user.email.split('@')[0];
                ui.greeting.innerText = `Welcome, ${name}`;
                // Update Cache silently
                const currentCache = JSON.parse(localStorage.getItem('vanguard_profile')) || {};
                localStorage.setItem('vanguard_profile', JSON.stringify({...currentCache, name: name, email: user.email}));
            } else {
                ui.greeting.innerText = "Welcome, Citizen";
                localStorage.removeItem('vanguard_profile');
            }
        }

        async function fetchPop() {
            const { count, error } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
            ui.pop.innerText = error ? "Online" : count.toLocaleString();
        }

        function renderHub() {
            const categories = Object.keys(directoryData);
            ui.catBar.innerHTML = categories.map((cat, i) => `
                <button class="cat-btn ${i === 0 ? 'active' : ''}" onclick="showCat('${cat}', this)">${cat}</button>
            `).join('');
            showCat(categories[0], ui.catBar.querySelector('.cat-btn'));
        }

        window.showCat = (name, btn) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            ui.dirList.innerHTML = directoryData[name].map(card => `
                <div class="link-card">
                    <h3 class="card-title">${card.title}</h3>
                    <p class="card-desc">${card.desc}</p>
                    <a href="${card.url}" class="card-btn">Open</a>
                </div>
            `).join('');
        }

        function startFooterCycle() {
            const msg1 = document.getElementById('footer-msg-1');
            const msg2 = document.getElementById('footer-msg-2');
            document.getElementById('current-year').innerText = new Date().getFullYear();

            setInterval(() => {
                if (msg1.classList.contains('active')) {
                    msg1.classList.remove('active');
                    setTimeout(() => msg2.classList.add('active'), 100); 
                } else {
                    msg2.classList.remove('active');
                    setTimeout(() => msg1.classList.add('active'), 100);
                }
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
