<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Knights | The Grand Citadel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="flash-overlay" class="flash-active"></div>
    <div id="wipe-overlay"></div>
    <div id="hub-background"></div>

    <main class="fullscreen-flex">
        
        <header class="main-header centered-flex-col">
            <h1 class="cinzel-heading relic-gold-text centered-text">Welcome to The Vanguard Citadel</h1>
            <div class="os-status-container">
                <p class="iron-mist-text">Vanguard OS Active</p>
                <div class="status-dot"></div>
            </div>
        </header>

        <div class="vertical-spacer"></div>

        <section class="mirrorgates-viewport">
            
            <div class="floating-controls">
                <button id="btn-prev-hub" class="rpg-box hover-glow">PREVIOUS</button>
                <button id="btn-next-hub" class="rpg-box hover-glow">NEXT</button>
            </div>

            <div id="carousel-track" class="carousel-track">
                <div class="mirrorgate-node rpg-box" data-destination="mission.html">
                    <div class="gate-image-container">
                        <img src="https://via.placeholder.com/200x150/0D0D0D/D4AF37?text=MISSION" alt="Mission">
                    </div>
                    <h2 class="cinzel-heading starlight-text">The Mission</h2>
                </div>
                <div class="mirrorgate-node rpg-box" data-destination="roster.html">
                    <div class="gate-image-container">
                        <img src="https://via.placeholder.com/200x150/0D0D0D/D4AF37?text=ROSTER" alt="Roster">
                    </div>
                    <h2 class="cinzel-heading starlight-text">The Roster</h2>
                </div>
                <div class="mirrorgate-node rpg-box" data-destination="skyfox.html">
                    <div class="gate-image-container">
                        <img src="https://via.placeholder.com/200x150/0D0D0D/D4AF37?text=SKY+FOX" alt="Sky Fox">
                    </div>
                    <h2 class="cinzel-heading starlight-text">The Sky Fox</h2>
                </div>
                <div class="mirrorgate-node rpg-box" data-destination="support.html">
                    <div class="gate-image-container">
                        <img src="https://via.placeholder.com/200x150/0D0D0D/D4AF37?text=SUPPORT" alt="Support">
                    </div>
                    <h2 class="cinzel-heading starlight-text">Stand With Us</h2>
                </div>
            </div>
        </section>

        <footer class="centered-footer">
            <button id="btn-enter-hub" class="rpg-box hover-glow pulse-border">ACCESS MIRRORGATE</button>
        </footer>
    </main>

    <script src="js/hub.js"></script>
</body>
</html>
