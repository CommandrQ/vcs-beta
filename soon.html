<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS | Access Restricted</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --vcs-gold: #D4AF37;
            --vcs-purple: #BF94FF;
            --vcs-red: #ff4757; /* Added for security alert vibe */
            --text-main: #F5F5F7;
            --text-dim: rgba(245, 245, 247, 0.5);
            --glass-bg: rgba(10, 10, 10, 0.6); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: #000000;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: grid;
            place-items: center; 
        }

        /* --- 1. BLACKOUT SCREEN --- */
        #blackout-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000;
            z-index: 9999;
            pointer-events: none; 
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blackout-active {
            opacity: 1 !important;
            pointer-events: all !important;
        }

        /* --- 2. AMBIENT BACKGROUND GLOW --- */
        .ambient-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- 3. GOLDEN GLOWING PILL NAVIGATION --- */
        .nav-bar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 30px 5vw;
            z-index: 100;
            display: flex;
            justify-content: flex-start;
        }

        .return-btn {
            color: var(--vcs-gold);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px;
            border: 1px solid rgba(212, 175, 55, 0.3); 
            border-radius: 50px; 
            
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }

        .return-btn:hover {
            color: #FFFFFF;
            background: rgba(0, 0, 0, 0.9); 
            border-color: var(--vcs-gold); 
            text-shadow: 0 0 15px var(--vcs-gold), 0 0 30px var(--vcs-gold);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); 
        }

        /* --- 4. CENTERED ALERT PANEL --- */
        .glass-panel {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 2px solid var(--vcs-gold); 
            border-radius: 8px;
            padding: 60px 40px;
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }

        .glass-panel.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* --- 5. INTERACTIVE LOCK ICON --- */
        .lock-icon {
            width: 60px;
            height: 60px;
            fill: var(--vcs-gold);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
            cursor: pointer; /* Lets the user know they can click it */
            transition: fill 0.3s ease;
        }

        /* Normal subtle pulsing */
        .pulse-active {
            animation: pulseIcon 3s infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8)); }
        }

        /* Aggressive shake when clicked */
        .shake-active {
            animation: shakeLock 0.4s ease-in-out !important;
            fill: var(--vcs-red) !important; /* Flashes red when shaken */
            filter: drop-shadow(0 0 20px rgba(255, 71, 87, 0.8)) !important;
        }

        @keyframes shakeLock {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-8px) rotate(-10deg); }
            40% { transform: translateX(8px) rotate(10deg); }
            60% { transform: translateX(-8px) rotate(-10deg); }
            80% { transform: translateX(8px) rotate(10deg); }
        }

        /* --- 6. TYPOGRAPHY --- */
        .page-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 3vw, 2.5rem);
            color: var(--text-main); 
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .content-block {
            font-family: 'Inter', monospace; 
            font-size: 0.85rem;
            line-height: 1.8;
            color: var(--text-dim); 
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .highlight {
            color: var(--vcs-gold);
            font-weight: 600;
        }

        /* --- 7. MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .glass-panel { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div id="blackout-screen" class="blackout-active"></div>

    <div class="ambient-glow"></div>

    <nav class="nav-bar">
        <a href="table.html" class="return-btn" id="exit-btn">
            <span>&#8592;</span> Return
        </a>
    </nav>

    <article class="glass-panel" id="alert-panel">
        
        <svg viewBox="0 0 24 24" class="lock-icon pulse-active" id="security-lock">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
        </svg>

        <h1 class="page-title">Sector Locked</h1>

        <p class="content-block">
            Status: <span class="highlight">In Development</span><br><br>
            The Vanguard Knights are currently operating in the shadows. <br>This sector of the terminal is being actively forged and will be deployed soon.
        </p>

    </article>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const blackoutScreen = document.getElementById('blackout-screen');
            const exitBtn = document.getElementById('exit-btn');
            const alertPanel = document.getElementById('alert-panel');
            const securityLock = document.getElementById('security-lock');

            // 1. FAST CINEMATIC ENTRANCE
            setTimeout(() => {
                blackoutScreen.classList.remove('blackout-active');
                
                setTimeout(() => {
                    alertPanel.classList.add('visible');
                }, 200);
            }, 50);

            // 2. NORMAL EXIT PROTOCOL
            function forceExit() {
                blackoutScreen.classList.add('blackout-active');
                setTimeout(() => {
                    window.location.href = 'table.html';
                }, 600);
            }

            exitBtn.addEventListener('click', function(e) {
                e.preventDefault(); 
                forceExit();
            });

            // 3. INTERACTIVE LOCK SECURITY LOGIC
            let clickAttempts = 0;

            securityLock.addEventListener('click', () => {
                clickAttempts++;

                // Stop the idle pulse and trigger the aggressive shake
                securityLock.classList.remove('pulse-active');
                
                // This trick forces the browser to restart the CSS animation if clicked rapidly
                void securityLock.offsetWidth; 
                
                securityLock.classList.add('shake-active');

                // After 3 strikes, kick them out
                if (clickAttempts >= 3) {
                    setTimeout(() => {
                        forceExit();
                    }, 400); // Wait just a moment for the final shake to register before kicking
                } else {
                    // If less than 3, remove shake after 400ms and resume idle pulsing
                    setTimeout(() => {
                        securityLock.classList.remove('shake-active');
                        securityLock.classList.add('pulse-active');
                    }, 400);
                }
            });
        });
    </script>
</body>
</html>
