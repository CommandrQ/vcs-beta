<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Under Maintenance</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .center-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .time-display {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #f5c518;
        }
    </style>
</head>
<body>

    <main class="center-screen">
        <div class="glass-panel">
            <h1>Website Under Maintenance</h1>
            <p>We are currently updating our platform to serve you better.</p>
            <div class="time-display" id="date-time"></div>
        </div>
    </main>

    <script src="../canvas.js"></script>
    <script>
        // Display Current Date and Time
        const now = new Date();
        const options = { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        };
        document.getElementById('date-time').textContent = now.toLocaleDateString(undefined, options);
    </script>
</body>
</html>
