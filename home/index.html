<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commander Q // Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        /* --- MODAL POP-UP (OVERLAY & WINDOW) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 999; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
            padding: 20px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-window {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.05);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            position: relative;
            text-align: center;
        }
        .modal-overlay.active .modal-window { transform: scale(1); }

        .btn-close {
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.05);
            border: none; color: rgba(255,255,255,0.7); width: 36px; height: 36px; border-radius: 50%;
            font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: all 0.2s ease;
        }
        .btn-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        /* Ensures the new button matches link button styles perfectly */
        button.btn {
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <div class="hub-container">
        <h1 class="hub-title">Commander Q</h1>

        <main class="hub-card">
            
            <div class="profile-container">
                <img src="../images/headshot.jpg" alt="Commander Q Profile">
            </div>

            <div class="social-matrix">
                <a href="https://music.apple.com/profile/cmdrq_music" target="_blank" class="social-glyph" title="Apple Music"><i class="fa-brands fa-apple"></i></a>
                <a href="https://www.tiktok.com/@commandr_q" target="_blank" class="social-glyph" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            </div>

            <h2>Navigation Menu</h2>
            <div class="menu-grid">
                <!-- Trigger for Our Projects Modal -->
                <div class="btn-wrapper">
                    <button class="btn" onclick="toggleProjectsModal(true)">Our Projects</button>
                </div>
                <div class="btn-wrapper">
                    <a href="../about/index.html" class="btn">About Me</a>
                </div>
                <div class="btn-wrapper">
                    <a href="../dreamscapedrift/index.html" class="btn">Dreamscape Drift</a>
                </div>
                <div class="btn-wrapper">
                    <a href="../musicplayer/index.html" class="btn">Music Player</a>
                </div>
            </div>

            <div style="text-align: center; margin-top: 35px;">
                <a href="../index.html" class="hub-return-link">← Return To Main Hub</a>
            </div>
        </main>
    </div>

    <!-- MODAL OVERLAY FOR "OUR PROJECTS" -->
    <div id="projects-modal" class="modal-overlay" onclick="if(event.target === this) toggleProjectsModal(false)">
        <div class="modal-window">
            <button class="btn-close" onclick="toggleProjectsModal(false)">✕</button>
            
            <h2 style="margin-top: 0; color: #ffffff; text-transform: uppercase; letter-spacing: 2px;">Our Projects</h2>
            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-bottom: 10px;">Select an active project module below.</p>
            
            <div class="project-list">
                <!-- Link points to your newly moved root-level Community Voice Box folder -->
                <a href="../communityvoicebox/index.html" class="btn">Community Voice Box</a>
            </div>
        </div>
    </div>

    <footer class="system-footer">
        &copy; <span id="current-year"></span> Vanguard Citizen Services
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const yearSpan = document.getElementById('current-year');
            if (yearSpan) {
                yearSpan.innerText = new Date().getFullYear();
            }
        });

        /* --- MODAL TOGGLE LOGIC --- */
        function toggleProjectsModal(open) {
            const modal = document.getElementById('projects-modal');
            if (open) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; // Stop background from scrolling
            } else {
                modal.classList.remove('active');
                document.body.style.overflow = ''; // Restore scrolling
            }
        }
    </script>
</body>
</html>
