<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Fort Toward</title>
    
    <style>
        :root {
            --gold: #D4AF37;
            --glass-bg: rgba(10, 10, 10, 0.85);
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- BACKGROUND --- */
        #vanguard-universe {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .gold-star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, rgba(212, 175, 55, 0.8), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, rgba(255, 255, 255, 0.5), rgba(0,0,0,0));
            background-size: 300px 300px;
            animation: drift 120s linear infinite;
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- HEADER & LOGO --- */
        .header-content {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 1s var(--v-curve);
        }

        .presents {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .fort-toward {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--gold);
            animation: pulse-gold 3s ease-in-out infinite;
        }

        .logo-container img {
            width: 180px;
            height: auto;
            margin: 20px 0;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        /* --- ENTER BUTTON (GOLD FILL) --- */
        .enter-btn {
            position: relative;
            padding: 18px 60px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 4px;
            cursor: pointer;
            overflow: hidden;
            transition: color 0.4s var(--v-curve);
            text-decoration: none;
            display: inline-block;
            z-index: 1;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: var(--gold);
            z-index: -1;
            transition: width 0.4s var(--v-curve);
        }

        .enter-btn:hover {
            color: #000;
        }

        .enter-btn:hover::before {
            width: 100%;
        }

        /* --- FOOTER --- */
        .footer-tag {
            position: fixed;
            bottom: 40px;
            font-size: 0.7rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: pulse-white 2.5s ease-in-out infinite;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse-gold {
            0%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 5px var(--gold)); }
            50% { opacity: 0.8; transform: scale(1.02); filter: drop-shadow(0 0 20px var(--gold)); }
        }

        @keyframes pulse-white {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 480px) {
            .fort-toward { font-size: 1.8rem; letter-spacing: 4px; }
            .logo-container img { width: 140px; }
        }
    </style>
</head>
<body>

    <div id="vanguard-universe">
        <div class="gold-star-layer"></div>
    </div>

    <div class="header-content">
        <p class="presents">Vanguard Citizen Services Presents</p>
        <h1 class="fort-toward">Fort Toward</h1>
    </div>

    <div class="logo-container">
        <img src="images/vanguardordlogo.png" alt="Vanguard Logo">
    </div>

    <div style="margin-top: 30px;">
        <a href="hub.html" class="enter-btn">Enter</a>
    </div>

    <div class="footer-tag">
        Vanguard Citizen Services &copy; <span id="year"></span>
    </div>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
