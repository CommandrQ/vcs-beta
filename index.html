<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vanguard | Choose Your Path</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vcs-wordmark">VCS</div>
    
    <main class="split-container">
        <section class="side shield">
            <div class="glass-card">
                <img src="assets/images/shield-icon.png" alt="Shield" class="emblem">
                <h1>THE SHIELD</h1>
                <p class="subtitle">VANGUARD CITIZEN SERVICES</p>
                <ul class="features">
                    <li>Civilian Protection</li>
                    <li>Resource Management</li>
                    <li>Community Support</li>
                </ul>
                <a href="./vcs/index.html" class="btn">ENTER VCS</a>
            </div>
        </section>

        <section class="side sword">
            <div class="glass-card">
                <img src="assets/images/sword-icon.png" alt="Sword" class="emblem">
                <h1>THE SWORD</h1>
                <p class="subtitle">VANGUARD KNIGHTS</p>
                <ul class="features">
                    <li>Elite Tactical Ops</li>
                    <li>Strategic Defense</li>
                    <li>Combat Readiness</li>
                </ul>
                <a href="./knights/index.html" class="btn">ENTER KNIGHTS</a>
            </div>
        </section>

</html>
