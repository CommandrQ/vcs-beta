<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Services | Empower. Educate. Elevate.</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --dark-glass: rgba(10, 10, 10, 0.85);
            --border-gold: rgba(212, 175, 55, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden; /* Prevents scrolling since content is now one screen */
        }

        /* --- STARFIELD ENGINE --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
        }

        .star-layer {
            position: absolute;
            top: -100%; left: 0; width: 200%; height: 200%;
            background-repeat: repeat;
            animation: move-stars linear infinite;
        }

        .layer-1 { background-image: radial-gradient(1px 1px at 10% 10%, #fff, transparent), radial-gradient(1px 1px at 50% 50%, #fff, transparent); background-size: 300px 300px; animation-duration: 120s; opacity: 0.3; }
        .layer-2 { background-image: radial-gradient(2px 2px at 20% 80%, #fff, transparent), radial-gradient(2px 2px at 80% 10%, var(--gold), transparent); background-size: 400px 400px; animation-duration: 80s; opacity: 0.5; }
        .layer-3 { background-image: radial-gradient(4px 4px at 40% 40%, #fff, transparent), radial-gradient(5px 5px at 10% 90%, #fff, transparent); background-size: 600px 600px; animation-duration: 40s; opacity: 0.7; }

        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(50%); } }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: center;
            padding: 25px;
            background: rgba(0,0,0,0.85);
            border-bottom: 1px solid var(--border-gold);
            z-index: 1000;
            backdrop-filter: blur(15px);
        }

        nav ul { display: flex; list-style: none; gap: 50px; }
        nav ul li a {
            text-decoration: none; color: var(--gold);
            font-family: 'Cinzel', serif; font-weight: bold;
            font-size: 0.9rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.4s;
        }
        nav ul li a:hover { color: white; text-shadow: 0 0 15px var(--gold); }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-logo { 
            width: 320px; /* Made slightly larger for the single-page focus */
            margin-bottom: 40px; 
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4)); 
        }

        .slogan { 
            font-family: 'Cinzel', serif; 
            font-size: 2.2rem; 
            letter-spacing: 10px; 
            color: white; 
            animation: pulse-glow 3.5s infinite ease-in-out; 
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 10px var(--gold-glow); opacity: 0.7; }
            50% { text-shadow: 0 0 30px var(--gold), 0 0 50px var(--gold); opacity: 1; }
        }

        /* --- PERSISTENT FOOTER --- */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 0;
            text-align: center;
            background: linear-gradient(to top, rgba(0,0,0,1), transparent);
            z-index: 1000;
        }

        .legal-links { margin-bottom: 10px; }
        .legal-links a {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            margin: 0 20px;
            font-weight: 400;
            letter-spacing: 1.5px;
            transition: 0.3s;
        }
        .legal-links a:hover { color: var(--gold); }

        .copyright {
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="star-layer layer-1"></div>
        <div class="star-layer layer-2"></div>
        <div class="star-layer layer-3"></div>
    </div>

    <nav>
        <ul id="main-nav">
            </ul>
    </nav>

    <header class="hero">
        <img src="images/vanguardorglogo.png" alt="Vanguard Knights Logo" class="hero-logo">
        <div class="slogan">Empower. Educate. Elevate.</div>
    </header>

    <footer>
        <div class="legal-links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Use</a>
        </div>
        <div class="copyright">
            Vanguard Citizen Services &copy; 2026. All Rights Reserved.
        </div>
    </footer>

    <script>
        async function loadNavigation() {
            const navContainer = document.getElementById('main-nav');
            try {
                const response = await fetch('json/nav.json');
                const navData = await response.json();
                navContainer.innerHTML = '';
                navData.forEach(item => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = item.link;
                    a.textContent = item.name;
                    li.appendChild(a);
                    navContainer.appendChild(li);
                });
            } catch (error) {
                console.error('Nav Load Error:', error);
                // Updated Fallback with About Us first
                navContainer.innerHTML = `
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="story.html">Our Story</a></li>
                    <li><a href="team.html">Our Team</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                `;
            }
        }
        window.onload = loadNavigation;
    </script>

</body>
</html>
