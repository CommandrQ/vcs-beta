<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citadel | Digital Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-obsidian: #0D0D0D;
            --deep-shadow: #050505;
            --relic-gold: #D4AF37;
            --aura-purple: #BF94FF;
            --success-green: #00FF41;
            --starlight-white: #F5F5F7;
            --iron-mist: #86868B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--deep-shadow);
            font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--starlight-white);
        }

        /* User Background Image */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/introbkgd.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: brightness(0.4) contrast(1.2);
            transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1), filter 1s ease;
        }

        /* Tron-style Digital Scanlines & Grid */
        .digital-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(191, 148, 255, 0.03), rgba(191, 148, 255, 0) 1px),
                linear-gradient(rgba(191, 148, 255, 0.03), rgba(191, 148, 255, 0) 1px);
            background-size: 100% 4px, 40px 40px, 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* Terminal Boot Sequence */
        #boot-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            z-index: 10;
            font-family: monospace;
            color: var(--success-green);
            text-shadow: 0 0 5px var(--success-green);
            font-size: clamp(0.9rem, 3vw, 1.2rem); 
            line-height: 1.8;
            opacity: 1;
            transition: opacity 0.5s ease;
            text-align: center; /* Centered the intro text */
        }

        .terminal-line {
            display: block;
            min-height: 1.8em;
            word-wrap: break-word;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--success-green);
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Main Welcome UI */
        #main-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            padding: 20px;
        }

        #main-ui.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .citadel-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem); 
            color: var(--relic-gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 40px rgba(212, 175, 55, 0.2);
            letter-spacing: clamp(2px, 2vw, 5px);
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .citadel-subtitle {
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: var(--aura-purple);
            letter-spacing: clamp(4px, 2vw, 10px);
            text-transform: uppercase;
            margin-bottom: 50px;
            text-align: center;
            text-shadow: 0 0 10px var(--aura-purple);
        }

        /* Digital Button */
        .cyber-btn {
            background: transparent;
            border: 2px solid var(--aura-purple);
            color: var(--starlight-white);
            padding: clamp(10px, 3vw, 15px) clamp(30px, 8vw, 50px);
            font-family: 'SF Pro', sans-serif;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(191, 148, 255, 0.2) inset, 0 0 15px rgba(191, 148, 255, 0.2);
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(191, 148, 255, 0.4), transparent);
            transition: all 0.5s ease;
        }

        .cyber-btn:hover {
            background: rgba(191, 148, 255, 0.1);
            border-color: var(--success-green);
            color: var(--success-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4) inset, 0 0 20px rgba(0, 255, 65, 0.4);
        }

        .cyber-btn:hover::before {
            left: 100%;
        }

        /* Fast White Transition Overlay */
        #warp-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--starlight-white);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in; 
        }

        .warp-active .bg-layer {
            transform: scale(3);
            filter: brightness(3) blur(15px);
        }
    </style>
</head>
<body>

    <div class="bg-layer" id="bg"></div>
    <div class="digital-overlay"></div>
    <div id="warp-overlay"></div>

    <div id="boot-screen">
        </div>

    <div id="main-ui">
        <h1 class="citadel-title">The Grand Citadel</h1>
        <h2 class="citadel-subtitle">Headquarters Online</h2>
        <button class="cyber-btn" id="enter-btn">Initialize Link</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const bootScreen = document.getElementById('boot-screen');
            const mainUI = document.getElementById('main-ui');
            const enterBtn = document.getElementById('enter-btn');
            const body = document.body;
            const warpOverlay = document.getElementById('warp-overlay');

            // Boot Sequence Data
            const terminalData = [
                { text: "INITIALIZING VANGUARD_OS v3.1... ", status: "[ WAIT ]", color: "var(--relic-gold)" },
                { text: "ESTABLISHING SECURE CONNECTION... ", status: "[ OK ]", color: "var(--success-green)" },
                { text: "BYPASSING EXTERNAL FIREWALLS... ", status: "[ OK ]", color: "var(--success-green)" },
                { text: "DECRYPTING CITADEL PROTOCOLS... ", status: "[ OK ]", color: "var(--success-green)" },
                { text: "WELCOME, CITIZEN.", status: "", color: "var(--starlight-white)", specialClass: "welcome-text" }
            ];

            let lineIndex = 0;
            let charIndex = 0;
            const typeSpeed = 30; // ms per character
            const lineDelay = 400; // ms between lines

            // Function to handle the typing effect
            function typeLine() {
                if (lineIndex >= terminalData.length) {
                    finishBootSequence();
                    return;
                }

                const currentData = terminalData[lineIndex];
                
                if (charIndex === 0) {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'terminal-line';
                    lineDiv.id = `line-${lineIndex}`;
                    if(currentData.specialClass) {
                        lineDiv.style.color = currentData.color;
                        lineDiv.style.marginTop = "20px";
                    }
                    
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    cursor.id = 'active-cursor';
                    
                    lineDiv.appendChild(cursor);
                    bootScreen.appendChild(lineDiv);
                }

                const currentLineDiv = document.getElementById(`line-${lineIndex}`);
                const cursor = document.getElementById('active-cursor');

                if (charIndex < currentData.text.length) {
                    const charNode = document.createTextNode(currentData.text.charAt(charIndex));
                    currentLineDiv.insertBefore(charNode, cursor);
                    charIndex++;
                    setTimeout(typeLine, typeSpeed);
                } else {
                    if (currentData.status) {
                        const statusSpan = document.createElement('span');
                        statusSpan.style.color = currentData.color;
                        statusSpan.textContent = currentData.status;
                        currentLineDiv.insertBefore(statusSpan, cursor);
                    }
                    
                    cursor.remove();
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeLine, lineDelay);
                }
            }

            // Start typing sequence
            setTimeout(typeLine, 500);

            function finishBootSequence() {
                setTimeout(() => {
                    bootScreen.style.opacity = '0';
                    setTimeout(() => {
                        bootScreen.style.display = 'none';
                        mainUI.classList.add('active');
                    }, 500);
                }, 1000); 
            }

            // Quick White Fade & Redirect
            enterBtn.addEventListener('click', () => {
                body.classList.add('warp-active');
                warpOverlay.style.opacity = '1';

                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 600); 
            });
        });
    </script>
</body>
</html>
