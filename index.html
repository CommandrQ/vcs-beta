<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Citadel | Musubi</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* Global Reset & Base Styling */
    body, html {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Orbitron', sans-serif;
      background-color: #000000;
      overflow: hidden; 
      color: #00ffff;
    }

    /* --- TITLE SCREEN --- */
    #title-screen {
      height: 100vh; width: 100vw;
      background-image: url('images/introbkgd.png');
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
      position: absolute; top: 0; left: 0;
      z-index: 10;
    }
    #title-screen::before {
      content: ""; position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
    }
    .title-container { position: relative; z-index: 1; text-align: center; color: #ffffff; padding: 20px; }
    .company-name { font-size: clamp(0.8rem, 3vw, 1.2rem); letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase; color: #a0a0a0; }
    .game-title {
      font-size: clamp(2.5rem, 8vw, 6rem); margin: 0; letter-spacing: 6px; color: #ffffff;
      animation: powerPulse 3s infinite alternate; 
    }
    @keyframes powerPulse {
      0% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff; transform: scale(1); }
      100% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #00ffff; transform: scale(1.02); }
    }
    .location-text { font-size: clamp(1rem, 4vw, 1.5rem); color: #ff0055; letter-spacing: 3px; margin-top: 15px; margin-bottom: 5vh; text-shadow: 0 0 10px #ff0055; }
    #start-button {
      padding: 15px 40px; font-size: clamp(1rem, 3vw, 1.5rem); font-family: 'Orbitron', sans-serif;
      background: rgba(0, 255, 255, 0.05); color: #00ffff; border: 2px solid #00ffff;
      box-shadow: 0 0 10px #00ffff inset, 0 0 10px #00ffff; cursor: pointer; text-transform: uppercase;
      transition: all 0.3s ease; animation: pulseBtn 2s infinite; 
    }
    #start-button:hover { background: #00ffff; color: #000000; box-shadow: 0 0 20px #00ffff inset, 0 0 30px #00ffff; }
    @keyframes pulseBtn { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* --- WIPE TRANSITION & LOADING --- */
    #wipe-curtain {
      position: absolute; top: -100vh; left: 0; width: 100vw; height: 100vh;
      background-color: #000000; z-index: 20;
      transition: top 1s cubic-bezier(0.85, 0, 0.15, 1); /* Smooth cinematic drop */
      display: flex; align-items: center; justify-content: center;
    }
    #loading-text { font-size: 2rem; opacity: 0; transition: opacity 0.5s; text-shadow: 0 0 10px #00ffff; }

    /* --- TERMINAL WORLD --- */
    #terminal-world {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #000; z-index: 5; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      padding: 20px; box-sizing: border-box;
    }
    .terminal-line { font-size: clamp(1.2rem, 4vw, 2.5rem); text-shadow: 0 0 10px #00ffff; text-align: center; }
    .cursor::after { content: '█'; animation: blinkCursor 1s infinite; }
    @keyframes blinkCursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- INPUT FIELD --- */
    #hero-input-container { display: none; margin-top: 20px; opacity: 0; transition: opacity 1s; }
    #hero-name {
      background: transparent; border: none; border-bottom: 2px solid #00ffff;
      color: #00ffff; font-family: 'Orbitron', sans-serif; font-size: 1.5rem;
      text-align: center; padding: 5px; outline: none; width: 250px;
      text-shadow: 0 0 10px #00ffff; text-transform: uppercase;
    }
    #hero-name::placeholder { color: rgba(0, 255, 255, 0.3); }

    /* --- MODALS --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.85); z-index: 50;
      display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
    }
    .modal-box {
      background: #050505; border: 2px solid #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      padding: 30px; text-align: center; max-width: 500px; width: 90%; border-radius: 5px;
    }
    .modal-link { color: #ff0055; cursor: pointer; text-decoration: underline; text-shadow: 0 0 5px #ff0055; transition: color 0.3s; }
    .modal-link:hover { color: #ffffff; }
    .btn-container { margin-top: 30px; display: flex; justify-content: space-around; }
    .action-btn {
      padding: 10px 20px; font-family: 'Orbitron', sans-serif; cursor: pointer;
      background: transparent; border: 1px solid #00ffff; color: #00ffff; transition: all 0.3s;
    }
    .action-btn:hover { background: #00ffff; color: #000; }
    .decline-btn { border-color: #ff0055; color: #ff0055; }
    .decline-btn:hover { background: #ff0055; color: #000; }

    /* Secondary Modal for actual text */
    #doc-modal-box { position: relative; max-height: 70vh; overflow-y: auto; text-align: left; font-size: 0.9rem; line-height: 1.5; }
    #close-doc-btn {
      position: absolute; top: 10px; right: 15px; color: #ff0055;
      font-size: 1.5rem; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="title-screen">
    <div class="title-container">
      <h2 class="company-name">Vanguard Citizen Services</h2>
      <h1 class="game-title">WELCOME TO MUSUBI</h1>
      <h3 class="location-text">/// DESTINATION: THE CITADEL ///</h3>
      <button id="start-button">PRESS START</button>
    </div>
  </div>

  <div id="wipe-curtain">
    <div id="loading-text">LOADING... 0%</div>
  </div>

  <div id="terminal-world">
    <div class="terminal-line" id="typing-output1"></div>
    <div id="hero-input-container">
      <input type="text" id="hero-name" placeholder="Enter Hero Name" autocomplete="off" autofocus>
    </div>
    <div class="terminal-line" id="typing-output2" style="margin-top: 20px; color: #ff0055; font-size: 1.2rem;"></div>
  </div>

  <div class="modal-overlay" id="agreement-modal">
    <div class="modal-box">
      <h2 style="margin-top: 0;">LINK INITIALIZATION</h2>
      <p>Hero <span id="display-hero-name" style="color: #fff;"></span>, to proceed into Musubi, you must accept our 
        <span class="modal-link" onclick="openDoc('terms')">Terms of Use</span> and 
        <span class="modal-link" onclick="openDoc('privacy')">Privacy Policy</span>.
      </p>
      <div class="btn-container">
        <button class="action-btn decline-btn" id="decline-btn">DECLINE</button>
        <button class="action-btn" id="accept-btn">ACCEPT</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="doc-modal">
    <div class="modal-box" id="doc-modal-box">
      <div id="close-doc-btn" onclick="closeDoc()">X</div>
      <h2 id="doc-title" style="margin-top: 0;">Document</h2>
      <div id="doc-content" style="color: #a0a0a0; padding-right: 10px;">
        </div>
    </div>
  </div>

  <script>
    /* UI ELEMENTS */
    const startBtn = document.getElementById('start-button');
    const wipeCurtain = document.getElementById('wipe-curtain');
    const loadingText = document.getElementById('loading-text');
    const titleScreen = document.getElementById('title-screen');
    const typingOutput1 = document.getElementById('typing-output1');
    const heroInputContainer = document.getElementById('hero-input-container');
    const heroInput = document.getElementById('hero-name');
    const agreementModal = document.getElementById('agreement-modal');
    const docModal = document.getElementById('doc-modal');
    const docTitle = document.getElementById('doc-title');
    const docContent = document.getElementById('doc-content');
    const typingOutput2 = document.getElementById('typing-output2');

    let heroNameStr = "";

    /* --- STEP 1: PRESS START & WIPE DOWN --- */
    startBtn.addEventListener('click', () => {
      // Bring down the curtain
      wipeCurtain.style.top = '0';
      
      setTimeout(() => {
        // Hide title screen entirely behind the curtain
        titleScreen.style.display = 'none';
        
        // Show loading text
        loadingText.style.opacity = '1';
        
        // Start counter
        let progress = 0;
        let loadInterval = setInterval(() => {
          progress += Math.floor(Math.random() * 15) + 5; // Random jumps
          if (progress >= 100) {
            progress = 100;
            clearInterval(loadInterval);
            loadingText.innerText = `LOADING... 100%`;
            
            // --- STEP 2: FADE BLACK & AWAKEN ---
            setTimeout(() => {
              loadingText.style.opacity = '0'; // Fade out text
              
              setTimeout(() => {
                wipeCurtain.style.display = 'none'; // Remove curtain, revealing pure black terminal world
                
                // Type the question
                typeString(typingOutput1, "hey, you awake?", () => {
                  typingOutput1.classList.remove('cursor'); // Remove cursor from first line
                  
                  // Show Input
                  setTimeout(() => {
                    heroInputContainer.style.display = 'block';
                    setTimeout(() => {
                      heroInputContainer.style.opacity = '1';
                      heroInput.focus();
                    }, 50);
                  }, 500);
                });

              }, 2000); // Wait 2 seconds in black before typing
            }, 500); // Short delay at 100%
          } else {
            loadingText.innerText = `LOADING... ${progress}%`;
          }
        }, 150); // Tick speed
      }, 1000); // Time it takes for curtain to fall
    });

    /* --- STEP 3: SUBMIT HERO NAME --- */
    heroInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        if(this.value.trim() !== "") {
          heroNameStr = this.value.trim().toUpperCase();
          document.getElementById('display-hero-name').innerText = heroNameStr;
          
          // Hide input, show modal
          heroInputContainer.style.opacity = '0';
          setTimeout(() => {
            heroInputContainer.style.display = 'none';
            agreementModal.style.display = 'flex';
          }, 500);
        }
      }
    });

    /* --- STEP 4: MODAL LOGIC --- */
    const fakeTerms = "Here are the terms of use for Musubi. By logging in, you agree to protect the realm, uphold the values of Vanguard Citizen Services, and accept that your digital consciousness may be temporarily stored on our servers. <br><br> Scroll down to read more legal jargon... <br><br> Just kidding, you're good to go.";
    const fakePrivacy = "We respect your privacy. Vanguard Citizen Services will not share your hero data with third-party goblin factions or corporate entities outside of the Musubi network.";

    function openDoc(type) {
      agreementModal.style.display = 'none'; // hide first modal
      docModal.style.display = 'flex'; // show document
      if(type === 'terms') {
        docTitle.innerText = "TERMS OF USE";
        docContent.innerHTML = fakeTerms;
      } else {
        docTitle.innerText = "PRIVACY POLICY";
        docContent.innerHTML = fakePrivacy;
      }
    }

    function closeDoc() {
      docModal.style.display = 'none';
      agreementModal.style.display = 'flex';
    }

    /* --- STEP 5: ACCEPT / DECLINE ROUTING --- */
    document.getElementById('accept-btn').addEventListener('click', () => {
      // Redirect to menu.html
      window.location.href = "menu.html";
    });

    document.getElementById('decline-btn').addEventListener('click', () => {
      agreementModal.style.display = 'none'; // Close modal
      
      // Type warning
      typeString(typingOutput2, "WARNING: Terms declined. Initiating Demo Mode...", () => {
        // Wait 4 seconds then redirect
        setTimeout(() => {
          window.location.href = "menu2.html";
        }, 4000);
      });
    });

    /* --- HELPER FUNCTION: TYPEWRITER --- */
    function typeString(element, text, callback) {
      element.innerHTML = "";
      element.classList.add('cursor');
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, Math.floor(Math.random() * 100) + 50);
        } else {
          if(callback) callback();
        }
      }
      typing();
    }
  </script>
</body>
</html>
