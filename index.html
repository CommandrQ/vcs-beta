<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="space-bg">
        <div class="starfield"></div>
    </div>

    <div class="glass-window">
        <img src="images/vanguardorglogo.png" alt="Vanguard Citizen Services Logo" class="logo">
        <div class="tagline">Empower.Educate.Elevate</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="loading-bar"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const progressBar = document.getElementById("loading-bar");
            const spaceBg = document.querySelector(".space-bg");
            let currentProgress = 0;

            const simulation = setInterval(() => {
                let step = Math.floor(Math.random() * 6) + 1; 
                currentProgress += step;

                if (currentProgress >= 100) {
                    currentProgress = 100;
                    clearInterval(simulation);
                    triggerExitSequence();
                }

                progressBar.style.width = `${currentProgress}%`;
            }, 120); 

            function triggerExitSequence() {
                setTimeout(() => {
                    document.body.classList.add("fade-out");
                    setTimeout(() => {
                        window.location.href = "home/index.html";
                    }, 800); 
                }, 400); 
            }

            function launchComet() {
                const comet = document.createElement("div");
                comet.classList.add("comet");
                
                const startTop = Math.random() * 40; 
                const startLeft = Math.random() * 20;
                
                comet.style.top = `${startTop}vh`;
                comet.style.left = `${startLeft}vw`;
                comet.style.animation = "streak 3.2s cubic-bezier(0.25, 1, 0.5, 1) forwards";
                
                spaceBg.appendChild(comet);
                
                setTimeout(() => {
                    comet.remove();
                }, 3300);
            }

            setInterval(launchComet, 4000);
            setTimeout(launchComet, 500);
        });
    </script>

</body>
</html>
