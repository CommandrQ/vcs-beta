<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Vanguard Citizen Services</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="viewport-lock">

  <!-- Background Space Canvas -->
  <canvas id="atmosphere-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none;"></canvas>

  <!-- Transitions Mask (Handles initial fade-in from black) -->
  <div id="transition-mask" style="opacity: 1;"></div>

  <!-- Old TV Intro Shield -->
  <div id="intro-stage" class="intro-overlay">
    <img src="images/vanguardorglogo.png" alt="Vanguard Citizen Services Logo" class="intro-logo">
    <div class="loading-track">
      <div id="loading-progress" class="loading-bar"></div>
    </div>
    <p class="intro-motto">Empower. Educate. Elevate.</p>
  </div>

  <!-- Primary Workspace Layout -->
  <main id="main-content" class="app-container">
    
    <!-- Hero Branding Frame -->
    <header class="vanguard-hero">
      <img src="images/vanguardorglogo.png" alt="Vanguard Logo" class="hero-logo-small">
      <h1 class="hero-title">Welcome, Citizen</h1>
    </header>

    <!-- Announcements Panel -->
    <section class="vanguard-panel announcements-panel-wrapper">
      <h2 class="panel-label">Guild Announcements</h2>
      <div id="announcements-mount" class="announcements-container scrollable-interior">
        <p class="system-message">Syncing broadcast lines...</p>
      </div>
    </section>

    <!-- Navigation Hub Section -->
    <section class="vanguard-panel operations-hub">
      <h2 class="panel-label">Operations Registry</h2>
      
      <div class="split-layout-engine">
        <!-- Left Hand Selection Column -->
        <div id="tabs-mount" class="tabs-stacked-track"></div>
        
        <!-- Right Hand Narrative Content Window -->
        <div id="desktop-content-window" class="narrative-pane"></div>
      </div>
    </section>

    <!-- Shared Persistent Footer -->
    <footer class="vanguard-footer">
      <p class="footer-text">
        &copy; <span id="current-year"></span> vanguard citizen services
      </p>
    </footer>
    
  </main>

  <script src="script.js"></script>
  <script src="announcements.js"></script>
</body>
</html>
