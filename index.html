<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Services | Empower. Educate. Elevate.</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --ambient-glow: rgba(212, 175, 55, 0.2);
            --dark-glass: rgba(15, 15, 15, 0.95);
            --border-gold: rgba(212, 175, 55, 0.4);
            --nav-height: 90px;
            --footer-height: 85px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden; /* Maintains cinematic focus */
        }

        /* --- STARFIELD ENGINE --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
        }
        .star-layer {
            position: absolute;
            top: -100%; left: 0; width: 200%; height: 200%;
            background-repeat: repeat;
            animation: move-stars linear infinite;
        }
        .layer-1 { background-image: radial-gradient(1px 1px at 10% 10%, #fff, transparent); background-size: 300px 300px; animation-duration: 120s; opacity: 0.3; }
        .layer-2 { background-image: radial-gradient(2px 2px at 20% 80%, #fff, transparent); background-size: 400px 400px; animation-duration: 80s; opacity: 0.5; }
        .layer-3 { background-image: radial-gradient(4px 4px at 40% 40%, #fff, transparent); background-size: 600px 600px; animation-duration: 40s; opacity: 0.7; }
        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(50%); } }

        /* --- PERSISTENT NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--border-gold);
            z-index: 2000;
            backdrop-filter: blur(20px);
        }

        .nav-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center; /* Desktop centered */
            align-items: center;
            overflow: hidden;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 45px;
            padding: 0 40px;
        }

        nav ul li a {
            text-decoration: none; 
            color: var(--gold);
            font-family: 'Cinzel', serif; 
            font-weight: bold;
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase; 
            transition: 0.4s;
            white-space: nowrap;
        }
        nav ul li a:hover { color: white; text-shadow: 0 0 15px var(--gold); }

        #scroll-indicator {
            display: none;
            position: absolute;
            right: 15px;
            color: var(--gold);
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 2001;
            animation: arrow-pulse 2s infinite;
        }

        @keyframes arrow-pulse {
            0%, 100% { opacity: 0; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(5px); }
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-logo {
            width: 320px;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
        }

        .slogan {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            letter-spacing: 10px;
            color: white;
            animation: pulse-glow 3.5s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 10px var(--gold-glow); opacity: 0.7; }
            50% { text-shadow: 0 0 30px var(--gold), 0 0 50px var(--gold); opacity: 1; }
        }

        /* --- PERSISTENT FOOTER --- */
        footer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: var(--footer-height);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,1) 70%, transparent);
            z-index: 2000;
        }

        .legal-links { margin-bottom: 8px; }
        .legal-links a {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            margin: 0 15px;
            letter-spacing: 1px;
        }

        .copyright {
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* --- MOBILE HUD OPTIMIZATION --- */
        @media (max-width: 600px) {
            .nav-container { justify-content: flex-start; }
            
            nav::after {
                content: "";
                position: absolute; right: 0; top: 0;
                height: 100%; width: 60px;
                background: linear-gradient(to right, transparent, rgba(0,0,0,0.9));
                pointer-events: none; z-index: 10;
            }

            nav ul {
                gap: 30px;
                overflow-x: auto;
                scrollbar-width: none;
                width: 100%;
                padding: 0 20px;
            }
            nav ul::-webkit-scrollbar { display: none; }
            
            nav ul li a { font-size: 1.1rem; }
            #scroll-indicator { display: block; }

            footer { flex-direction: row; white-space: nowrap; }
            .legal-links { margin-bottom: 0; display: flex; align-items: center; }
            .legal-links a { font-size: 0.65rem; margin: 0 8px; }
            .legal-links::after { content: "|"; color: var(--gold); margin-right: 10px; font-size: 0.7rem; }
            .copyright { font-size: 0.65rem; }

            .hero-logo { width: 220px; }
            .slogan { font-size: 1.2rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="star-layer layer-1"></div>
        <div class="star-layer layer-2"></div>
        <div class="star-layer layer-3"></div>
    </div>

    <nav>
        <div class="nav-container">
            <ul id="main-nav">
                </ul>
            <span id="scroll-indicator">❯</span>
        </div>
    </nav>

    <main class="hero">
        <img src="images/vanguardorglogo.png" alt="Vanguard Knights Logo" class="hero-logo">
        <div class="slogan">Empower. Educate. Elevate.</div>
    </main>

    <footer>
        <div class="legal-links">
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </div>
        <div class="copyright">
            VCS &copy; 2026
        </div>
    </footer>

    <script>
        const navList = document.getElementById('main-nav');
        const indicator = document.getElementById('scroll-indicator');

        // Logic to load links
        async function loadNavigation() {
            try {
                const response = await fetch('json/nav.json');
                const navData = await response.json();
                navList.innerHTML = '';
                navData.forEach(item => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = item.link;
                    a.textContent = item.name;
                    li.appendChild(a);
                    navList.appendChild(li);
                });
            } catch (error) {
                navList.innerHTML = `
                    <li><a href="about.html">About</a></li>
                    <li><a href="story.html">Story</a></li>
                    <li><a href="team.html">Team</a></li>
                    <li><a href="knights.html">Knights</a></li>
                `;
            }
        }

        // Logic to hide indicator on scroll
        navList.addEventListener('scroll', () => {
            if (navList.scrollLeft > 20) {
                indicator.style.opacity = "0";
                indicator.style.transition = "0.5s";
                setTimeout(() => indicator.style.display = "none", 500);
            }
        });

        window.onload = loadNavigation;
    </script>

</body>
</html>
