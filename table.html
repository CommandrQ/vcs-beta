<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS | The Round Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="lock-screen table-bg" style="background-color: #000; margin: 0;">

    <div id="loader-screen">
        <div class="loader-content">
            <span class="system-text">INITIALIZING VANGUARD PROTOCOL</span>
            <span id="load-percent">0%</span>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <main id="main-stage" class="doorway-stage hidden-stage">
        
        <div class="pulse-layer pulse-blue"></div>
        <div class="pulse-layer pulse-red"></div>
        <div class="pulse-layer pulse-gold"></div>

        <div class="bg-helmet">
            <svg viewBox="0 0 24 24" class="watermark-svg">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2c3.92 1.07 7 4.58 7 8.05 0 .28-.02.56-.05.83-.34-1.29-1.42-2.38-2.73-2.88H7.78c-1.31.5-2.39 1.59-2.73 2.88-.03-.27-.05-.55-.05-.83 0-3.47 3.08-6.98 7-8.05zM7 13.5v1h10v-1h-10zm2 3v1h6v-1H9z"/>
            </svg>
        </div>

        <div class="staggered-menu">
            
            <a href="archive.html" class="seat archive">
                <span class="seat-label">The Archive</span>
            </a>

            <a href="citizens.html" class="seat citizens">
                <span class="seat-label">The Citizens</span>
            </a>

            <a href="horizon.html" class="seat horizon">
                <span class="seat-label">The Horizon</span>
            </a>

            <a href="vanguard.html" class="seat vanguard">
                <span class="seat-label">The Vanguard</span>
            </a>

        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loadText = document.getElementById('load-percent');
            const progressBar = document.getElementById('progress-bar');
            const loader = document.getElementById('loader-screen');
            const mainStage = document.getElementById('main-stage');
            
            let progress = 0;

            function simulateLoad() {
                let increment = Math.floor(Math.random() * 15) + 1;
                progress += increment;

                if (progress > 100) progress = 100;
                
                loadText.innerText = progress + '%';
                progressBar.style.width = progress + '%';

                if (progress < 100) {
                    setTimeout(simulateLoad, Math.random() * 150 + 50);
                } else {
                    setTimeout(() => {
                        loader.style.opacity = '0'; 
                        setTimeout(() => {
                            loader.style.display = 'none';
                            mainStage.classList.remove('hidden-stage');
                            mainStage.classList.add('zoom-in-active'); 
                        }, 500);
                    }, 400); 
                }
            }
            
            setTimeout(simulateLoad, 200);
        });
    </script>
</body>
</html>
