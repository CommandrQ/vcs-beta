<!DOCTYPE html>

        </div>

        <div class="round-table-container">
            
            <a href="archive.html" class="seat archive">
                <span class="seat-label">The Archive</span>
            </a>

            <a href="citizens.html" class="seat citizens">
                <span class="seat-label">The Citizens</span>
            </a>

            <a href="horizon.html" class="seat horizon">

            </a>

            <a href="vanguard.html" class="seat vanguard">
                <span class="seat-label">The Vanguard</span>
            </a>

            <div class="table-center">
