<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS | The Round Table</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --true-black: #000000;
            --vcs-gold: #D4AF37;
            --vcs-purple: #BF94FF;
            --text-main: #F5F5F7;
            --text-dim: rgba(245, 245, 247, 0.4);
            --snap: 0.8s cubic-bezier(0.2, 0, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--true-black);
            color: var(--text-main);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: grid; place-items: center;
        }

        /* --- 1. BOOT SEQUENCE LOADER --- */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--true-black);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; 
        }

        .loader-content {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            width: 350px; z-index: 2;
        }

        .terminal-text {
            font-family: 'Inter', monospace; font-size: 0.6rem;
            letter-spacing: 0.4em; color: var(--text-dim); text-transform: uppercase;
        }

        #load-percent {
            font-family: 'Inter', sans-serif; font-size: 2.5rem;
            color: var(--vcs-gold); font-weight: 200; letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .progress-bar-container {
            width: 100%; height: 2px; background: rgba(255, 255, 255, 0.05);
            position: relative; overflow: hidden;
        }

        #progress-bar {
            height: 100%; width: 0%; background: var(--vcs-gold);
            box-shadow: 0 0 10px var(--vcs-gold); transition: width 0.1s linear;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- 2. EXIT FADE OVERLAY --- */
        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--true-black);
            opacity: 0; pointer-events: none;
            z-index: 10000; 
            transition: opacity 0.8s ease-in-out;
        }

        .fade-out-active {
            opacity: 1 !important;
            pointer-events: all !important;
        }

        /* --- 3. MAIN STAGE & CINEMATIC ENTRANCE --- */
        .hidden-stage { display: none; }
        
        .cinematic-entrance {
            display: grid; place-items: center;
            height: 100vh; width: 100vw; position: relative;
            animation: emergeFromBlack 2.5s ease-out forwards;
        }

        @keyframes emergeFromBlack {
            0% { opacity: 0; transform: scale(0.9); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        /* --- 4. HOLOGRAPHIC RINGS --- */
        .holo-table {
            position: absolute;
            width: 40vw; height: 40vw; max-width: 450px; max-height: 450px;
            /* Shifted up to balance vertical empty space */
            margin-top: -10vh; 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 1;
        }

        .ring { position: absolute; border-radius: 50%; border: 1px solid transparent; }

        .ring-outer {
            width: 100%; height: 100%;
            border-top: 1px solid rgba(212, 175, 55, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            animation: spinRight 20s linear infinite;
        }

        .ring-middle {
            width: 80%; height: 80%;
            border-left: 1px solid rgba(191, 148, 255, 0.3); border-right: 1px solid rgba(191, 148, 255, 0.3);
            animation: spinLeft 15s linear infinite;
        }

        .ring-inner {
            width: 60%; height: 60%; border: 1px dashed rgba(245, 245, 247, 0.2);
            animation: spinRight 10s linear infinite;
        }

        .core-light {
            width: 10%; height: 10%; background: var(--vcs-gold); border-radius: 50%;
            filter: blur(25px); opacity: 0.5; animation: pulseCore 4s ease-in-out infinite;
        }

        @keyframes spinRight { 100% { transform: rotate(360deg); } }
        @keyframes spinLeft { 100% { transform: rotate(-360deg); } }
        @keyframes pulseCore { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.5); opacity: 0.7; } }

        /* --- 5. COMPASS LAYOUT --- */
        .orbital-container {
            position: relative;
            width: 85vw; height: 85vw; max-width: 700px; max-height: 700px;
            /* Shifted up to match the rings */
            margin-top: -10vh; 
            z-index: 10;
        }

        .seat { position: absolute; text-decoration: none; }

        .pos-top    { top: 5%; left: 50%; transform: translateX(-50%); }
        .pos-bottom { bottom: 5%; left: 50%; transform: translateX(-50%); }
        .pos-left   { top: 50%; left: 0; transform: translateY(-50%); }
        .pos-right  { top: 50%; right: 0; transform: translateY(-50%); }

        /* --- 6. THE SAFE FLOATING ANIMATION --- */
        .floater {
            animation: bob 6s ease-in-out infinite;
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1);
        }

        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: -1.5s; animation-duration: 6.5s; }
        .delay-3 { animation-delay: -3s; animation-duration: 7s; }
        .delay-4 { animation-delay: -4.5s; animation-duration: 5.5s; }

        @keyframes bob {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* --- 7. TEXT BOX STYLING --- */
        .text-group {
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); padding: 15px 30px; 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; 
            backdrop-filter: blur(10px); transition: all 0.4s ease;
        }

        .seat-label {
            font-family: 'Cinzel', serif; font-size: clamp(0.80rem, 2vw, 1.1rem);
            color: var(--text-main); letter-spacing: 0.3em;
            text-transform: uppercase; white-space: nowrap; margin-right: -0.3em; 
        }

        /* --- 8. HOVER EFFECTS --- */
        .seat:hover { z-index: 100; cursor: pointer; }
        
        .seat:hover .floater { transform: scale(1.15); }
        
        .seat:hover .text-group {
            background: rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); 
        }

        .seat:hover .seat-label {
            color: var(--vcs-gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
            letter-spacing: 0.4em;
        }

        .cinematic-entrance:has(.seat:hover) .holo-table { opacity: 0.2; transition: opacity 0.4s ease; }

        /* --- 9. MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .orbital-container { width: 95vw; height: 95vw; margin-top: -5vh; }
            .holo-table { width: 55vw; height: 55vw; margin-top: -5vh; }
            
            .pos-left   { left: 2%; }
            .pos-right  { right: 2%; }
            
            .text-group { padding: 10px 15px; }
            .seat-label { font-size: clamp(0.55rem, 3.5vw, 0.85rem); letter-spacing: 0.2em; }
        }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <div id="loader-screen">
        <div class="loader-content">
            <div class="terminal-text" id="sys-status">BOOTING VANGUARD OS...</div>
            <span id="load-percent">0%</span>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div class="terminal-text" id="sys-log">ESTABLISHING SECURE CONNECTION...</div>
        </div>
        <div class="scanlines"></div>
    </div>

    <main id="main-stage" class="hidden-stage">
        
        <div class="holo-table">
            <div class="ring ring-outer"></div>
            <div class="ring ring-middle"></div>
            <div class="ring ring-inner"></div>
            <div class="core-light"></div>
        </div>

        <div class="orbital-container">
            
            <a href="our-story.html" class="seat pos-top">
                <div class="floater delay-1">
                    <div class="text-group"><span class="seat-label">Our Story</span></div>
                </div>
            </a>

            <a href="work.html" class="seat pos-right">
                <div class="floater delay-2">
                    <div class="text-group"><span class="seat-label">What We Do</span></div>
                </div>
            </a>

            <a href="team.html" class="seat pos-bottom">
                <div class="floater delay-3">
                    <div class="text-group"><span class="seat-label">Our Team</span></div>
                </div>
            </a>

            <a href="knights.html" class="seat pos-left">
                <div class="floater delay-4">
                    <div class="text-group"><span class="seat-label">Vanguard Knights</span></div>
                </div>
            </a>

        </div>
    </main>

    <script>
        (function() {
            // Elements
            const loadText = document.getElementById('load-percent');
            const progressBar = document.getElementById('progress-bar');
            const loader = document.getElementById('loader-screen');
            const loaderContent = document.querySelector('.loader-content');
            const scanlines = document.querySelector('.scanlines');
            const mainStage = document.getElementById('main-stage');
            const sysLog = document.getElementById('sys-log');
            const fadeOverlay = document.getElementById('fade-overlay');
            const seats = document.querySelectorAll('.seat');
            
            if (!loadText || !loader || !mainStage) return;

            // --- THE BOOT SEQUENCE ---
            let progress = 0;
            const logMessages = [
                "ESTABLISHING SECURE CONNECTION...",
                "DECRYPTING ARCHIVES...",
                "CALIBRATING SHIELD PROTOCOLS...",
                "ALIGNING KNIGHTS...",
                "SYSTEM READY."
            ];

            function simulateLoad() {
                let increment = Math.floor(Math.random() * 18) + 1;
                progress += increment;

                if (progress > 100) progress = 100;
                
                loadText.innerText = progress + '%';
                progressBar.style.width = progress + '%';

                if (progress > 20 && progress < 50) sysLog.innerText = logMessages[1];
                if (progress >= 50 && progress < 85) sysLog.innerText = logMessages[2];
                if (progress >= 85 && progress < 100) sysLog.innerText = logMessages[3];
                if (progress === 100) sysLog.innerText = logMessages[4];

                if (progress < 100) {
                    setTimeout(simulateLoad, Math.random() * 200 + 50);
                } else {
                    setTimeout(() => {
                        loaderContent.style.transition = 'opacity 0.3s ease';
                        scanlines.style.transition = 'opacity 0.3s ease';
                        loaderContent.style.opacity = '0';
                        scanlines.style.opacity = '0';
                        
                        setTimeout(() => {
                            loader.style.display = 'none';
                            mainStage.classList.remove('hidden-stage');
                            mainStage.classList.add('cinematic-entrance'); 
                        }, 300); 
                    }, 200); 
                }
            }
            
            setTimeout(simulateLoad, 300);

            // --- THE EXIT PROTOCOL (Fade to Black) ---
            seats.forEach(seat => {
                seat.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    
                    const targetUrl = this.getAttribute('href');
                    
                    fadeOverlay.classList.add('fade-out-active');
                    
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 800);
                });
            });

        })();
    </script>
</body>
</html>
