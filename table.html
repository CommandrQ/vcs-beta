<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS | The Round Table</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --vcs-gold: #D4AF37;
            --true-black: #050505;
            --text-main: #F5F5F7;
            --text-dim: rgba(245, 245, 247, 0.5);
            --radius: clamp(140px, 28vw, 300px);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* --- 1. BASE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background-color: #000;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            /* Desktop Scrolling Locked */
            overflow: hidden; 
            display: grid;
            place-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #000 70%);
        }

        /* --- 2. THE HOLO-TABLE (CENTER RINGS) --- */
        .holo-table {
            position: relative;
            width: 100px; height: 100px;
            display: grid;
            place-items: center;
            z-index: 10;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--vcs-gold);
            opacity: 0.2;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ring-1 { width: 120px; height: 120px; animation: spin 20s linear infinite; border-style: dashed; }
        .ring-2 { width: 180px; height: 180px; animation: spin 30s linear infinite reverse; opacity: 0.1; }
        .ring-3 { width: 240px; height: 240px; border: 1px double var(--vcs-gold); opacity: 0.05; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 3. HUD TEXT (CENTER) --- */
        #center-hud {
            position: absolute;
            width: 300px;
            text-align: center;
            pointer-events: none;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            color: #FFFFFF;
            transition: all 0.5s ease;
            z-index: 15; /* High z-index to stay above rings */
        }

        /* --- 4. ORBITAL SYSTEM --- */
        .orbital-container {
            position: absolute;
            width: 100vw; height: 100vh;
            display: grid;
            place-items: center;
            z-index: 20;
        }

        .seat {
            position: absolute;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .seat:nth-child(1) { transform: translate(calc(cos(0deg) * var(--radius)), calc(sin(0deg) * var(--radius))); }
        .seat:nth-child(2) { transform: translate(calc(cos(90deg) * var(--radius)), calc(sin(90deg) * var(--radius))); }
        .seat:nth-child(3) { transform: translate(calc(cos(180deg) * var(--radius)), calc(sin(180deg) * var(--radius))); }
        .seat:nth-child(4) { transform: translate(calc(cos(270deg) * var(--radius)), calc(sin(270deg) * var(--radius))); }

        /* --- 5. THE BOXES --- */
        .floater { animation: float 6s ease-in-out infinite; }

        .text-group {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .text-group::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 2px; height: 100%;
            background: var(--vcs-gold);
            transform: scaleY(0);
            transition: transform 0.4s ease;
        }

        .seat-label {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .seat:hover .text-group {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--vcs-gold);
            transform: translateX(10px);
        }

        .seat:hover .text-group::before { transform: scaleY(1); }

        /* --- 7. MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            body { 
                display: flex; 
                flex-direction: column; 
                justify-content: flex-start;
                padding-top: 5vh; 
                /* Allow scrolling on mobile */
                overflow-x: hidden; 
                overflow-y: auto; 
                height: auto;
                min-height: 100vh;
            }

            .holo-table { 
                position: relative;
                width: 60vw; height: 60vw; 
                margin: 0 auto 5vh auto; 
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #center-hud { 
                position: absolute; /* Overlays on top of the circle */
                width: 80%; 
                font-size: 0.70rem; 
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%); /* Centers text inside rings */
                color: #FFFFFF; 
                opacity: 1; 
                z-index: 100;
            }

            .orbital-container { 
                position: relative;
                width: 100%; height: auto; 
                margin-top: 0; 
                padding-bottom: 10vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px; 
            }

            .seat {
                position: relative;
                top: auto; left: auto;
                transform: none !important; 
                width: 85%;
            }

            .floater { animation: none; } 
            .text-group { width: 100%; padding: 18px; }
        }
    </style>
</head>
<body class="fade-in">

    <div class="holo-table">
        <div id="center-hud">We educate, empower, and elevate communities</div>
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
    </div>

    <nav class="orbital-container">
        <a href="team.html" class="seat" data-hud="DIRECTORY: PERSONNEL & FOUNDERS">
            <div class="floater">
                <div class="text-group"><span class="seat-label">Our Team</span></div>
            </div>
        </a>

        <a href="our-story.html" class="seat" data-hud="OUR VISION">
            <div class="floater">
                <div class="text-group"><span class="seat-label">Our Story</span></div>
            </div>
        </a>

        <a href="work.html" class="seat" data-hud="OUR PHILOSOPHY">
            <div class="floater">
                <div class="text-group"><span class="seat-label">Our Vision</span></div>
            </div>
        </a>

        <a href="soon.html" class="seat" data-hud="ACCESS: CITIZEN PORTAL [UNDER CONSTRUCTION]">
            <div class="floater">
                <div class="text-group"><span class="seat-label">The Collective</span></div>
            </div>
        </a>
    </nav>

    <script>
        const hud = document.getElementById('center-hud');
        const defaultText = "We educate, empower, and elevate communities";
        const seats = document.querySelectorAll('.seat');

        seats.forEach(seat => {
            seat.addEventListener('mouseenter', () => {
                hud.style.opacity = '0';
                setTimeout(() => {
                    hud.innerText = seat.getAttribute('data-hud');
                    hud.style.color = 'var(--vcs-gold)';
                    hud.style.opacity = '1';
                }, 200);
            });

            seat.addEventListener('mouseleave', () => {
                hud.style.opacity = '0';
                setTimeout(() => {
                    hud.innerText = defaultText;
                    hud.style.color = '#FFFFFF';
                    hud.style.opacity = '1';
                }, 200);
            });
        });
    </script>
</body>
</html>
