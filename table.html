<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS | The Round Table</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --true-black: #000000;
            --vcs-gold: #D4AF37;
            --vcs-purple: #BF94FF;
            --text-main: #F5F5F7;
            --text-dim: rgba(245, 245, 247, 0.4);
            --snap: 0.8s cubic-bezier(0.2, 0, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--true-black);
            color: var(--text-main);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: grid; place-items: center;
        }

        /* --- 1. BOOT SEQUENCE LOADER --- */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--true-black);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; 
        }

        .loader-content {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            width: 350px; z-index: 2;
        }

        .terminal-text {
            font-family: 'Inter', monospace; font-size: 0.6rem;
            letter-spacing: 0.4em; color: var(--text-dim); text-transform: uppercase;
        }

        #load-percent {
            font-family: 'Inter', sans-serif; font-size: 2.5rem;
            color: var(--vcs-gold); font-weight: 200; letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .progress-bar-container {
            width: 100%; height: 2px; background: rgba(255, 255, 255, 0.05);
            position: relative; overflow: hidden;
        }

        #progress-bar {
            height: 100%; width: 0%; background: var(--vcs-gold);
            box-shadow: 0 0 10px var(--vcs-gold); transition: width 0.1s linear;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- 2. EXIT FADE OVERLAY --- */
        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--true-black);
            opacity: 0; pointer-events: none;
            z-index: 10000; 
            transition: opacity 0.6s ease-in-out;
        }

        .fade-out-active {
            opacity: 1 !important;
            pointer-events: all !important;
        }

        /* --- 3. MAIN STAGE ENTRANCE --- */
        .hidden-stage { display: none; }
        
        .cinematic-entrance {
            display: grid; place-items: center;
            height: 100vh; width: 100vw; position: relative;
            animation: emergeFromBlack 1.5s ease-out forwards;
        }

        .instant-entrance {
            display: grid; place-items: center;
            height: 100vh; width: 100vw; position: relative;
            animation: emergeFromBlack 0.8s ease-out forwards;
        }

        @keyframes emergeFromBlack {
            0% { opacity: 0; transform: scale(0.95); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        /* --- 4. HOLOGRAPHIC RINGS & CENTER HUD --- */
        .holo-table {
            position: absolute;
            width: 40vw; height: 40vw; max-width: 450px; max-height: 450px;
            margin-top: -4vh; 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 1;
        }

        /* The dynamic text readout in the center */
        #center-hud {
            position: absolute;
            width: 65%; /* Keeps it inside the inner ring */
            text-align: center;
            font-family: 'Inter', monospace;
            font-size: clamp(0.55rem, 1.5vw, 0.75rem);
            color: var(--text-dim);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            line-height: 1.6;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        /* When hovering over a category, the HUD lights up */
        .hud-active {
            color: var(--vcs-gold) !important;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
            font-weight: 600;
        }

        .ring { position: absolute; border-radius: 50%; border: 1px solid transparent; }

        .ring-outer {
            width: 100%; height: 100%;
            border-top: 1px solid rgba(212, 175, 55, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            animation: spinRight 20s linear infinite;
        }

        .ring-middle {
            width: 80%; height: 80%;
            border-left: 1px solid rgba(191, 148, 255, 0.3); border-right: 1px solid rgba(191, 148, 255, 0.3);
            animation: spinLeft 15s linear infinite;
        }

        .ring-inner {
            width: 60%; height: 60%; border: 1px dashed rgba(245, 245, 247, 0.2);
            animation: spinRight 10s linear infinite;
        }

        .core-light {
            width: 10%; height: 10%; background: var(--vcs-gold); border-radius: 50%;
            filter: blur(25px); opacity: 0.5; animation: pulseCore 4s ease-in-out infinite;
        }

        @keyframes spinRight { 100% { transform: rotate(360deg); } }
        @keyframes spinLeft { 100% { transform: rotate(-360deg); } }
        @keyframes pulseCore { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.5); opacity: 0.7; } }

        /* --- 5. DYNAMIC ORBITAL LAYOUT --- */
        .orbital-container {
            position: relative;
            width: 100%; height: 100%; 
            max-width: 800px; max-height: 800px;
            margin-top: -4vh; 
            z-index: 10;
            /* This variable controls how far the buttons sit from the center */
            --radius: clamp(140px, 28vw, 300px); 
        }

        .seat { 
            position: absolute; 
            top: 50%; left: 50%;
            text-decoration: none; 
            /* The CSS uses a variable set by the JavaScript to calculate the perfect circle */
            --angle: 0deg; 
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(var(--radius) * -1)) rotate(calc(var(--angle) * -1));
        }

        /* --- 6. THE SAFE FLOATING ANIMATION --- */
        .floater {
            animation: bob 6s ease-in-out infinite;
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1);
        }

        /* Randomizes the floating so they don't move exactly together */
        .seat:nth-child(even) .floater { animation-delay: -2s; animation-duration: 7s; }
        .seat:nth-child(odd) .floater { animation-delay: -4s; animation-duration: 5.5s; }

        @keyframes bob {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* --- 7. TEXT BOX STYLING --- */
        .text-group {
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); padding: 15px 30px; 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; 
            backdrop-filter: blur(10px); transition: all 0.4s ease;
        }

        .seat-label {
            font-family: 'Cinzel', serif; font-size: clamp(0.80rem, 2vw, 1.1rem);
            color: var(--text-main); letter-spacing: 0.3em;
            text-transform: uppercase; white-space: nowrap; margin-right: -0.3em; 
        }

        /* --- 8. HOVER EFFECTS --- */
        .seat:hover { z-index: 100; cursor: pointer; }
        
        .seat:hover .floater { transform: scale(1.15); }
        
        .seat:hover .text-group {
            background: rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); 
        }

        .seat:hover .seat-label {
            color: var(--vcs-gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
            letter-spacing: 0.4em;
        }

        /* Dim the rings when hovering */
        .cinematic-entrance:has(.seat:hover) .ring,
        .instant-entrance:has(.seat:hover) .ring { 
            opacity: 0.1; transition: opacity 0.4s ease; 
        }

        /* --- 9. MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .orbital-container { width: 100vw; height: 100vw; margin-top: -5vh; --radius: 35vw; }
            .holo-table { width: 55vw; height: 55vw; margin-top: -5vh; }
            .text-group { padding: 10px 15px; }
            .seat-label { font-size: clamp(0.55rem, 3.5vw, 0.85rem); letter-spacing: 0.2em; }
            #center-hud { width: 80%; }
        }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <div id="loader-screen">
        <div class="loader-content">
            <div class="terminal-text" id="sys-status">BOOTING VANGUARD OS...</div>
            <span id="load-percent">0%</span>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div class="terminal-text" id="sys-log">ESTABLISHING SECURE CONNECTION...</div>
        </div>
        <div class="scanlines"></div>
    </div>

    <main id="main-stage" class="hidden-stage">
        
        <div class="holo-table">
            <div class="ring ring-outer"></div>
            <div class="ring ring-middle"></div>
            <div class="ring ring-inner"></div>
            <div class="core-light"></div>
            <div id="center-hud">WE ELEVATe COMMUNITIES & BRANDS THROUGH NARRATIVE & DESIGN</div>
        </div>

        <div class="orbital-container" id="orbit-track">
            
            <a href="our-story.html" class="seat" data-hud="Our Vision.">
                <div class="floater">
                    <div class="text-group"><span class="seat-label">Our Story</span></div>
                </div>
            </a>

            <a href="work.html" class="seat" data-hud="Media Production, Services & Education.">
                <div class="floater">
                    <div class="text-group"><span class="seat-label">What We Do</span></div>
                </div>
            </a>

            <a href="team.html" class="seat" data-hud="Our Founders, Creators & Direct Comm-Links.">
                <div class="floater">
                    <div class="text-group"><span class="seat-label">Our Team</span></div>
                </div>
            </a>

            <a href="coming-soon.html" class="seat" data-hud="RESTRICTED">
                <div class="floater">
                    <div class="text-group"><span class="seat-label">Vanguard Knights</span></div>
                </div>
            </a>
            
            </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loadText = document.getElementById('load-percent');
            const progressBar = document.getElementById('progress-bar');
            const loader = document.getElementById('loader-screen');
            const loaderContent = document.querySelector('.loader-content');
            const scanlines = document.querySelector('.scanlines');
            const mainStage = document.getElementById('main-stage');
            const sysLog = document.getElementById('sys-log');
            const fadeOverlay = document.getElementById('fade-overlay');
            const seats = document.querySelectorAll('.seat');
            const centerHud = document.getElementById('center-hud');
            
            if (!loadText || !loader || !mainStage) return;

            // --- 1. DYNAMIC ORBIT CALCULATOR ---
            // Automatically spaces any number of links in a perfect circle
            const totalSeats = seats.length;
            seats.forEach((seat, index) => {
                const angle = (360 / totalSeats) * index;
                // Subtracting 90 ensures the first item is always perfectly at the Top (12 o'clock)
                seat.style.setProperty('--angle', `${angle}deg`);
            });

            // --- 2. DYNAMIC CENTER HUD ---
            const defaultHudText = "VCS // EDUCATING, EMPOWERING & ELEVATING PEOPLE & BUSINESSES";
            seats.forEach(seat => {
                seat.addEventListener('mouseenter', () => {
                    const newText = seat.getAttribute('data-hud');
                    if(newText) {
                        centerHud.innerText = newText;
                        centerHud.classList.add('hud-active');
                    }
                });
                seat.addEventListener('mouseleave', () => {
                    centerHud.innerText = defaultHudText;
                    centerHud.classList.remove('hud-active');
                });
            });

            // --- 3. SESSION STORAGE BOOT SEQUENCE ---
            if (sessionStorage.getItem('vanguardBooted') === 'true') {
                loader.style.display = 'none';
                mainStage.classList.remove('hidden-stage');
                mainStage.classList.add('instant-entrance'); 
            } else {
                let progress = 0;
                const logMessages = [
                    "ESTABLISHING SECURE CONNECTION...",
                    "DECRYPTING ARCHIVES...",
                    "CALIBRATING SHIELD PROTOCOLS...",
                    "ALIGNING KNIGHTS...",
                    "SYSTEM READY."
                ];

                function simulateLoad() {
                    let increment = Math.floor(Math.random() * 18) + 1;
                    progress += increment;

                    if (progress > 100) progress = 100;
                    
                    loadText.innerText = progress + '%';
                    progressBar.style.width = progress + '%';

                    if (progress > 20 && progress < 50) sysLog.innerText = logMessages[1];
                    if (progress >= 50 && progress < 85) sysLog.innerText = logMessages[2];
                    if (progress >= 85 && progress < 100) sysLog.innerText = logMessages[3];
                    if (progress === 100) sysLog.innerText = logMessages[4];

                    if (progress < 100) {
                        setTimeout(simulateLoad, Math.random() * 200 + 50);
                    } else {
                        sessionStorage.setItem('vanguardBooted', 'true');
                        setTimeout(() => {
                            loaderContent.style.transition = 'opacity 0.15s ease';
                            scanlines.style.transition = 'opacity 0.15s ease';
                            loaderContent.style.opacity = '0';
                            scanlines.style.opacity = '0';
                            
                            setTimeout(() => {
                                loader.style.display = 'none';
                                mainStage.classList.remove('hidden-stage');
                                mainStage.classList.add('cinematic-entrance'); 
                            }, 150); 
                        }, 50); 
                    }
                }
                setTimeout(simulateLoad, 300);
            }

            // --- 4. EXIT PROTOCOL (Fade to Black) ---
            seats.forEach(seat => {
                seat.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    const targetUrl = this.getAttribute('href');
                    fadeOverlay.classList.add('fade-out-active');
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 600);
                });
            });
        });
    </script>
</body>
</html>
