<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Services | Creative Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* UNIQUE UTILITY WRAPPER OVERRIDES */
        .utility-focus-box {
            width: 100%;
            margin: 2rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .utility-name {
            font-size: 1.1em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .utility-desc {
            font-size: 0.85em;
            line-height: 1.5;
            max-width: 420px;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        .action-btn {
            display: inline-block;
            background: linear-gradient(90deg, #ffe082 0%, #ffb300 50%, #ffeb3b 100%);
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0.8rem 1.8rem;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .action-btn:hover {
            box-shadow: 0 0 25px #ffd700, 0 0 10px rgba(179, 136, 255, 0.5);
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: flashShimmer 2s infinite;
        }

        .back-nav {
            align-self: flex-start;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .back-nav:hover {
            color: #ffeb3b;
        }
    </style>
</head>
<body>

    <!-- VISUAL ENVIRONMENT -->
    <div class="space-bg">
        <div class="starfield"></div>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="glass-window">
        
        <!-- HEADER TOP BAR -->
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <a href="../home/index.html" class="back-nav">← Back</a>
            <nav class="tab-navigation" style="margin-bottom: 0; width: auto;">
                <a href="#history" class="tab-link">Our History</a>
                <!-- Future links can be dropped directly right here -->
            </nav>
        </div>

        <!-- IDENTITY HEAD -->
        <div style="text-align: center;">
            <img src="../images/vanguardorglogo.png" alt="Vanguard Citizen Services Logo" class="logo">
            <div class="tagline">Empower.Educate.Elevate</div>
        </div>
        
        <!-- SINGLE HUB PROJECT UTILITY -->
        <div class="utility-focus-box">
            <h3 class="utility-name">Hardin County Community Voice Box</h3>
            <p class="utility-desc">
                Submit local issues throughout the county, explore regional resources, and discover the community around you.
            </p>
            <a href="../knights/index.html#voicebox" class="action-btn">Launch Utility</a>
        </div>

        <!-- STABLE BRAND FOOTER -->
        <footer class="site-footer">
            &copy; 2026 Vanguard Citizen Services. All Rights Reserved.
        </footer>

    </div>

    <!-- BACKGROUND ANIMATION ENGINE -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const spaceBg = document.querySelector(".space-bg");

            function launchComet() {
                const comet = document.createElement("div");
                comet.classList.add("comet");
                const startTop = Math.random() * 40; 
                const startLeft = Math.random() * 20;
                
                comet.style.top = `${startTop}vh`;
                comet.style.left = `${startLeft}vw`;
                comet.style.animation = "streak 3.2s cubic-bezier(0.25, 1, 0.5, 1) forwards";
                
                spaceBg.appendChild(comet);
                setTimeout(() => comet.remove(), 3300);
            }

            setInterval(launchComet, 4000);
            setTimeout(launchComet, 500);
        });
    </script>

</body>
</html>
