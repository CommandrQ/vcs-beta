<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CMDR Q // Gateway</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="cinematic-lock">

  <!-- Cinematic Letterbox Bars (Top and Bottom) -->
  <div class="cinema-bar top"></div>
  <div class="cinema-bar bottom"></div>

  <!-- Intro Stage Container -->
  <div id="intro-viewport" class="intro-canvas">
    
    <!-- Scene 1: The Philosophy Title -->
    <div id="scene-1" class="cinematic-scene active">
      <h2 class="cinematic-text tracking-out">Unfiltered Narratives.</h2>
    </div>

    <!-- Scene 2: The Identity Reveal -->
    <div id="scene-2" class="cinematic-scene">
      <h2 class="cinematic-text glow-text">COMMANDER Q // PLATFORM</h2>
    </div>

  </div>

  <script>
    // Cinematic Timeline Sequencer
    document.addEventListener('DOMContentLoaded', () => {
      const scene1 = document.getElementById('scene-1');
      const scene2 = document.getElementById('scene-2');
      const introViewport = document.getElementById('intro-viewport');

      // Phase 1: Cut to Scene 2 after 3 seconds
      setTimeout(() => {
        scene1.classList.remove('active');
        scene2.classList.add('active');
      }, 3000);

      // Phase 2: Dissolve out and physically navigate away after 6.5 seconds
      setTimeout(() => {
        introViewport.classList.add('dissolve-out');
        
        // Let the fade transition finish, then change pages
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 800);
      }, 6500);
    });
  </script>
</body>
</html>
