<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMDR Q // Gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cinematic-body">

    <!-- Intro Stage Container -->
    <div id="intro-viewport" class="intro-canvas">
        
        <!-- Scene 1: The Philosophy Title -->
        <div id="scene-1" class="cinematic-scene active">
            <h2 class="cinematic-text tracking-out">Unfiltered Narratives.</h2>
        </div>

        <!-- Scene 2: The Identity Reveal -->
        <div id="scene-2" class="cinematic-scene">
            <h2 class="cinematic-text glow-text">COMMANDER Q // PLATFORM</h2>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scene1 = document.getElementById('scene-1');
            const scene2 = document.getElementById('scene-2');
            const introViewport = document.getElementById('intro-viewport');

            setTimeout(() => {
                scene1.classList.remove('active');
                scene2.classList.add('active');
            }, 3000);

            setTimeout(() => {
                introViewport.classList.add('dissolve-out');
                setTimeout(() => { window.location.href = 'home.html'; }, 800);
            }, 6500);
        });
    </script>
</body>
</html>
