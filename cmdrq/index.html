<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Engine // Playlist Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="player-style.css">
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="ambient-flare"></div>

    <div class="terminal-container">
        <div class="identity-module">
            <div class="hud-ring">
                <div class="avatar-img-fallback">▲</div>
            </div>
            <h1 class="commander-title">Media Deck</h1>
            <p class="commander-role">System Playlist Matrix</p>
        </div>

        <div class="glass-panel player-chassis">
            <div class="video-screen-container">
                <div id="yt-hidden-player"></div>
                <div class="video-overlay-shutter" id="shutter">
                    <span class="glitch-text">INITIALIZING QUANTUM STREAM...</span>
                </div>
            </div>

            <div class="now-playing-manifest">
                <div class="track-index" id="track-index">CH -- / --</div>
                <div class="track-details">
                    <h2 class="track-title" id="track-title">LOADING STREAM</h2>
                    <p class="track-author" id="track-author">Fetching Playlist Metadata...</p>
                </div>
            </div>

            <div class="playback-controls">
                <div class="scrub-timeline-container">
                    <span class="time-stamp" id="current-time">00:00</span>
                    <div class="timeline-bar-bg" id="timeline-bg">
                        <div class="timeline-progress" id="timeline-progress"></div>
                    </div>
                    <span class="time-stamp" id="duration-time">00:00</span>
                </div>

                <div class="control-actions-row">
                    <button class="ctrl-btn" id="btn-prev" title="Previous Transmission">◀◀</button>
                    <button class="ctrl-btn master-play" id="btn-play" title="Execute Manifest">PLAY</button>
                    <button class="ctrl-btn" id="btn-next" title="Next Transmission">▶▶</button>
                </div>
            </div>
        </div>

        <div class="link-matrix" id="playlist-matrix">
            </div>
    </div>

    <footer class="system-dock">
        <div class="dock-social-row">
            <a href="../index.html" class="dock-btn">◀ Return to Hub</a>
            <div class="center-logo-container">
                <svg class="dock-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="40" stroke="#D4AF37" stroke-width="3" stroke-dasharray="10 5"/>
                    <polygon points="50,25 70,65 30,65" fill="#D4AF37" opacity="0.7"/>
                </svg>
            </div>
            <a href="#" class="dock-btn" id="sync-status">Status // Online</a>
        </div>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="player-engine.js"></script>
</body>
</html>
