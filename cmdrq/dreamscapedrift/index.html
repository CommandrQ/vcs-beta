<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commander Q // Dreamscape Drift</title>
    <!-- Font Awesome for Player Glyphs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* --- VIDEOS LAYOUT WIDE MATRIX OVERRIDES --- */
        @media (min-width: 768px) {
            .hub-container { 
                max-width: 850px !important; 
            }
        }

        /* Responsive Player Window */
        .player-viewport {
            width: 100%;
            position: relative;
            background: #000000;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .player-viewport video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        /* Dynamic Grid Layout for Choices */
        .video-selection-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        @media (min-width: 768px) {
            .video-selection-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }

        /* Clickable Item Row Items */
        .video-thumb {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            text-align: center;
            color: var(--light-blue);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-thumb:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--light-blue);
            transform: translateY(-1px);
        }

        .video-thumb.active {
            background: var(--light-blue);
            color: var(--deep-space);
            border-color: var(--light-blue);
            box-shadow: 0 0 15px rgba(142, 202, 230, 0.3);
        }

        /* Audio Controls Box */
        .audio-showcase-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #play-mix-btn {
            max-width: 280px;
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <div class="hub-container">
        <h1 class="hub-title">Dreamscape Drift</h1>

        <main class="hub-card">

            <h2>Video Showcase</h2>
            
            <!-- MAIN VIEWPORT DISPLAY -->
            <div class="player-viewport">
                <video id="main-drift-video" controls poster="images/poster.jpg">
                    <!-- Loaded dynamically via script -->
                </video>
            </div>

            <!-- CHANNELS INJECTED HERE -->
            <div id="video-menu-hook" class="video-selection-grid">
                <div style="color: rgba(255,255,255,0.4); font-size: 0.85rem; text-align: center; width: 100%; grid-column: 1/-1; padding: 20px 0;">
                    Initializing Video Data Module...
                </div>
            </div>

            <h2>DJ Audio Mix</h2>
            <div class="audio-showcase-box">
                <!-- Native Audio Node Container -->
                <audio id="dreamscape-audio-set" preload="none">
                    <source src="audio/livemix.mp3" type="audio/mpeg">
                </audio>
                
                <button id="play-mix-btn" class="btn">
                    <i class="fa-solid fa-play"></i> Play Mix Set
                </button>
            </div>

            <div style="text-align: center; margin-top: 35px;">
                <a href="../home.html" class="hub-return-link">← Return to Control Deck</a>
            </div>
        </main>
    </div>

    <footer class="system-footer">
        &copy; <span id="current-year"></span> Vanguard Citizen Services
    </footer>

    <!-- Connect local engine controls -->
    <script src="app.js"></script>

    <!-- AUTOMATED JSON MENU INJECTION CONTROLLER -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuContainer = document.getElementById('video-menu-hook');
            const mainVideoPlayer = document.getElementById('main-drift-video');

            if (!menuContainer || !mainVideoPlayer) return;

            // Fetch list mapping array from local JSON configuration file
            fetch('videos.json')
                .then(response => {
                    if (!response.ok) throw new Error('Data track connection dropped');
                    return response.json();
                })
                .then(data => {
                    // Wipe the placeholder loader string out cleanly
                    menuContainer.innerHTML = '';

                    if (!data || data.length === 0) {
                        menuContainer.innerHTML = '<div style="color: red; font-size: 0.85rem;">No active data tracks found.</div>';
                        return;
                    }

                    // Loop through records and paint menu options
                    data.forEach((item, index) => {
                        const optionBtn = document.createElement('div');
                        optionBtn.className = 'video-thumb';
                        optionBtn.setAttribute('data-video-src', item.src);
                        optionBtn.innerText = item.title;

                        // Auto-arm the first element as the active base item
                        if (index === 0) {
                            optionBtn.classList.add('active');
                            mainVideoPlayer.src = item.src;
                        }

                        menuContainer.appendChild(optionBtn);
                    });

                    // Re-arm app.js event loop hooks since elements were dynamically built
                    if (typeof initializeVideoGallery === 'function') {
                        initializeVideoGallery();
                    }
                })
                .catch(error => {
                    console.error('System failed parsing videos.json configuration:', error);
                    menuContainer.innerHTML = '<div style="color: rgba(255,255,255,0.4); font-size: 0.85rem;">Failed to load system list map track.</div>';
                });
        });
    </script>
</body>
</html>
