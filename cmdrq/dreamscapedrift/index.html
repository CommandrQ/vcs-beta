<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreamscape Drift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* --- PULSING EDGE FRAME --- */
        .hub-card {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: rgba(12, 10, 18, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .hub-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 30%; height: 2px;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        /* --- PLAYER VIEWPORT FRAME --- */
        .player-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }

        .player-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* --- INDEPENDENT SCROLLER FOR SELECTIONS --- */
        .scroller-bay {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 0.5rem;
        }

        .scroller-bay::-webkit-scrollbar {
            width: 6px;
        }
        .scroller-bay::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroller-bay::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 3px;
            transition: background 0.3s ease;
        }
        .scroller-bay.scrolling::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.7);
            box-shadow: 0 0 6px var(--gold);
        }

        .video-selection-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            width: 100%;
            padding-right: 2px;
        }

        /* --- MENU BUTTON SHAPES --- */
        .video-thumb {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.3) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            padding: 1.2rem;
            text-align: left;
            color: #ffffff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
            box-sizing: border-box;
            white-space: normal;
            word-wrap: break-word;
        }

        .video-thumb:hover {
            transform: translateY(-2px);
            border-color: var(--gold);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
            color: var(--gold);
        }

        .video-thumb.active {
            border-color: #ffffff;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* --- DESKTOP GRID ADAPTATIONS --- */
        @media (min-width: 1024px) {
            .video-selection-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1920px) {
            .video-selection-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="starfield-canvas" id="canvas-starfield-engine"></div>
    <div class="comet-canvas" id="canvas-comet-engine"></div>
    <div class="cyber-grid"></div>
    <div class="ambient-flare"></div>

    <main class="terminal-container" id="main-scroller">
        
        <header class="identity-module">
            <div class="hud-ring">
                <img src="../images/headshot.jpg" alt="Quincy Jones" class="avatar-img">
            </div>
            <h1 class="commander-title">Dreamscape Drift</h1>
            <a class="commander-role" href="../" style="text-decoration: none; border-bottom: 1px dashed var(--gold); transition: all 0.3s ease;">
                ← Back to Control Deck
            </a>
        </header>

        <section class="hub-card">

            <div class="player-viewport">
                <iframe id="main-drift-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="scroller-bay" id="bay-scroller">
                <div id="video-menu-hook" class="video-selection-grid"></div>
            </div>

        </section>

    </main>

    <footer class="system-dock">
        <div class="dock-social-row">
            <a href="https://music.apple.com/profile/cmdrq_music" target="_blank" class="dock-btn">
                <span>Apple Music</span>
            </a>
            <a href="https://www.tiktok.com/@commandr_q" target="_blank" class="dock-btn">
                <span>TikTok</span>
            </a>
        </div>
        <div class="center-logo-container">
            <img src="../images/vklogo.png" alt="VK Logo" class="dock-logo">
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const menuContainer = document.getElementById('video-menu-hook');
            const mainPlayer = document.getElementById('main-drift-player');
            const mainScroller = document.getElementById('main-scroller');
            const bayScroller = document.getElementById('bay-scroller');

            // FADE-IN SCROLLBAR ENGINE
            let mainScrollTimeout;
            let bayScrollTimeout;

            function triggerScrollbar(element, timeoutRef) {
                element.classList.add('scrolling');
                clearTimeout(timeoutRef);
                return setTimeout(() => {
                    element.classList.remove('scrolling');
                }, 1000);
            }

            mainScroller.addEventListener('scroll', () => {
                mainScrollTimeout = triggerScrollbar(mainScroller, mainScrollTimeout);
            });

            bayScroller.addEventListener('scroll', () => {
                bayScrollTimeout = triggerScrollbar(bayScroller, bayScrollTimeout);
            });

            // STARFIELD DRIFT ENGINE
            const starfield = document.getElementById('canvas-starfield-engine');
            const totalStars = window.innerWidth > 1024 ? 120 : 50;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const speed = Math.random() * 30 + 20;
                const size = Math.random() * 1.5 + 0.5;
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = Math.random() * 0.7 + 0.3;
                star.style.animation = `starDrift ${speed}s linear infinite`;
                star.style.animationDelay = `-${Math.random() * speed}s`;
                
                starfield.appendChild(star);
            }

            // DYNAMIC COMET ENGINE
            const canvas = document.getElementById('canvas-comet-engine');
            
            function launchComet() {
                const comet = document.createElement('div');
                comet.classList.add('comet');
                
                const startX = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.6);
                const startY = Math.random() * (window.innerHeight * 0.4);
                
                comet.style.left = `${startX}px`;
                comet.style.top = `${startY}px`;
                
                const duration = Math.random() * 0.8 + 0.6; 
                comet.style.animation = `streak ${duration}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                canvas.appendChild(comet);
                
                setTimeout(() => {
                    comet.remove();
                }, duration * 1000);
            }

            function queueNextComet() {
                const nextSpawnDelay = Math.random() * 4000 + 2000;
                setTimeout(() => {
                    launchComet();
                    queueNextComet();
                }, nextSpawnDelay);
            }
            queueNextComet();

            // DATA ENGINE ARRAY PROCESSING
            function cleanYouTubeUrl(urlStr) {
                let idFound = "";
                
                try {
                    if (urlStr.includes("youtube.com/embed/")) {
                        idFound = urlStr.split("youtube.com/embed/")[1].split("?")[0];
                    } else if (urlStr.includes("youtu.be/")) {
                        idFound = urlStr.split("youtu.be/")[1].split("?")[0];
                    } else if (urlStr.includes("v=")) {
                        idFound = urlStr.split("v=")[1].split("&")[0];
                    } else {
                        idFound = urlStr;
                    }
                } catch(e) {
                    console.error("URL processing failure", e);
                }
                
                return "https://www.youtube.com/embed/" + idFound.trim();
            }

            fetch('videos.json')
                .then(res => res.json())
                .then(data => {
                    menuContainer.innerHTML = '';
                    
                    data.forEach((item, index) => {
                        const btn = document.createElement('div');
                        btn.className = 'video-thumb';
                        btn.innerText = item.title;
                        
                        const safeBaseUrl = cleanYouTubeUrl(item.src);
                        const safeAutoplayUrl = safeBaseUrl + "?autoplay=1&rel=0&modestbranding=1";
                        
                        if (index === 0) {
                            btn.classList.add('active');
                            mainPlayer.src = safeBaseUrl + "?rel=0&modestbranding=1"; 
                        }

                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.video-thumb').forEach(t => t.classList.remove('active'));
                            btn.classList.add('active');
                            mainPlayer.src = safeAutoplayUrl;
                        });

                        menuContainer.appendChild(btn);
                    });
                })
                .catch(err => {
                    menuContainer.innerHTML = '<div style="color:#ffffff; font-size:1rem; text-align:center; width:100%; font-weight:700;">Configuration stream offline.</div>';
                });
        });
    </script>
</body>
</html>
