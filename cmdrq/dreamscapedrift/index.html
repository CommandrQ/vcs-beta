<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamscape Drift</title>
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* ==========================================================================
           VARIABLES & RESETS
           ========================================================================== */
        :root {
            --neon-cyan: #00f2fe;
            --space-bg: #03030c;
            --chassis-bg: rgba(10, 10, 25, 0.85);
            --text-main: #f0f4f8;
            --text-dim: #7a889b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            overflow-y: auto !important;
        }

        /* ==========================================================================
           AMBIENT BACKGROUND CANVAS
           ========================================================================== */
        #ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* ==========================================================================
           LAYOUT & CHASSIS
           ========================================================================== */
        .mp4-chassis {
            max-width: 600px;
            margin: 40px auto;
            background: var(--chassis-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
                border-color: rgba(0, 242, 254, 0.2);
            }
            100% {
                box-shadow: 0 0 35px rgba(0, 242, 254, 0.35);
                border-color: rgba(0, 242, 254, 0.5);
            }
        }

        /* ==========================================================================
           HEADER BLOCK
           ========================================================================== */
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .back-link:hover {
            color: var(--neon-cyan);
        }

        /* ==========================================================================
           VIDEO VIEWPORT (16:9)
           ========================================================================== */
        .video-viewport {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-viewport iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* ==========================================================================
           SELECTOR MANIFEST MATRIX
           ========================================================================== */
        .manifest-matrix {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .manifest-matrix::-webkit-scrollbar {
            width: 6px;
        }

        .manifest-matrix::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 3px;
        }

        .manifest-matrix::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 3px;
        }

        .manifest-matrix::-webkit-scrollbar-thumb:hover {
            background: var(--neon-cyan);
        }

        .track-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 14px 18px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-btn:hover {
            background: rgba(0, 242, 254, 0.08);
            border-color: rgba(0, 242, 254, 0.4);
            color: #fff;
            transform: translateX(4px);
        }

        .track-btn.active {
            background: rgba(0, 242, 254, 0.15);
            border-color: var(--neon-cyan);
            color: #fff;
            box-shadow: inset 0 0 8px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="ambient-canvas"></canvas>

    <main class="mp4-chassis">
        <header class="player-header">
            <h1>Dreamscape Drift</h1>
            <a href="../" class="back-link">← Back</a>
        </header>

        <section class="video-viewport">
            <iframe 
                id="main-player"
                src="https://www.youtube.com/embed/videoseries?list=PLwX0pb3GErelnv2imByTWq5TmSSSSiosp&rel=0&modestbranding=1&vq=hd1080"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </section>

        <nav class="manifest-matrix" id="track-manifest" aria-label="Playlist tracks"></nav>
    </main>

    <script>
        /* ==========================================================================
           GLOBAL CONFIGURATION
           ========================================================================== */
        const PLAYLIST_ID = 'PLwX0pb3GErelnv2imByTWq5TmSSSSiosp';
        const CONFIG = {
            selectors: {
                player: '#main-player',
                manifest: '#track-manifest',
                canvas: '#ambient-canvas'
            },
            endpoints: {
                data: 'videos.json'
            },
            states: {
                activeClass: 'active',
                toggles: {
                    autoplayClick: 'on'
                }
            }
        };

        /* ==========================================================================
           UTILITIES & UTILS ENGINE
           ========================================================================== */
        function extractVideoToken(urlStr) {
            if (!urlStr) return '';
            const cleanStr = urlStr.trim();
            
            // Handle embed paths or standard watch queries
            if (cleanStr.includes('embed/')) {
                return cleanStr.split('embed/')[1].split('?')[0];
            }
            if (cleanStr.includes('v=')) {
                return cleanStr.split('v=')[1].split('&')[0];
            }
            if (cleanStr.includes('youtu.be/')) {
                return cleanStr.split('youtu.be/')[1].split('?')[0];
            }
            return cleanStr; // Fallback assumes raw token
        }

        /* ==========================================================================
           AMBIENT VISUAL CANVAS ENGINE
           ========================================================================== */
        class AmbientEngine {
            constructor(canvasId) {
                this.canvas = document.querySelector(canvasId);
                if (!this.canvas) return;
                this.ctx = this.canvas.getContext('2d');
                this.stars = [];
                this.comets = [];
                this.init();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Populate initial starfield
                for (let i = 0; i < 120; i++) {
                    this.stars.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 1.5,
                        speed: Math.random() * 0.15 + 0.05
                    });
                }
                this.animate();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            animate() {
                this.ctx.fillStyle = '#03030c';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Render & Update Drift Stars
                this.ctx.fillStyle = '#ffffff';
                this.stars.forEach(star => {
                    this.ctx.beginPath();
                    this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    this.ctx.fill();

                    star.y += star.speed;
                    if (star.y > this.canvas.height) {
                        star.y = 0;
                        star.x = Math.random() * this.canvas.width;
                    }
                });

                // Spawn and Render Passing Comets
                if (Math.random() < 0.003 && this.comets.length < 2) {
                    this.comets.push({
                        x: Math.random() * this.canvas.width,
                        y: -50,
                        length: Math.random() * 80 + 40,
                        speedX: Math.random() * 4 + 2,
                        speedY: Math.random() * 3 + 2,
                        alpha: 1
                    });
                }

                this.comets.forEach((comet, index) => {
                    this.ctx.strokeStyle = `rgba(0, 242, 254, ${comet.alpha})`;
                    this.ctx.lineWidth = 1.5;
                    this.ctx.beginPath();
                    this.ctx.moveTo(comet.x, comet.y);
                    this.ctx.lineTo(comet.x - comet.length, comet.y - (comet.length * 0.6));
                    this.ctx.stroke();

                    comet.x += comet.speedX;
                    comet.y += comet.speedY;
                    comet.alpha -= 0.005;

                    if (comet.y > this.canvas.height || comet.x > this.canvas.width || comet.alpha <= 0) {
                        this.comets.splice(index, 1);
                    }
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        /* ==========================================================================
           PLAYBACK & DATA FLOW ENGINE
           ========================================================================== */
        class PlaybackEngine {
            constructor() {
                this.playerFrame = document.querySelector(CONFIG.selectors.player);
                this.manifestContainer = document.querySelector(CONFIG.selectors.manifest);
                this.tracks = [];
            }

            async initialize() {
                try {
                    const response = await fetch(CONFIG.endpoints.data);
                    if (!response.ok) throw new Error('Network payload execution failure');
                    this.tracks = await response.json();
                    this.renderManifest();
                } catch (error) {
                    this.manifestContainer.innerHTML = `<div style="color: var(--neon-cyan); padding: 10px;">Failed to initialize tracks portfolio data mapping.</div>`;
                }
            }

            renderManifest() {
                this.manifestContainer.innerHTML = '';
                if (!Array.isArray(this.tracks)) return;

                this.tracks.forEach((track, index) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'track-btn';
                    button.textContent = track.title || `Track ${index + 1}`;
                    button.dataset.index = index;

                    button.addEventListener('click', () => this.handleTrackSelection(track, button));
                    this.manifestContainer.appendChild(button);
                });
            }

            handleTrackSelection(track, selectedButton) {
                const videoToken = extractVideoToken(track.video_url || track.url || track.id);
                if (!videoToken) return;

                // Clear previous actives
                this.manifestContainer.querySelectorAll('.track-btn').forEach(btn => {
                    btn.classList.remove(CONFIG.states.activeClass);
                });
                selectedButton.classList.add(CONFIG.states.activeClass);

                // Build modern isolated context url targets
                let targetSrc = `https://www.youtube.com/embed/${videoToken}?list=${PLAYLIST_ID}&rel=0&modestbranding=1&vq=hd1080`;
                
                if (CONFIG.states.toggles.autoplayClick === 'on') {
                    targetSrc += '&autoplay=1';
                }

                this.playerFrame.setAttribute('src', targetSrc);
            }
        }

        /* ==========================================================================
           EXECUTION LOOP INITIALIZATION
           ========================================================================== */
        document.addEventListener('DOMContentLoaded', () => {
            new AmbientEngine(CONFIG.selectors.canvas);
            const playerInstance = new PlaybackEngine();
            playerInstance.initialize();
        });
    </script>
</body>
</html>
