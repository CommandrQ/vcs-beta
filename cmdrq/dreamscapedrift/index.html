<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamscape Drift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* --- NATURAL FLOW RESETS --- */
        html, body {
            overflow-x: hidden !important;
            overflow-y: auto !important; /* Allows natural native page scrolling */
            height: auto !important;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* --- STABLE MAIN GRID LAYOUT --- */
        .terminal-container {
            max-width: 900px;
            width: 90%;
            margin: 40px auto 120px auto; /* Centered with healthy scrolling breathing room */
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
        }

        .player-header {
            text-align: center;
            margin-bottom: 8px;
        }

        /* --- THE CYAN GLOW DISPLAY CHASSIS --- */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: rgba(6, 11, 20, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(77, 208, 225, 0.4);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: customCyanGlow 5s ease-in-out infinite;
        }

        @keyframes customCyanGlow {
            0%, 100% {
                border-color: rgba(77, 208, 225, 0.4);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(77, 208, 225, 0.1);
            }
            50% {
                border-color: rgba(34, 211, 238, 0.8);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(34, 211, 238, 0.4);
            }
        }

        /* --- THE VIDEO PRESENTATION RACK --- */
        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* --- PLAYLIST PLAYBACK ARRAY GRID --- */
        .playlist-array-header {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #22d3ee;
            text-transform: uppercase;
            margin: 0 0 1rem 0;
            border-bottom: 1px dashed rgba(77, 208, 225, 0.3);
            padding-bottom: 0.5rem;
        }

        .video-selection-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            width: 100%;
        }

        /* --- MENU BUTTON SELECTIONS --- */
        .video-thumb {
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.3) 100%);
            border: 1px solid rgba(77, 208, 225, 0.3);
            border-radius: 12px; 
            padding: 1.1rem 1.5rem;
            text-align: left;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            width: 100%;
            white-space: normal;
            word-wrap: break-word;
        }

        .video-thumb:hover {
            transform: translateY(-2px);
            border-color: #22d3ee;
            box-shadow: 0 5px 15px rgba(77, 208, 225, 0.25);
            background: rgba(77, 208, 225, 0.05);
        }

        .video-thumb.active {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* --- FLOATING COCKPIT FOOTER --- */
        .system-dock {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* --- DESKTOP GRID ADAPTATIONS --- */
        @media (min-width: 768px) {
            .video-selection-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="starfield-canvas" id="canvas-starfield-engine"></div>
    <div class="comet-canvas" id="canvas-comet-engine"></div>
    <div class="cyber-grid"></div>
    <div class="ambient-flare"></div>

    <main class="terminal-container">
        
        <header class="player-header">
            <h1 class="commander-title">Dreamscape Drift</h1>
            <a class="commander-role" href="../" style="text-decoration: none; border-bottom: 1px dashed var(--gold); transition: all 0.3s ease;">
                ← Back to Control Deck
            </a>
        </header>

        <section class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <iframe id="main-drift-player" src="https://www.youtube.com/embed/videoseries?list=PLwX0pb3GErelnv2imByTWq5TmSSSSiosp&rel=0&modestbranding=1&vq=hd1080" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <h2 class="playlist-array-header">Sector Manifest Arrays</h2>
            <div id="video-menu-hook" class="video-selection-grid">
                <div style="color: rgba(255,255,255,0.4); font-size: 0.9rem;">Initializing transmission manifest vectors...</div>
            </div>

        </section>

        <footer class="system-dock">
            <div class="center-logo-container">
                <img src="../images/vklogo.png" alt="VK Logo" class="dock-logo">
            </div>
        </footer>

    </main>

    <script>
        // --- BACKGROUND AMBIENCE LOGIC MATRIX ---
        document.addEventListener("DOMContentLoaded", () => {
            const starfield = document.getElementById('canvas-starfield-engine');
            const totalStars = window.innerWidth > 1024 ? 120 : 50;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const speed = Math.random() * 30 + 20;
                const size = Math.random() * 1.5 + 0.5;
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = Math.random() * 0.7 + 0.3;
                star.style.animation = `starDrift ${speed}s linear infinite`;
                star.style.animationDelay = `-${Math.random() * speed}s`;
                
                starfield.appendChild(star);
            }

            const canvas = document.getElementById('canvas-comet-engine');
            function launchComet() {
                const comet = document.createElement('div');
                comet.classList.add('comet');
                const startX = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.6);
                const startY = Math.random() * (window.innerHeight * 0.4);
                
                comet.style.left = `${startX}px`;
                comet.style.top = `${startY}px`;
                const duration = Math.random() * 0.8 + 0.6; 
                comet.style.animation = `streak ${duration}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                canvas.appendChild(comet);
                setTimeout(() => { comet.remove(); }, duration * 1000);
            }

            function queueNextComet() {
                setTimeout(() => {
                    launchComet();
                    queueNextComet();
                }, Math.random() * 4000 + 2000);
            }
            queueNextComet();

            // --- VIDEO ARRAYS SELECTION ENGINE ---
            const menuContainer = document.getElementById('video-menu-hook');
            const mainPlayer = document.getElementById('main-drift-player');
            const playlistId = "PLwX0pb3GErelnv2imByTWq5TmSSSSiosp";

            function cleanYouTubeUrl(urlStr) {
                let idFound = "";
                try {
                    if (urlStr.includes("youtube.com/embed/")) {
                        idFound = urlStr.split("youtube.com/embed/")[1].split("?")[0];
                    } else if (urlStr.includes("youtu.be/")) {
                        idFound = urlStr.split("youtu.be/")[1].split("?")[0];
                    } else if (urlStr.includes("v=")) {
                        idFound = urlStr.split("v=")[1].split("&")[0];
                    } else {
                        idFound = urlStr;
                    }
                } catch(e) {
                    console.error("URL manipulation validation trap cleared.", e);
                }
                return idFound.trim();
            }

            // Fetches matching stream files from your directory configuration asset
            fetch('videos.json')
                .then(res => res.json())
                .then(data => {
                    menuContainer.innerHTML = '';
                    
                    data.forEach((item, index) => {
                        const btn = document.createElement('div');
                        btn.className = 'video-thumb';
                        btn.innerText = item.title;
                        
                        const videoId = cleanYouTubeUrl(item.src);
                        // Construct path embedding target item seamlessly with fallback playlist contexts
                        const safeBaseUrl = `https://www.youtube.com/embed/${videoId}?list=${playlistId}`;
                        const safeAutoplayUrl = `${safeBaseUrl}&autoplay=1&rel=0&modestbranding=1`;
                        
                        if (index === 0) {
                            btn.classList.add('active');
                            // Prime initialization index 
                            mainPlayer.src = `${safeBaseUrl}&rel=0&modestbranding=1`; 
                        }

                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.video-thumb').forEach(t => t.classList.remove('active'));
                            btn.classList.add('active');
                            mainPlayer.src = safeAutoplayUrl;
                        });

                        menuContainer.appendChild(btn);
                    });
                })
                .catch(err => {
                    // Fallback to generic playlist load sequence if video asset maps are unlinked
                    menuContainer.innerHTML = `
                        <div class="video-thumb active" style="grid-column: 1 / -1; text-align: center;">
                            LOAD COMPREHENSIVE STREAM ARCHIVE DIRECTLY
                        </div>`;
                    
                    menuContainer.querySelector('.video-thumb').addEventListener('click', () => {
                        mainPlayer.src = `https://www.youtube.com/embed/videoseries?list=${playlistId}&autoplay=1&rel=0&modestbranding=1`;
                    });
                });
        });
    </script>
</body>
</html>
