<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commander Q // Dreamscape Drift</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* --- FORCE SYSTEM SCREEN LOCK (STOP ALL SCROLLING) --- */
        html, body {
            overflow: hidden !important;
            height: 100dvh;
            width: 100vw;
        }

        .hub-container {
            height: 100dvh;
            max-height: 100dvh;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 92%; 
            max-width: 500px !important; /* Unified mobile & desktop width */
            margin: 0 auto;
        }

        /* --- PULSING EDGE FRAME --- */
        .hub-card {
            display: flex;
            flex-direction: column;
            height: auto;
            max-height: 85dvh;
            padding: 20px;
            margin-bottom: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: borderGlowPulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes borderGlowPulse {
            0%, 100% {
                border-color: rgba(255, 255, 255, 0.15);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            }
            50% {
                border-color: rgba(142, 202, 230, 0.7);
                box-shadow: 0 20px 50px rgba(142, 202, 230, 0.15), 0 0 20px rgba(142, 202, 230, 0.2);
            }
        }

        /* --- PLAYER VIEWPORT FRAME --- */
        .player-viewport {
            width: 100%;
            background: #000000;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .player-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* --- INDEPENDENT SCROLLER FOR VIDEO SELECTIONS --- */
        .scroller-bay {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .scroller-bay::-webkit-scrollbar { width: 4px; }
        .scroller-bay::-webkit-scrollbar-track { background: transparent; }
        .scroller-bay::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .video-selection-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        /* --- MENU BUTTON SHAPES --- */
        .video-thumb {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px; 
            padding: 12px 15px;
            text-align: center;
            color: var(--light-blue);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            flex-shrink: 0;
        }

        .video-thumb:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--light-blue);
        }

        .video-thumb.active {
            background: var(--light-blue);
            color: var(--deep-space);
            border-color: var(--light-blue);
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <div class="hub-container">
        <h1 class="hub-title" style="margin-bottom: 10px;">Dreamscape Drift</h1>

        <main class="hub-card">

            <!-- YOUTUBE IFRAME VIEWPORT -->
            <div class="player-viewport">
                <iframe id="main-drift-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <!-- SCROLLABLE LIST SELECTION ARRAYS -->
            <div class="scroller-bay">
                <h2>Video Menu</h2>
                <div id="video-menu-hook" class="video-selection-grid" style="margin-top: 10px;"></div>
            </div>

            <div style="text-align: center; margin-top: 15px; flex-shrink: 0;">
                <a href="../home.html" class="hub-return-link">← Return to Control Deck</a>
            </div>
        </main>
    </div>

    <footer class="system-footer" style="padding: 10px 0 5px;">
        &copy; <span id="current-year"></span> Vanguard Citizen Services
    </footer>

    <!-- INTERACTION AND URL EXTRACTION ENGINE -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuContainer = document.getElementById('video-menu-hook');
            const mainPlayer = document.getElementById('main-drift-player');

            const yearSpan = document.getElementById('current-year');
            if (yearSpan) yearSpan.innerText = new Date().getFullYear();

            /**
             * CONVERTER ENGINE
             * Converts regular watch paths into valid embed parameters
             */
            function cleanYouTubeUrl(urlStr) {
                let idFound = "";
                
                try {
                    if (urlStr.includes("youtube.com/embed/")) {
                        idFound = urlStr.split("youtube.com/embed/")[1].split("?")[0];
                    } else if (urlStr.includes("youtu.be/")) {
                        idFound = urlStr.split("youtu.be/")[1].split("?")[0];
                    } else if (urlStr.includes("v=")) {
                        idFound = urlStr.split("v=")[1].split("&")[0];
                    } else {
                        idFound = urlStr;
                    }
                } catch(e) {
                    console.error("URL string parsing error", e);
                }
                
                return "https://www.youtube.com/embed/" + idFound.trim();
            }

            // Load and build configurations
            fetch('videos.json')
                .then(res => res.json())
                .then(data => {
                    menuContainer.innerHTML = '';
                    
                    data.forEach((item, index) => {
                        const btn = document.createElement('div');
                        btn.className = 'video-thumb';
                        btn.innerText = item.title;
                        
                        const safeBaseUrl = cleanYouTubeUrl(item.src);
                        const safeAutoplayUrl = safeBaseUrl + "?autoplay=1&rel=0";
                        
                        if (index === 0) {
                            btn.classList.add('active');
                            mainPlayer.src = safeBaseUrl + "?rel=0"; 
                        }

                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.video-thumb').forEach(t => t.classList.remove('active'));
                            btn.classList.add('active');
                            mainPlayer.src = safeAutoplayUrl;
                        });

                        menuContainer.appendChild(btn);
                    });
                })
                .catch(err => {
                    menuContainer.innerHTML = '<div style="color:rgba(255,255,255,0.4); font-size:0.8rem; text-align:center; width:100%;">Configuration stream offline.</div>';
                });
        });
    </script>
</body>
</html>
