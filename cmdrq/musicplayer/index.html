<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSIC PLAYER</title>
    <link rel="stylesheet" href="../style.css?v=2">
    <style>
        /* --- MP4 CHASSIS DESIGN PROFILES --- */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 380px; 
            margin: 0 auto;
            background: #000000;
            border: 2px solid var(--purple-muted);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 0 25px rgba(149, 117, 205, 0.4);
        }

        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #020105;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* Metadata Deck with Text-Wrapping Frameworks */
        .mp4-metadata-deck {
            text-align: center;
            padding: 4px 8px 12px 8px;
            border-bottom: 1px dashed rgba(149, 117, 205, 0.2);
            margin-bottom: 16px;
            min-height: 52px; 
        }

        .mp4-track-title {
            font-size: 1.05rem;
            font-weight: 900;
            color: #e1d5ff;
            margin-bottom: 6px;
            text-shadow: 0 0 10px var(--purple-glow);
            white-space: normal;
            word-wrap: break-word;
            overflow: visible;
            text-overflow: clip;
        }

        .mp4-track-author {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--purple-glow);
            text-transform: uppercase;
            white-space: normal;
            word-wrap: break-word;
            overflow: visible;
            text-overflow: clip;
        }

        /* Physical Device Hardware Controls Wheel */
        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }

        .mp4-btn {
            background: rgba(149, 117, 205, 0.04);
            border: 2px solid var(--purple-muted);
            color: #e1d5ff;
            padding: 10px 20px;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 0 6px rgba(149, 117, 205, 0.2);
        }

        .mp4-btn:hover {
            background: rgba(149, 117, 205, 0.15);
            border-color: var(--purple-glow);
            color: #ffffff;
            box-shadow: 0 0 12px var(--purple-glow);
        }

        .mp4-btn.active-load {
            border-color: var(--blue-muted);
            color: var(--blue-muted);
            box-shadow: 0 0 12px rgba(77, 208, 225, 0.3);
        }

        .mp4-btn.active-play {
            border-color: var(--pink-neon);
            color: var(--pink-neon);
            box-shadow: 0 0 12px var(--pink-glow);
        }

        /* Desktop Optimization Magnifier Interceptors */
        @media (min-width: 901px) {
            .hub-container {
                max-width: 550px !important;
            }
            .mp4-chassis {
                max-width: 460px;
                padding: 24px;
            }
            .mp4-metadata-deck {
                min-height: 64px;
                margin-bottom: 20px;
            }
            .mp4-track-title { font-size: 1.2rem; }
            .mp4-track-author { font-size: 0.85rem; }
            .mp4-btn { padding: 12px 26px; font-size: 0.85rem; }
            .dock-link { font-size: 0.95rem !important; }
        }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>
    <div class="ambient-glow"></div>

    <div class="hub-container">
        
        <main class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <div id="player-target"></div>
            </div>

            <div class="mp4-metadata-deck">
                <div id="live-title" class="mp4-track-title">STATION STANDBY</div>
                <div id="live-author" class="mp4-track-author">Tap Load Array</div>
            </div>

            <div class="mp4-controls-wheel">
                <button class="mp4-btn" id="mp4-prev">Prev</button>
                <button class="mp4-btn active-load" id="mp4-play-toggle">Load</button>
                <button class="mp4-btn" id="mp4-next">Next</button>
            </div>

            <div style="text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                <a href="../" class="dock-link" style="font-size: 0.75rem;">← Return to Control Deck</a>
            </div>

        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const playToggleBtn = document.getElementById('mp4-play-toggle');
        const liveTitle = document.getElementById('live-title');
        const liveAuthor = document.getElementById('live-author');
        
        let hasInitialized = false;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-target', {
                width: '100%',
                height: '100%',
                playerVars: {
                    listType: 'playlist',
                    list: 'PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP',
                    enablejsapi: 1,
                    rel: 0,
                    modestbranding: 1,
                    vq: 'hd1080'
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function updateMetadataDisplay() {
            if (player && typeof player.getVideoData === 'function') {
                const videoData = player.getVideoData();
                if (videoData) {
                    if (videoData.title) liveTitle.innerText = videoData.title.toUpperCase();
                    if (videoData.author) liveAuthor.innerText = videoData.author.toUpperCase();
                }
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                updateMetadataDisplay();
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.remove('active-load');
                playToggleBtn.classList.add('active-play');
            }
        }

        playToggleBtn.addEventListener('click', () => {
            if (!hasInitialized) {
                player.playVideo();
                hasInitialized = true;
                return;
            }

            if (isPlaying) {
                player.pauseVideo();
                isPlaying = false;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.remove('active-play');
            } else {
                player.playVideo();
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.add('active-play');
            }
        });

        document.getElementById('mp4-next').addEventListener('click', () => {
            player.nextVideo();
            hasInitialized = true;
        });

        document.getElementById('mp4-prev').addEventListener('click', () => {
            player.previousVideo();
            hasInitialized = true;
        });
    </script>
</body>
</html>
