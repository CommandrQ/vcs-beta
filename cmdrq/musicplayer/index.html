<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSIC PLAYER</title>
    <link rel="stylesheet" href="../style.css?v=2">
    <style>
        /* --- MP4 CHASSIS OVERRIDES --- */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 380px; 
            margin: 0 auto;
            background: #000000;
            border: 2px solid var(--purple-muted);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 0 25px rgba(149, 117, 205, 0.4);
        }

        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #020105;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px; /* Increased spacer footprint since text header block was dropped */
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* Physical Wheel Media Controls Block */
        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 12px 0 4px 0;
        }

        .mp4-btn {
            background: rgba(149, 117, 205, 0.04);
            border: 2px solid var(--purple-muted);
            color: #e1d5ff;
            padding: 10px 20px;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 0 6px rgba(149, 117, 205, 0.2);
        }

        .mp4-btn:hover {
            background: rgba(149, 117, 205, 0.15);
            border-color: var(--purple-glow);
            color: #ffffff;
            box-shadow: 0 0 12px var(--purple-glow);
        }

        .mp4-btn.active-load {
            border-color: var(--blue-muted);
            color: var(--blue-muted);
            box-shadow: 0 0 12px rgba(77, 208, 225, 0.3);
        }

        .mp4-btn.active-play {
            border-color: var(--pink-neon);
            color: var(--pink-neon);
            box-shadow: 0 0 12px var(--pink-glow);
        }

        /* --- DESKTOP TYPOGRAPHY SCALING INTERCEPTORS --- */
        @media (min-width: 901px) {
            .hub-container {
                max-width: 550px !important; /* Expansion framework optimization for desktop views */
            }
            .mp4-chassis {
                max-width: 460px;
                padding: 24px;
            }
            .mp4-btn {
                padding: 12px 26px;
                font-size: 0.85rem;
            }
            .dock-link {
                font-size: 0.95rem !important;
            }
        }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>
    <div class="ambient-glow"></div>

    <div class="hub-container">
        
        <main class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <iframe id="mp4-video-frame" src="https://www.youtube.com/embed/videoseries?listType=playlist&list=PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP&enablejsapi=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="mp4-controls-wheel">
                <button class="mp4-btn" id="mp4-prev">Prev</button>
                <button class="mp4-btn active-load" id="mp4-play-toggle">Load</button>
                <button class="mp4-btn" id="mp4-next">Next</button>
            </div>

            <div style="text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                <a href="../" class="dock-link" style="font-size: 0.75rem;">← Return to Control Deck</a>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playerIframe = document.getElementById('mp4-video-frame');
            const playToggleBtn = document.getElementById('mp4-play-toggle');
            
            let hasInitialized = false;
            let isPlaying = false; 

            playToggleBtn.addEventListener('click', () => {
                // Initial state logic check: fires playlist bootstrap link alignment rules first
                if (!hasInitialized) {
                    playerIframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    hasInitialized = true;
                    isPlaying = true;
                    playToggleBtn.innerText = "Pause";
                    playToggleBtn.classList.remove('active-load');
                    playToggleBtn.classList.add('active-play');
                    return;
                }

                // Subsequent toggle operations handling looping values properly
                isPlaying = !isPlaying;
                if (isPlaying) {
                    playerIframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    playToggleBtn.innerText = "Pause";
                    playToggleBtn.classList.add('active-play');
                } else {
                    playerIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                    playToggleBtn.innerText = "Play";
                    playToggleBtn.classList.remove('active-play');
                }
            });

            document.getElementById('mp4-next').addEventListener('click', () => {
                playerIframe.contentWindow.postMessage('{"event":"command","func":"nextVideo","args":""}', '*');
                hasInitialized = true;
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.remove('active-load');
                playToggleBtn.classList.add('active-play');
            });

            document.getElementById('mp4-prev').addEventListener('click', () => {
                playerIframe.contentWindow.postMessage('{"event":"command","func":"previousVideo","args":""}', '*');
                hasInitialized = true;
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.remove('active-load');
                playToggleBtn.classList.add('active-play');
            });
        });
    </script>
</body>
</html>
