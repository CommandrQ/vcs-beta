<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* --- NATURAL FLOW RESETS --- */
        html, body {
            overflow-x: hidden !important;
            overflow-y: auto !important; /* Allows natural native page scrolling */
            height: auto !important;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* --- STABLE MAIN GRID LAYOUT --- */
        .terminal-container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto 120px auto; /* Centered with healthy scrolling breathing room */
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
        }

        .player-header {
            text-align: center;
            margin-bottom: 8px;
        }

        /* --- THE PURPLE GLOW DISPLAY CHASSIS --- */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: rgba(10, 6, 20, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(147, 51, 234, 0.4);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: customPurpleGlow 5s ease-in-out infinite;
        }

        @keyframes customPurpleGlow {
            0%, 100% {
                border-color: rgba(147, 51, 234, 0.4);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(147, 51, 234, 0.1);
            }
            50% {
                border-color: rgba(168, 85, 247, 0.8);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(168, 85, 247, 0.4);
            }
        }

        /* --- THE VIDEO PRESENTATION RACK --- */
        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* --- SCROLLING TEXT MARQUEE SYSTEM --- */
        .mp4-metadata-deck {
            text-align: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed rgba(147, 51, 234, 0.3);
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        .marquee-window {
            width: 100%;
            overflow: hidden;
            position: relative;
            white-space: nowrap;
            height: 32px;
        }

        .mp4-track-title {
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 32px;
        }

        /* Classes flipped dynamically based on pixel checking logic */
        .animate-marquee {
            padding-left: 100%;
            animation: textLoopTicker 15s linear infinite;
        }

        .static-center {
            width: 100%;
            text-align: center;
        }

        @keyframes textLoopTicker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .mp4-track-author {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #a855f7;
            text-transform: uppercase;
            margin-top: 6px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- CONTROL CONSOLE BUTTONS --- */
        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.25rem;
            width: 100%;
        }

        .mp4-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.3) 100%);
            border: 1px solid rgba(147, 51, 234, 0.4);
            color: #ffffff;
            padding: 12px 28px;
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            flex: 1;
            max-width: 160px;
            text-align: center;
        }

        .mp4-btn:hover {
            transform: translateY(-2px);
            border-color: #a855f7;
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.35);
        }

        .mp4-btn.active-play {
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* --- FLOATING COCKPIT FOOTER --- */
        .system-dock {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="starfield-canvas" id="canvas-starfield-engine"></div>
    <div class="comet-canvas" id="canvas-comet-engine"></div>
    <div class="cyber-grid"></div>
    <div class="ambient-flare"></div>

    <main class="terminal-container">
        
        <header class="player-header">
            <h1 class="commander-title">Music Player</h1>
            <a class="commander-role" href="../" style="text-decoration: none; border-bottom: 1px dashed var(--gold); transition: all 0.3s ease;">
                ← Back to Control Deck
            </a>
        </header>

        <section class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <iframe id="mp4-video-frame" src="https://www.youtube.com/embed/videoseries?listType=playlist&list=PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP&enablejsapi=1&rel=0&modestbranding=1&vq=hd1080" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="mp4-metadata-deck">
                <div class="marquee-window" id="title-window-frame">
                    <div id="live-title" class="mp4-track-title static-center">PLAYLIST STANDING BY</div>
                </div>
                <div id="live-author" class="mp4-track-author">AWAITING DRIVER INITIATION</div>
            </div>

            <div class="mp4-controls-wheel">
                <button class="mp4-btn" id="mp4-prev">Prev</button>
                <button class="mp4-btn" id="mp4-play-toggle">Load</button>
                <button class="mp4-btn" id="mp4-next">Next</button>
            </div>

        </section>

        <footer class="system-dock">
            <div class="center-logo-container">
                <img src="../images/vklogo.png" alt="VK Logo" class="dock-logo">
            </div>
        </footer>

    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- BACKGROUND AMBIENCE LOGIC MATRIX ---
        document.addEventListener("DOMContentLoaded", () => {
            const starfield = document.getElementById('canvas-starfield-engine');
            const totalStars = window.innerWidth > 1024 ? 120 : 50;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const speed = Math.random() * 30 + 20;
                const size = Math.random() * 1.5 + 0.5;
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = Math.random() * 0.7 + 0.3;
                star.style.animation = `starDrift ${speed}s linear infinite`;
                star.style.animationDelay = `-${Math.random() * speed}s`;
                
                starfield.appendChild(star);
            }

            const canvas = document.getElementById('canvas-comet-engine');
            function launchComet() {
                const comet = document.createElement('div');
                comet.classList.add('comet');
                const startX = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.6);
                const startY = Math.random() * (window.innerHeight * 0.4);
                
                comet.style.left = `${startX}px`;
                comet.style.top = `${startY}px`;
                const duration = Math.random() * 0.8 + 0.6; 
                comet.style.animation = `streak ${duration}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                canvas.appendChild(comet);
                setTimeout(() => { comet.remove(); }, duration * 1000);
            }

            function queueNextComet() {
                setTimeout(() => {
                    launchComet();
                    queueNextComet();
                }, Math.random() * 4000 + 2000);
            }
            queueNextComet();
        });

        // --- HARDWARE INTERFACE WIRE-UP ---
        let player;
        const playToggleBtn = document.getElementById('mp4-play-toggle');
        const liveTitle = document.getElementById('live-title');
        const liveAuthor = document.getElementById('live-author');
        const windowFrame = document.getElementById('title-window-frame');
        
        let hasInitialized = false;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('mp4-video-frame', {
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function verifyAndTriggerMarquee() {
            try {
                const videoData = player.getVideoData();
                if (videoData && videoData.title) {
                    const freshTitle = videoData.title.toUpperCase();
                    
                    // Reset class configurations before performing dimension tracking passes
                    liveTitle.className = "mp4-track-title";
                    liveTitle.innerText = freshTitle;
                    liveAuthor.innerText = videoData.author ? videoData.author.toUpperCase() : "YOUTUBE COMPILATION LAYER";

                    // Compare textual box footprints to verify overflow states
                    const availableSizing = windowFrame.offsetWidth;
                    const textFootprintWidth = liveTitle.scrollWidth;

                    if (textFootprintWidth > availableSizing) {
                        liveTitle.classList.add('animate-marquee');
                        // Calculate dynamic velocity limits so string density doesn't distort playback rate
                        const calculatedDuration = Math.max(10, Math.min(25, textFootprintWidth / 28));
                        liveTitle.style.animationDuration = `${calculatedDuration}s`;
                    } else {
                        liveTitle.classList.add('static-center');
                    }
                }
            } catch (e) {
                console.log("Handshake streaming verification tick buffered.");
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                verifyAndTriggerMarquee();
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.add('active-play');
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.remove('active-play');
            }
        }

        playToggleBtn.addEventListener('click', () => {
            if (!hasInitialized) {
                player.playVideo();
                hasInitialized = true;
                return;
            }
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        document.getElementById('mp4-next').addEventListener('click', () => {
            if (player) {
                player.nextVideo();
                hasInitialized = true;
            }
        });

        document.getElementById('mp4-prev').addEventListener('click', () => {
            if (player) {
                player.previousVideo();
                hasInitialized = true;
            }
        });

        // Recalculate text overflow layouts cleanly if window boundaries morph
        window.addEventListener('resize', () => {
            if (hasInitialized) verifyAndTriggerMarquee();
        });
    </script>
</body>
</html>
