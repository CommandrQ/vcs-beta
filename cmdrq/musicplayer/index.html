<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Station | The Hideout</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --light-purple: #e0c3fc;
            --light-blue: #8ecae6;
            --deep-space: #0f0c29;
            --glass-bg: rgba(15, 15, 25, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #2b1055 70%, #7597de 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh; 
        }

        /* --- Background Matrix Animation --- */
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 1000; pointer-events: none; animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        #starfield { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .stars { position: absolute; width: 2px; height: 2px; background: transparent; 
                  box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 60vw 80vh #fff, 45vw 15vh #fff;
                  animation: moveStars 150s linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* --- Layout Container --- */
        .player-container {
            width: 90%;
            max-width: 450px;
            z-index: 10;
            padding: 40px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: auto 0; 
            transition: max-width 0.4s ease;
        }

        /* Responsive Widescreen Optimization */
        @media (min-width: 768px) {
            .player-container {
                max-width: 850px; 
            }
        }

        .commander-title { 
            font-size: clamp(2rem, 6vw, 2.8rem); font-weight: bold; 
            background: linear-gradient(to right, #8ecae6 20%, #fff 40%, #fff 60%, #8ecae6 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: sheen 3s linear infinite;
            margin-bottom: 25px;
        }
        @keyframes sheen { to { background-position: 200% center; } }

        .settings-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            margin-bottom: 20px; 
        }

        .intro-block {
            width: 100%;
            margin-bottom: 25px;
        }

        h2 { color: var(--light-blue); margin-bottom: 15px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; }
        p { font-size: 0.95rem; line-height: 1.6; color: rgba(255, 255, 255, 0.8); }

        /* --- Split Column Engine for Widescreen Presentation --- */
        .deck-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .deck-layout {
                flex-direction: row;
                align-items: center;
                text-align: left;
                gap: 30px;
            }
            .deck-left {
                flex: 1.3;
                width: 100%;
            }
            .deck-right {
                flex: 1;
                width: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .intro-block {
                text-align: center;
            }
        }

        /* --- YouTube Frame Viewport --- */
        .video-viewport {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4);
            aspect-ratio: 16 / 9;
        }

        /* --- Live Track Metadata Box --- */
        .track-info-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 18px 20px;
            text-align: center;
        }
        @media (min-width: 768px) {
            .track-info-box {
                text-align: left;
                padding: 22px 24px;
            }
        }
        .track-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            line-height: 1.4;
        }

        /* --- Control Mechanics Layout --- */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
        }
        @media (min-width: 768px) {
            .controls-row {
                justify-content: flex-start;
                margin-top: 25px;
            }
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 50px; border: 1px solid var(--light-blue); 
            background: transparent; color: var(--light-blue); font-weight: bold; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
            margin-bottom: 15px; text-decoration: none; display: inline-block; letter-spacing: 1px;
            text-align: center;
        }
        .btn:hover { background: var(--light-blue); color: var(--deep-space); box-shadow: 0 0 15px var(--light-blue); }
        
        .control-sub-btn {
            width: auto;
            min-width: 90px;
            padding: 12px 18px;
            margin-bottom: 0;
            font-size: 0.75rem;
        }
        @media (min-width: 768px) {
            .control-sub-btn {
                min-width: 100px;
                padding: 14px 20px;
            }
        }
        .play-master-btn {
            border-color: var(--light-purple);
            color: var(--light-purple);
            min-width: 120px;
        }
        .play-master-btn:hover {
            background: var(--light-purple);
            box-shadow: 0 0 15px var(--light-purple);
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <div class="player-container">
        <h1 class="commander-title">Sound Station</h1>

        <main class="settings-card">
            
            <div class="intro-block">
                <h2>Commander Q Mixes</h2>
                <p>Turn up the volume and lock into the zone. This station streams unofficial remixes and mashups directly from the archive. It updates automatically whenever new beats drop.</p>
            </div>

            <!-- Double Column Adaptive Layout Wrapper -->
            <div class="deck-layout">
                
                <!-- Left Node: Visual Screen Window -->
                <div class="deck-left">
                    <div class="video-viewport">
                        <div id="embed-target"></div>
                    </div>
                </div>
                
                <!-- Right Node: Interactive Meta Details and Mechanics Controls -->
                <div class="deck-right">
                    <div class="track-info-box">
                        <div id="current-track-title" class="track-title">Waiting to play</div>
                    </div>

                    <div class="controls-row">
                        <button class="btn control-sub-btn" onclick="triggerPrevTrack()">Back</button>
                        <button id="master-toggle-btn" class="btn control-sub-btn play-master-btn" onclick="triggerPlayToggle()">Play</button>
                        <button class="btn control-sub-btn" onclick="triggerNextTrack()">Next</button>
                    </div>
                </div>

            </div>

        </main>

        <!-- Corrected navigation target path to go back to home layout -->
        <a href="../home.html" class="btn" style="width: auto; padding: 12px 40px; margin-bottom: 0;">Return to Hub</a>
    </div>

    <script>
        /* --- 1. LOAD EXTERNAL ASYNCHRONOUS YOUTUBE API ASSETS --- */
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let audioPlayer;
        const playButton = document.getElementById('master-toggle-btn');

        /* --- 2. INITIALIZE PLAYER PROTOCOLS ONCE API LIFTS --- */
        function onYouTubeIframeAPIReady() {
            audioPlayer = new YT.Player('embed-target', {
                height: '100%',
                width: '100%',
                playerVars: {
                    listType: 'playlist',
                    list: 'PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP',
                    autoplay: 0,
                    controls: 0, // Hides native youtube player control bars completely
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0
                },
                events: {
                    'onStateChange': handlePlayerStateChange
                }
            });
        }

        /* --- 3. HARMONIZE INTERACTIVE VISUAL AND DATA STATES --- */
        function handlePlayerStateChange(event) {
            // YT.PlayerState.PLAYING corresponds to value 1
            if (event.data === 1) {
                playButton.innerText = "Pause";
                updateLiveTrackMetadata();
            } else {
                playButton.innerText = "Play";
            }
        }

        /* --- 4. EXTRACT LIVE METADATA FROM THE PLAYLIST STREAM --- */
        function updateLiveTrackMetadata() {
            if (audioPlayer && typeof audioPlayer.getVideoData === 'function') {
                const videoData = audioPlayer.getVideoData();
                if (videoData && videoData.title) {
                    document.getElementById('current-track-title').innerText = videoData.title;
                }
            }
        }

        /* --- 5. CORE CONTROLLER INTERACTION ACTIONS --- */
        function triggerPlayToggle() {
            if (!audioPlayer) return;
            
            const currentState = audioPlayer.getPlayerState();
            if (currentState === 1) {
                audioPlayer.pauseVideo();
            } else {
                audioPlayer.playVideo();
            }
        }

        function triggerNextTrack() {
            if (!audioPlayer) return;
            audioPlayer.nextVideo();
        }

        function triggerPrevTrack() {
            if (!audioPlayer) return;
            audioPlayer.previousVideo();
        }
    </script>
</body>
</html>
