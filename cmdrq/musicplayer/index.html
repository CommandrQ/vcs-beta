<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSIC PLAYER</title>
    <link rel="stylesheet" href="../style.css?v=2">
    <style>
        /* --- HYBRID HARDWARE INTERFACE OVERRIDES --- */
        .device-screen {
            background: #020105;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }

        .media-core-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .album-art-vault {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, rgba(149, 117, 205, 0.2) 0%, rgba(77, 208, 225, 0.1) 100%);
            border: 1px solid var(--blue-muted);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(77, 208, 225, 0.15);
            flex-shrink: 0;
        }

        .device-metadata-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .now-playing-tag {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--pink-neon);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .current-track-title {
            font-size: 1.2rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-bar-container {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 42%;
            height: 100%;
            background: var(--blue-muted);
            box-shadow: 0 0 8px rgba(77, 208, 225, 0.6);
        }

        .time-stamps {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--purple-muted);
            font-family: monospace;
        }

        /* Hardware Deck Interaction Controls */
        .hardware-btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
        }

        .deck-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 10px 24px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .deck-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--pink-neon);
        }

        .deck-btn.target-neon {
            border-color: var(--pink-neon);
            color: var(--pink-neon);
            box-shadow: 0 0 10px rgba(255, 64, 129, 0.3);
        }

        .deck-btn.target-neon:hover {
            background: rgba(255, 64, 129, 0.1);
            box-shadow: 0 0 15px rgba(255, 64, 129, 0.5);
        }

        /* Responsive Hardware Shifting */
        @media (max-width: 600px) {
            .media-core-layout {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .album-art-vault {
                width: 120px;
                height: 120px;
            }
            .current-track-title {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>
    <div class="ambient-glow"></div>

    <div class="hub-container">
        
        <header class="central-header">
            <div class="monogram-outer">
                <div class="monogram-inner">Q</div>
            </div>
            <h1 class="shimmer-title">Music Player</h1>
        </header>

        <main class="hub-card">

            <section class="device-screen">
                <div class="media-core-layout">
                    
                    <div class="album-art-vault">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--blue-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                    </div>

                    <div class="device-metadata-panel">
                        <div class="now-playing-tag">Now Playing</div>
                        <div class="current-track-title" id="track-display">MIX_04_VAPOR_DRIFT.MP3</div>
                        
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill"></div>
                        </div>
                        <div class="time-stamps">
                            <span>01:48</span>
                            <span id="duration-display">04:12</span>
                        </div>
                    </div>

                </div>

                <div class="hardware-btn-group">
                    <button class="deck-btn" id="prev-btn">Prev</button>
                    <button class="deck-btn target-neon" id="play-btn">Play</button>
                    <button class="deck-btn" id="next-btn">Next</button>
                </div>
            </section>

            <div class="scroller-bay">
                <h2>Track Index</h2>
                <div class="video-selection-grid" style="margin-top: 15px;" id="track-list-hook">
                    </div>
            </div>

            <footer class="channel-dock" style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                <a href="../" class="dock-link">← Return to Control Deck</a>
            </footer>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trackHook = document.getElementById('track-list-hook');
            const trackDisplay = document.getElementById('track-display');
            const durationDisplay = document.getElementById('duration-display');
            const playBtn = document.getElementById('play-btn');

            // Static audio configuration registry layout
            const audioDatabase = [
                { title: "MIX_04_VAPOR_DRIFT.MP3", length: "04:12" },
                { title: "KNIGHTS_ANALYST_MASHUP.RAW", length: "03:55" },
                { title: "RADCLIFF_NIGHTS_VIBE.MP3", length: "05:21" }
            ];

            let activeIndex = 0;
            let isPlaying = false;

            function renderTracklist() {
                trackHook.innerHTML = '';
                audioDatabase.forEach((track, index) => {
                    const row = document.createElement('div');
                    row.className = 'video-thumb';
                    if (index === activeIndex) row.classList.add('active');

                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';

                    row.innerHTML = `
                        <span>${track.title}</span>
                        <span style="font-family: monospace; opacity: 0.6; font-size: 0.75rem;">${track.length}</span>
                    `;

                    row.addEventListener('click', () => {
                        loadTrack(index);
                        if (!isPlaying) triggerPlayToggle();
                    });

                    trackHook.appendChild(row);
                });
            }

            function loadTrack(index) {
                activeIndex = index;
                trackDisplay.innerText = audioDatabase[activeIndex].title;
                durationDisplay.innerText = audioDatabase[activeIndex].length;
                renderTracklist();
            }

            function triggerPlayToggle() {
                isPlaying = !isPlaying;
                playBtn.innerText = isPlaying ? "Pause" : "Play";
                if (isPlaying) {
                    playBtn.style.boxShadow = '0 0 15px var(--pink-glow)';
                } else {
                    playBtn.style.boxShadow = '0 0 10px rgba(255, 64, 129, 0.3)';
                }
            }

            playBtn.addEventListener('click', triggerPlayToggle);

            document.getElementById('next-btn').addEventListener('click', () => {
                let target = activeIndex + 1;
                if (target >= audioDatabase.length) target = 0;
                loadTrack(target);
            });

            document.getElementById('prev-btn').addEventListener('click', () => {
                let target = activeIndex - 1;
                if (target < 0) target = audioDatabase.length - 1;
                loadTrack(target);
            });

            // System Initialization
            loadTrack(0);
        });
    </script>
</body>
</html>
