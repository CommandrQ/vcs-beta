<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSIC PLAYER</title>
    <link rel="stylesheet" href="../style.css?v=2">
    <style>
        /* --- MP4 CHASSIS OVERRIDES --- */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 380px; 
            margin: 0 auto;
            background: #000000;
            border: 2px solid var(--purple-muted);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 0 25px rgba(149, 117, 205, 0.4);
        }

        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #020105;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .mp4-metadata-deck {
            text-align: center;
            padding: 4px 8px 12px 8px;
            border-bottom: 1px dashed rgba(149, 117, 205, 0.2);
            margin-bottom: 16px;
        }

        .mp4-track-title {
            font-size: 1.1rem;
            font-weight: 900;
            color: #e1d5ff;
            margin-bottom: 4px;
            text-shadow: 0 0 10px var(--purple-glow);
        }

        .mp4-track-artist {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--purple-glow);
            text-transform: uppercase;
        }

        /* Physical Wheel Media Controls Block */
        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }

        .mp4-btn {
            background: rgba(149, 117, 205, 0.04);
            border: 2px solid var(--purple-muted);
            color: #e1d5ff;
            padding: 10px 20px;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 0 6px rgba(149, 117, 205, 0.2);
        }

        .mp4-btn:hover {
            background: rgba(149, 117, 205, 0.15);
            border-color: var(--purple-glow);
            color: #ffffff;
            box-shadow: 0 0 12px var(--purple-glow);
        }

        .mp4-btn.active-play {
            border-color: var(--pink-neon);
            color: var(--pink-neon);
            box-shadow: 0 0 12px var(--pink-glow);
        }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>
    <div class="ambient-glow"></div>

    <div class="hub-container" style="max-width: 440px !important;">
        
        <main class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <iframe id="mp4-video-frame" src="https://www.youtube.com/playlist?list=PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="mp4-metadata-deck">
                <div class="mp4-track-title">VCS TRACK STATION</div>
                <div class="mp4-track-artist">Commander Q // Playlist</div>
            </div>

            <div class="mp4-controls-wheel">
                <button class="mp4-btn" id="mp4-prev">Prev</button>
                <button class="mp4-btn active-play" id="mp4-play-toggle">Play</button>
                <button class="mp4-btn" id="mp4-next">Next</button>
            </div>

            <div style="text-align: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-color);">
                <a href="../" class="dock-link" style="font-size: 0.75rem;">← Return to Control Deck</a>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playerIframe = document.getElementById('mp4-video-frame');
            const playToggleBtn = document.getElementById('mp4-play-toggle');
            
            let isPlaying = true; // YouTube video players with playlist tokens initialize on standby loop arrays

            // Hardware playback toggle engine interceptor execution
            playToggleBtn.addEventListener('click', () => {
                isPlaying = !isPlaying;
                
                // PostMessage window frame pipeline intercept commands required to control YouTube core API objects
                if (isPlaying) {
                    playerIframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    playToggleBtn.innerText = "Play";
                    playToggleBtn.classList.add('active-play');
                } else {
                    playerIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                    playToggleBtn.innerText = "Pause";
                    playToggleBtn.classList.remove('active-play');
                }
            });

            document.getElementById('mp4-next').addEventListener('click', () => {
                playerIframe.contentWindow.postMessage('{"event":"command","func":"nextVideo","args":""}', '*');
                isPlaying = true;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.add('active-play');
            });

            document.getElementById('mp4-prev').addEventListener('click', () => {
                playerIframe.contentWindow.postMessage('{"event":"command","func":"previousVideo","args":""}', '*');
                isPlaying = true;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.add('active-play');
            });
        });
    </script>
</body>
</html>
