<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSIC PLAYER</title>
    <link rel="stylesheet" href="../style.css?v=2">
    <style>
        /* --- PURPLE GLOW SYSTEM INTERFACE OVERRIDES --- */
        .device-screen {
            background: #020105;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(149, 117, 205, 0.15);
        }

        .media-core-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .video-viewport-wrapper {
            width: 220px;
            height: 124px; /* Scaled 16:9 widescreen hardware profile */
            background: #000000;
            border: 2px solid var(--purple-muted);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(149, 117, 205, 0.3);
            flex-shrink: 0;
        }

        .video-viewport-wrapper iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .device-metadata-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .now-playing-tag {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        /* Pure Purple Glowing Track Typography Engine */
        .current-track-title {
            font-size: 1.2rem;
            font-weight: 900;
            color: #e1d5ff;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 10px var(--purple-glow), 0 0 20px var(--purple-glow);
        }

        .track-description-excerpt {
            font-size: 0.8rem;
            line-height: 1.4;
            color: #ffffff;
            opacity: 0.8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Glowing Purple Hardware Buttons Array */
        .hardware-btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
            border-top: 1px dashed rgba(149, 117, 205, 0.2);
            padding-top: 15px;
        }

        .deck-btn {
            background: rgba(149, 117, 205, 0.05);
            border: 2px solid var(--purple-muted);
            color: #e1d5ff;
            padding: 10px 28px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 30px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px rgba(149, 117, 205, 0.3);
        }

        .deck-btn:hover {
            background: rgba(149, 117, 205, 0.15);
            border-color: var(--purple-glow);
            color: #ffffff;
            box-shadow: 0 0 15px var(--purple-glow), 0 0 5px #ffffff;
            transform: translateY(-1px);
        }

        /* Selection Index Card Adjustments */
        .track-item-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start !important;
            gap: 4px;
            white-space: normal !important;
            height: auto !important;
        }

        .track-item-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--purple-glow);
        }

        .track-item-desc {
            font-size: 0.75rem;
            line-height: 1.4;
            color: #ffffff;
            opacity: 0.7;
        }

        .track-item-card.active {
            border-color: var(--purple-glow) !important;
            background: rgba(149, 117, 205, 0.1) !important;
            box-shadow: 0 0 12px rgba(149, 117, 205, 0.2) !important;
        }

        .track-item-card.active .track-item-title {
            color: #ffffff !important;
            text-shadow: 0 0 8px var(--purple-glow);
        }

        @media (max-width: 600px) {
            .media-core-layout {
                flex-direction: column;
                align-items: center;
            }
            .video-viewport-wrapper {
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9;
            }
        }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>
    <div class="ambient-glow"></div>

    <div class="hub-container">
        
        <header class="central-header">
            <div class="monogram-outer">
                <div class="monogram-inner">Q</div>
            </div>
            <h1 class="shimmer-title">Music Player</h1>
        </header>

        <main class="hub-card">

            <section class="device-screen">
                <div class="media-core-layout">
                    
                    <div class="video-viewport-wrapper">
                        <iframe id="zune-video-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    </div>

                    <div class="device-metadata-panel">
                        <div class="now-playing-tag">Now Playing</div>
                        <div class="current-track-title" id="track-title-display">Loading Playlist...</div>
                        <div class="track-description-excerpt" id="track-desc-display">Synchronizing with cloud networks.</div>
                    </div>

                </div>

                <div class="hardware-btn-group">
                    <button class="deck-btn" id="prev-track-btn">Prev</button>
                    <button class="deck-btn" id="next-track-btn">Next</button>
                </div>
            </section>

            <div class="scroller-bay">
                <h2>Track Index</h2>
                <div class="video-selection-grid" style="margin-top: 15px;" id="playlist-index-hook">
                </div>
            </div>

            <footer class="channel-dock" style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                <a href="../" class="dock-link">← Return to Control Deck</a>
            </footer>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const indexHook = document.getElementById('playlist-index-hook');
            const iframeScreen = document.getElementById('zune-video-iframe');
            const titleDisplay = document.getElementById('track-title-display');
            const descDisplay = document.getElementById('track-desc-display');

            const PLAYLIST_ID = "PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP";
            const CORS_PROXY_WORKER = "https://images-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=600&url=";
            const TARGET_FEED_URL = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?playlist_id=${PLAYLIST_ID}`);
            
            let trackRegistry = [];
            let currentTrackIndex = 0;

            function parsePlaylistStream() {
                fetch(`${CORS_PROXY_WORKER}${TARGET_FEED_URL}`)
                    .then(res => res.text())
                    .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
                    .then(xmlData => {
                        const entries = xmlData.querySelectorAll("entry");
                        trackRegistry = [];

                        entries.forEach(entry => {
                            const videoId = entry.querySelector("videoId")?.textContent || 
                                            entry.querySelector("id")?.textContent.split("video:")[1];
                            const title = entry.querySelector("title")?.textContent || "Untitled Track";
                            
                            const description = entry.getElementsByTagName("media:description")[0]?.textContent || 
                                                entry.querySelector("description")?.textContent || 
                                                "No track listing layout documented.";

                            if (videoId) {
                                trackRegistry.push({
                                    id: videoId.trim(),
                                    title: title.trim(),
                                    desc: description.trim()
                                });
                            }
                        });

                        if (trackRegistry.length > 0) {
                            renderDeviceConsole();
                            switchTrack(0, false);
                        } else {
                            throw new Error("Empty registry stream");
                        }
                    })
                    .catch(err => {
                        console.error("Pipeline Sync Error:", err);
                        indexHook.innerHTML = '<div style="color:#ffffff; font-size:0.8rem; text-align:center; width:100%;">Network link configuration offline.</div>';
                    });
            }

            function renderDeviceConsole() {
                indexHook.innerHTML = '';
                trackRegistry.forEach((track, index) => {
                    const row = document.createElement('div');
                    row.className = 'video-thumb track-item-card';
                    if (index === currentTrackIndex) row.classList.add('active');

                    const summaryDesc = track.desc.length > 90 ? track.desc.substring(0, 90) + "..." : track.desc;

                    row.innerHTML = `
                        <div class="track-item-title">${track.title}</div>
                        <div class="track-item-desc">${summaryDesc}</div>
                    `;

                    row.addEventListener('click', () => {
                        switchTrack(index, true);
                    });

                    indexHook.appendChild(row);
                });
            }

            function switchTrack(index, shouldAutoplay) {
                currentTrackIndex = index;
                const track = trackRegistry[currentTrackIndex];

                titleDisplay.innerText = track.title;
                descDisplay.innerText = track.desc;

                const queryParams = shouldAutoplay ? "?autoplay=1&rel=0&modestbranding=1" : "?rel=0&modestbranding=1";
                iframeScreen.src = `https://www.youtube.com/embed/${track.id}${queryParams}`;

                document.querySelectorAll('.track-item-card').forEach((card, idx) => {
                    if (idx === currentTrackIndex) {
                        card.classList.add('active');
                    } else {
                        card.classList.remove('active');
                    }
                });
            }

            document.getElementById('next-track-btn').addEventListener('click', () => {
                let targetIdx = currentTrackIndex + 1;
                if (targetIdx >= trackRegistry.length) targetIdx = 0;
                switchTrack(targetIdx, true);
            });

            document.getElementById('prev-track-btn').addEventListener('click', () => {
                let targetIdx = currentTrackIndex - 1;
                if (targetIdx < 0) targetIdx = trackRegistry.length - 1;
                switchTrack(targetIdx, true);
            });

            parsePlaylistStream();
        });
    </script>
</body>
</html>
