<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player | CMDRQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* =========================================
           01 // CORE LOCKOUT & FLEX ALIGNMENT
           ========================================= */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; 
            overflow: hidden !important; 
            background-color: #05020c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        * {
            box-sizing: border-box;
        }

        /* =========================================
           02 // HEADER & NAVIGATION
           ========================================= */
        .player-header {
            text-align: center;
            margin-bottom: 1.5rem;
            z-index: 10;
        }

        .commander-title {
            margin: 0 0 8px 0;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.6);
        }

        .commander-role {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--gold, #D4AF37);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-bottom: 1px dashed var(--gold, #D4AF37);
            transition: all 0.3s ease;
        }

        .commander-role:hover {
            color: #fff;
            border-color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* =========================================
           03 // PULSING PURPLE CHASSIS
           ========================================= */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 400px; 
            background: rgba(8, 4, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(147, 51, 234, 0.5);
            border-radius: 24px;
            padding: 1.25rem;
            z-index: 10;
            animation: purpleGlowPulse 4s ease-in-out infinite;
        }

        @keyframes purpleGlowPulse {
            0%, 100% {
                border-color: rgba(147, 51, 234, 0.4);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(147, 51, 234, 0.2);
            }
            50% {
                border-color: rgba(168, 85, 247, 0.9);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), 0 0 35px rgba(168, 85, 247, 0.6);
            }
        }

        /* =========================================
           04 // VIEWPORT & METADATA
           ========================================= */
        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .mp4-metadata-deck {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 1px dashed rgba(147, 51, 234, 0.4);
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80px; /* STRICT HEIGHT LOCK: Prevents layout shift when text changes */
            overflow: hidden; /* Clips anything that tries to push past the height */
        }

        .mp4-track-title {
            font-size: 1.1rem; 
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 4px 0;
            width: 100%;
            white-space: normal;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.3;
        }

        .mp4-track-author {
            font-size: 0.75rem; 
            font-weight: 700;
            letter-spacing: 2px;
            color: #a855f7;
            text-transform: uppercase;
            margin: 0;
            width: 100%;
            white-space: normal;
            word-wrap: break-word;
        }

        /* =========================================
           05 // CONTROL WHEEL
           ========================================= */
        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
        }

        .mp4-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 100%);
            border: 1px solid rgba(147, 51, 234, 0.4);
            color: #ffffff;
            padding: 12px 10px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            flex: 1; 
            text-align: center;
        }

        .mp4-btn:hover {
            transform: translateY(-2px);
            border-color: #a855f7;
            background: rgba(147, 51, 234, 0.1);
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.4);
        }

        .mp4-btn.active-play {
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* =========================================
           06 // FOOTER LOGO
           ========================================= */
        .system-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .dock-logo { 
            width: 32px; 
            height: 32px; 
            opacity: 0.6; 
            transition: 0.3s; 
            filter: drop-shadow(0 0 2px rgba(212,175,55,0.2));
        }

        .dock-logo:hover { 
            opacity: 1; 
            filter: drop-shadow(0 0 8px var(--gold, #D4AF37)); 
        }

        /* =========================================
           07 // DESKTOP RESPONSIVE RESIZING
           ========================================= */
        @media (min-width: 1024px) {
            .mp4-chassis {
                max-width: 600px;
                padding: 2rem;
            }
            .mp4-metadata-deck {
                height: 90px; /* Scaled up fixed height for desktop */
            }
            .mp4-track-title {
                font-size: 1.3rem;
            }
            .mp4-btn {
                padding: 14px 20px;
                font-size: 0.85rem;
                max-width: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="starfield-canvas" id="canvas-starfield-engine" style="position:fixed; inset:0; z-index:1; pointer-events:none;"></div>
    <div class="comet-canvas" id="canvas-comet-engine" style="position:fixed; inset:0; z-index:2; pointer-events:none;"></div>
    
    <div style="position:fixed; top:-10%; left:50%; transform:translateX(-50%); width:90vw; height:60vh; background:radial-gradient(circle, rgba(147,51,234,0.15) 0%, transparent 70%); z-index:3; pointer-events:none;"></div>

    <header class="player-header">
        <h1 class="commander-title">Music Player</h1>
        <a class="commander-role" href="../">← Back to Control Deck</a>
    </header>

    <section class="mp4-chassis">

        <div class="mp4-screen-viewport">
            <iframe id="mp4-video-frame" src="https://www.youtube.com/embed/videoseries?listType=playlist&list=PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP&enablejsapi=1&rel=0&modestbranding=1&vq=hd1080" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="mp4-metadata-deck">
            <div id="live-title" class="mp4-track-title">Playlist Standing By</div>
            <div id="live-author" class="mp4-track-author">Awaiting Load</div>
        </div>

        <div class="mp4-controls-wheel">
            <button class="mp4-btn" id="mp4-prev">Prev</button>
            <button class="mp4-btn" id="mp4-play-toggle">Load</button>
            <button class="mp4-btn" id="mp4-next">Next</button>
        </div>

    </section>

    <footer class="system-dock">
        <img src="../images/vklogo.png" alt="VK Logo" class="dock-logo">
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- VISUAL BACKGROUND ENGINE ---
        document.addEventListener("DOMContentLoaded", () => {
            const starfield = document.getElementById('canvas-starfield-engine');
            const totalStars = window.innerWidth > 1024 ? 100 : 40;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                const speed = Math.random() * 30 + 20;
                const size = Math.random() * 1.5 + 0.5;
                
                star.style.position = 'absolute';
                star.style.background = '#fff';
                star.style.borderRadius = '50%';
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = Math.random() * 0.7 + 0.3;
                star.style.animation = `starDrift ${speed}s linear infinite`;
                star.style.animationDelay = `-${Math.random() * speed}s`;
                
                starfield.appendChild(star);
            }

            const canvas = document.getElementById('canvas-comet-engine');
            function launchComet() {
                const comet = document.createElement('div');
                const startX = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.6);
                const startY = Math.random() * (window.innerHeight * 0.4);
                const duration = Math.random() * 0.8 + 0.6; 
                
                comet.style.position = 'absolute';
                comet.style.width = '2px';
                comet.style.height = '2px';
                comet.style.background = '#fff';
                comet.style.boxShadow = '0 0 8px #fff, 0 0 15px rgba(147, 51, 234, 0.8)';
                comet.style.left = `${startX}px`;
                comet.style.top = `${startY}px`;
                comet.style.animation = `streak ${duration}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                canvas.appendChild(comet);
                setTimeout(() => { comet.remove(); }, duration * 1000);
            }

            function queueNextComet() {
                setTimeout(() => {
                    launchComet();
                    queueNextComet();
                }, Math.random() * 4000 + 2000);
            }
            queueNextComet();
        });

        // --- YOUTUBE PLAYER LOGIC ---
        let player;
        const playToggleBtn = document.getElementById('mp4-play-toggle');
        const liveTitle = document.getElementById('live-title');
        const liveAuthor = document.getElementById('live-author');
        
        let isPlaying = false;
        let isLoaded = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('mp4-video-frame', {
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function extractMetadata() {
            try {
                const videoData = player.playerInfo.videoData; 
                if (videoData && videoData.title) {
                    liveTitle.innerText = videoData.title.toUpperCase();
                    liveAuthor.innerText = videoData.author ? videoData.author.toUpperCase() : "YOUTUBE AUDIO";
                } else {
                    liveTitle.innerText = "TRACK PLAYING";
                    liveAuthor.innerText = "YOUTUBE MIX";
                }
            } catch (error) {
                liveTitle.innerText = "TRACK PLAYING";
                liveAuthor.innerText = "YOUTUBE MIX";
            }
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.add('active-play');
                extractMetadata();
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.remove('active-play');
            }
        }

        // Hardware Button Listeners
        playToggleBtn.addEventListener('click', () => {
            if (!player) return; 

            if (!isLoaded) {
                player.playVideo();
                isLoaded = true;
                playToggleBtn.innerText = "Loading...";
                return;
            }

            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        document.getElementById('mp4-next').addEventListener('click', () => {
            if (player && isLoaded) {
                player.nextVideo();
            }
        });

        document.getElementById('mp4-prev').addEventListener('click', () => {
            if (player && isLoaded) {
                player.previousVideo();
            }
        });
    </script>
</body>
</html>
