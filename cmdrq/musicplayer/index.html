<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player | CMDRQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* =========================================
           01 // CORE LOCKOUT & FLEX ALIGNMENT
           ========================================= */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; 
            overflow: hidden !important; 
            background-color: #05020c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        * {
            box-sizing: border-box;
        }

        /* =========================================
           02 // HEADER & NAVIGATION
           ========================================= */
        .terminal-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 420px; /* Mobile base constraint */
            height: auto !important;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden !important;
        }

        .player-header {
            text-align: center;
            margin-bottom: 0.5rem;
            z-index: 10;
        }

        .commander-title {
            margin: 0 0 8px 0;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.6);
        }

        .commander-role {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--gold, #D4AF37);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-bottom: 1px dashed var(--gold, #D4AF37);
            transition: all 0.3s ease;
        }

        .commander-role:hover {
            color: #fff;
            border-color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* =========================================
           03 // PULSING PURPLE CHASSIS
           ========================================= */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: rgba(8, 4, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(147, 51, 234, 0.5);
            border-radius: 24px;
            padding: 1.25rem;
            z-index: 10;
            animation: purpleGlowPulse 4s ease-in-out infinite;
        }

        @keyframes purpleGlowPulse {
            0%, 100% {
                border-color: rgba(147, 51, 234, 0.4);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(147, 51, 234, 0.2);
            }
            50% {
                border-color: rgba(168, 85, 247, 0.9);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), 0 0 35px rgba(168, 85, 247, 0.6);
            }
        }

        /* =========================================
           04 // VIEWPORT & METADATA
           ========================================= */
        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .mp4-metadata-deck {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 1px dashed rgba(147, 51, 234, 0.4);
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        .mp4-track-title {
            font-size: 1.1rem; 
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 4px 0;
            width: 100%;
            white-space: normal;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.3;
        }

        .mp4-track-author {
            font-size: 0.75rem; 
            font-weight: 700;
            letter-spacing: 2px;
            color: #a855f7;
            text-transform: uppercase;
            margin: 0;
            width: 100%;
            white-space: normal;
            word-wrap: break-word;
        }

        /* =========================================
           05 // CONTROL WHEEL
           ========================================= */
        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
        }

        .mp4-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 100%);
            border: 1px solid rgba(147, 51, 234, 0.4);
            color: #ffffff;
            padding: 12px 10px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            flex: 1; 
            text-align: center;
        }

        .mp4-btn:hover {
            transform: translateY(-2px);
            border-color: #a855f7;
            background: rgba(147, 51, 234, 0.1);
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.4);
        }

        .mp4-btn.active-play {
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* =========================================
           06 // FOOTER LOGO
           ========================================= */
        .system-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .dock-logo { 
            width: 32px; 
            height: 32px; 
            opacity: 0.6; 
            transition: 0.3s; 
            filter: drop-shadow(0 0 2px rgba(212,175,55,0.2));
        }

        .dock-logo:hover { 
            opacity: 1; 
            filter: drop-shadow(0 0 8px var(--gold, #D4AF37)); 
        }

        /* =========================================
           07 // DESKTOP RESPONSIVE RESIZING
           ========================================= */
        @media (min-width: 1024px) {
            .terminal-container {
                max-width: 800px; /* Parent container blown out to allow expansion */
            }
            .mp4-chassis {
                padding: 2rem;
            }
            .mp4-metadata-deck {
                min-height: 80px; 
                margin-bottom: 1.5rem;
                padding-bottom: 1.5rem;
            }
            .mp4-track-title {
                font-size: 1.5rem;
                margin-bottom: 8px;
            }
            .mp4-track-author {
                font-size: 0.9rem;
            }
            .mp4-btn {
                padding: 16px 24px;
                font-size: 0.9rem;
                max-width: 160px;
            }
            .commander-title {
                font-size: 2.5rem;
            }
            .commander-role {
                font-size: 1rem;
            }
        }

        @media (min-width: 1920px) {
            .terminal-container {
                max-width: 1000px; /* Extreme Ultra-wide scaling */
            }
            .mp4-chassis {
                padding: 2.5rem;
            }
            .mp4-track-title {
                font-size: 1.8rem;
            }
            .mp4-track-author {
                font-size: 1rem;
            }
            .mp4-btn {
                max-width: 180px;
                font-size: 1rem;
            }
        }
    </style>
</head>
