<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* --- SYSTEM LOCK VIEWPORT --- */
        html, body {
            overflow: hidden !important;
            height: 100dvh;
            width: 100vw;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* --- CONTAINER CENTERING RIG --- */
        .terminal-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Locks absolute pixel center coordinates */
            width: 90%;
            max-width: 420px;
            height: auto !important;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden !important;
            box-sizing: border-box;
        }

        /* --- MARGIN COLLAPSE RECOVERY PACK --- */
        .identity-module {
            margin: 0 !important;
            padding: 0 !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .commander-title {
            margin: 0 0 4px 0 !important; /* Forces strict reset on default header tracking pushes */
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
        }

        .commander-role {
            margin: 0 !important;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- PULSING CHASSIS --- */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: rgba(8, 4, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(147, 51, 234, 0.4);
            border-radius: 24px;
            padding: 1.25rem;
            box-sizing: border-box;
            animation: purpleGlowPulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            flex-shrink: 0;
        }

        @keyframes purpleGlowPulse {
            0%, 100% {
                border-color: rgba(147, 51, 234, 0.4);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 15px rgba(147, 51, 234, 0.1);
            }
            50% {
                border-color: rgba(168, 85, 247, 0.8);
                box-shadow: 0 10px 40px rgba(147, 51, 234, 0.3), 0 0 25px rgba(168, 85, 247, 0.5);
            }
        }

        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .mp4-metadata-deck {
            text-align: center;
            padding-top: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed rgba(147, 51, 234, 0.3);
            margin-bottom: 1rem;
            min-height: 68px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
        }

        .mp4-track-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 6px 0;
            width: 100%;
            white-space: normal;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.4;
        }

        .mp4-track-author {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #a855f7;
            text-transform: uppercase;
            width: 100%;
            margin: 0;
            white-space: normal;
            word-wrap: break-word;
            word-break: break-word;
        }

        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            box-sizing: border-box;
        }

        .mp4-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.4) 100%);
            border: 1px solid rgba(147, 51, 234, 0.3);
            color: #ffffff;
            padding: 10px 16px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            flex: 1;
            max-width: 110px;
            text-align: center;
            box-sizing: border-box;
        }

        .mp4-btn:hover {
            transform: translateY(-2px);
            border-color: #a855f7;
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.3);
            color: #a855f7;
        }

        .mp4-btn.active-load {
            border-color: #a855f7;
            color: #a855f7;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.3);
        }

        .mp4-btn.active-play {
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* --- DESKTOP GRID ADAPTATIONS --- */
        @media (min-width: 1024px) {
            .terminal-container {
                max-width: 680px;
            }
            .mp4-chassis {
                padding: 1.75rem;
            }
            .mp4-track-title {
                font-size: 1.25rem;
            }
            .mp4-track-author {
                font-size: 0.85rem;
            }
            .mp4-btn {
                padding: 12px 24px;
                font-size: 0.8rem;
                max-width: 130px;
            }
        }

        @media (min-width: 1920px) {
            .terminal-container {
                max-width: 850px;
            }
            .mp4-chassis {
                padding: 2rem;
            }
            .mp4-metadata-deck {
                min-height: 80px;
                margin-bottom: 1.5rem;
                padding-bottom: 1.5rem;
            }
            .mp4-track-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="starfield-canvas" id="canvas-starfield-engine"></div>
    <div class="comet-canvas" id="canvas-comet-engine"></div>
    <div class="cyber-grid"></div>
    <div class="ambient-flare"></div>

    <main class="terminal-container">
        
        <header class="identity-module">
            <h1 class="commander-title">Music Player</h1>
            <a class="commander-role" href="../" style="text-decoration: none; border-bottom: 1px dashed var(--gold); transition: all 0.3s ease;">
                ← Back to Control Deck
            </a>
        </header>

        <section class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <iframe id="mp4-video-frame" src="https://www.youtube.com/embed/videoseries?listType=playlist&list=PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP&enablejsapi=1&rel=0&modestbranding=1&vq=hd1080" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="mp4-metadata-deck">
                <div id="live-title" class="mp4-track-title">YOUTUBE PLAYLIST LOADING</div>
                <div id="live-author" class="mp4-track-author">Tap Load Array</div>
            </div>

            <div class="mp4-controls-wheel">
                <button class="mp4-btn" id="mp4-prev">Prev</button>
                <button class="mp4-btn active-load" id="mp4-play-toggle">Load</button>
                <button class="mp4-btn" id="mp4-next">Next</button>
            </div>

        </section>

    </main>

    <footer class="system-dock">
        <div class="center-logo-container">
            <img src="../images/vklogo.png" alt="VK Logo" class="dock-logo">
        </div>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // STARFIELD ENGINE
            const starfield = document.getElementById('canvas-starfield-engine');
            const totalStars = window.innerWidth > 1024 ? 120 : 50;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const speed = Math.random() * 30 + 20;
                const size = Math.random() * 1.5 + 0.5;
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = Math.random() * 0.7 + 0.3;
                star.style.animation = `starDrift ${speed}s linear infinite`;
                star.style.animationDelay = `-${Math.random() * speed}s`;
                
                starfield.appendChild(star);
            }

            // COMET ENGINE
            const canvas = document.getElementById('canvas-comet-engine');
            
            function launchComet() {
                const comet = document.createElement('div');
                comet.classList.add('comet');
                const startX = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.6);
                const startY = Math.random() * (window.innerHeight * 0.4);
                
                comet.style.left = `${startX}px`;
                comet.style.top = `${startY}px`;
                const duration = Math.random() * 0.8 + 0.6; 
                comet.style.animation = `streak ${duration}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                canvas.appendChild(comet);
                setTimeout(() => { comet.remove(); }, duration * 1000);
            }

            function queueNextComet() {
                setTimeout(() => {
                    launchComet();
                    queueNextComet();
                }, Math.random() * 4000 + 2000);
            }
            queueNextComet();
        });

        // PLAYER ENGINE WIRE-UP
        let player;
        const playToggleBtn = document.getElementById('mp4-play-toggle');
        const liveTitle = document.getElementById('live-title');
        const liveAuthor = document.getElementById('live-author');
        
        let hasInitialized = false;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('mp4-video-frame', {
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function updateMetadataDisplay() {
            if (player && typeof player.getVideoData === 'function') {
                try {
                    const videoData = player.getVideoData();
                    if (videoData && videoData.title) {
                        liveTitle.innerText = videoData.title.toUpperCase();
                        liveAuthor.innerText = videoData.author ? videoData.author.toUpperCase() : 'YOUTUBE STREAM';
                    }
                } catch (e) {
                    console.log("Stream tracking metadata handshake buffered.");
                }
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                updateMetadataDisplay();
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.remove('active-load');
                playToggleBtn.classList.add('active-play');
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.remove('active-play');
            }
        }

        playToggleBtn.addEventListener('click', () => {
            if (!hasInitialized) {
                player.playVideo();
                hasInitialized = true;
                return;
            }
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        document.getElementById('mp4-next').addEventListener('click', () => {
            if (player && hasInitialized) player.nextVideo();
        });

        document.getElementById('mp4-prev').addEventListener('click', () => {
            if (player && hasInitialized) player.previousVideo();
        });
    </script>
</body>
</html>
