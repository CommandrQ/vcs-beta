<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player | CMDRQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* =========================================
           01 // VIEWPORT LOCKOUT (SCROLL IMMUNITY)
           ========================================= */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; 
            overflow: hidden !important; 
            background-color: #06030e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        * {
            box-sizing: border-box;
        }

        /* =========================================
           02 // CORE ALIGNMENT FRAMEWORK
           ========================================= */
        .terminal-container {
            position: fixed;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 440px; 
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            padding: 0 !important;
            margin: 0 !important;
        }

        .player-header {
            text-align: center;
            margin-bottom: 0.25rem;
            z-index: 10;
        }

        .commander-title {
            margin: 0 0 6px 0;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
        }

        .commander-role {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--gold, #D4AF37);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-bottom: 1px dashed var(--gold, #D4AF37);
            transition: all 0.3s ease;
        }

        .commander-role:hover {
            color: #fff;
            border-color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* =========================================
           03 // VANGUARD CYBERCHASSIS CONFIG
           ========================================= */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: linear-gradient(145deg, rgba(14, 8, 28, 0.9) 0%, rgba(6, 3, 14, 0.95) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(147, 51, 234, 0.4);
            border-radius: 28px;
            padding: 1.5rem;
            z-index: 10;
            position: relative;
            animation: tacticalGlowPulse 4s ease-in-out infinite;
        }

        @keyframes tacticalGlowPulse {
            0%, 100% {
                border-color: rgba(147, 51, 234, 0.35);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(147, 51, 234, 0.1);
            }
            50% {
                border-color: rgba(168, 85, 247, 0.85);
                box-shadow: 0 15px 45px rgba(0, 0, 0, 0.95), 0 0 30px rgba(168, 85, 247, 0.45);
            }
        }

        /* Top Corner Aesthetic Line Accent */
        .mp4-chassis::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
        }

        /* =========================================
           04 // HARDWARE VIEWPORT
           ========================================= */
        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 1.25rem;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* =========================================
           05 // DYNAMIC MARQUEE TICKER HUD
           ========================================= */
        .mp4-metadata-deck {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 14px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 68px; /* Strict dimensional constraint */
            width: 100%;
            overflow: hidden;
        }

        .marquee-window {
            width: 100%;
            overflow: hidden;
            position: relative;
            white-space: nowrap;
        }

        .mp4-track-title {
            display: inline-block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.15rem; 
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Dynamic classes activated securely via JS logic loops */
        .animate-marquee {
            padding-left: 100%;
            animation: marqueeTicker 14s linear infinite;
        }

        .static-center {
            width: 100%;
            text-align: center;
        }

        @keyframes marqueeTicker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .mp4-track-author {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem; 
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #a855f7;
            text-transform: uppercase;
            margin-top: 4px;
            width: 100%;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0.85;
        }

        /* =========================================
           06 // COCKPIT HARDWARE CONTROLS
           ========================================= */
        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.85rem;
            width: 100%;
        }

        .mp4-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.4) 100%);
            border: 1px solid rgba(147, 51, 234, 0.35);
            color: #e2d8f0;
            padding: 12px 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            flex: 1; 
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .mp4-btn:hover {
            transform: translateY(-2px);
            border-color: #a855f7;
            background: rgba(147, 51, 234, 0.15);
            color: #ffffff;
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.35);
        }

        .mp4-btn:active {
            transform: translateY(0);
        }

        .mp4-btn.active-play {
            border-color: #ffffff;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 4px #fff;
        }

        /* =========================================
           07 // COCKPIT FOOTER DOCK
           ========================================= */
        .system-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .dock-logo { 
            width: 32px; 
            height: 32px; 
            opacity: 0.5; 
            transition: 0.3s ease; 
            filter: drop-shadow(0 0 2px rgba(212,175,55,0.2));
        }

        .dock-logo:hover { 
            opacity: 0.9; 
            filter: drop-shadow(0 0 8px var(--gold, #D4AF37)); 
        }

        /* =========================================
           08 // WIDESCREEN WORKSTATION SPECIFICATIONS
           ========================================= */
        @media (min-width: 1024px) {
            .terminal-container {
                max-width: 620px; /* Enhanced wide visual balance profile */
                top: 50%;
            }
            .mp4-chassis {
                padding: 2rem;
                border-radius: 36px;
            }
            .mp4-metadata-deck {
                height: 76px;
                padding: 1rem 1.5rem;
                margin-bottom: 1.5rem;
            }
            .mp4-track-title {
                font-size: 1.35rem;
            }
            .mp4-track-author {
                font-size: 0.85rem;
                margin-top: 6px;
            }
            .mp4-btn {
                padding: 14px 20px;
                font-size: 0.9rem;
                border-radius: 16px;
            }
            .commander-title {
                font-size: 2.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="starfield-canvas" id="canvas-starfield-engine" style="position:fixed; inset:0; z-index:1; pointer-events:none;"></div>
    <div class="comet-canvas" id="canvas-comet-engine" style="position:fixed; inset:0; z-index:2; pointer-events:none;"></div>
    <div style="position:fixed; top:-10%; left:50%; transform:translateX(-50%); width:90vw; height:60vh; background:radial-gradient(circle, rgba(147,51,234,0.12) 0%, transparent 70%); z-index:3; pointer-events:none;"></div>

    <main class="terminal-container">
        <header class="player-header">
            <h1 class="commander-title">Music Player</h1>
            <a class="commander-role" href="../">← Back to Control Deck</a>
        </header>

        <section class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <iframe id="mp4-video-frame" src="https://www.youtube.com/embed/videoseries?listType=playlist&list=PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP&enablejsapi=1&rel=0&modestbranding=1&vq=hd1080" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="mp4-metadata-deck">
                <div class="marquee-window" id="marquee-win-element">
                    <div id="live-title" class="mp4-track-title static-center">PLAYLIST STANDING BY</div>
                </div>
                <div id="live-author" class="mp4-track-author">AWAITING SYSTEM LOAD</div>
            </div>

            <div class="mp4-controls-wheel">
                <button class="mp4-btn" id="mp4-prev">Prev</button>
                <button class="mp4-btn" id="mp4-play-toggle">Load</button>
                <button class="mp4-btn" id="mp4-next">Next</button>
            </div>

        </section>
    </main>

    <footer class="system-dock">
        <img src="../images/vklogo.png" alt="VK Logo" class="dock-logo">
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- CELESTIAL CANVAS ENGINE ---
        document.addEventListener("DOMContentLoaded", () => {
            const starfield = document.getElementById('canvas-starfield-engine');
            const totalStars = window.innerWidth > 1024 ? 100 : 40;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                const speed = Math.random() * 30 + 20;
                const size = Math.random() * 1.5 + 0.5;
                
                star.style.position = 'absolute';
                star.style.background = '#fff';
                star.style.borderRadius = '50%';
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = Math.random() * 0.7 + 0.3;
                star.style.animation = `starDrift ${speed}s linear infinite`;
                star.style.animationDelay = `-${Math.random() * speed}s`;
                
                starfield.appendChild(star);
            }

            const canvas = document.getElementById('canvas-comet-engine');
            function launchComet() {
                const comet = document.createElement('div');
                const startX = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.6);
                const startY = Math.random() * (window.innerHeight * 0.4);
                const duration = Math.random() * 0.8 + 0.6; 
                
                comet.style.position = 'absolute';
                comet.style.width = '2px';
                comet.style.height = '2px';
                comet.style.background = '#fff';
                comet.style.boxShadow = '0 0 8px #fff, 0 0 15px rgba(147, 51, 234, 0.8)';
                comet.style.left = `${startX}px`;
                comet.style.top = `${startY}px`;
                comet.style.animation = `streak ${duration}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                canvas.appendChild(comet);
                setTimeout(() => { comet.remove(); }, duration * 1000);
            }

            function queueNextComet() {
                setTimeout(() => {
                    launchComet();
                    queueNextComet();
                }, Math.random() * 4000 + 2000);
            }
            queueNextComet();
        });

        // --- INTELLIGENT HARDWARE HUD ENGINE ---
        let player;
        const playToggleBtn = document.getElementById('mp4-play-toggle');
        const liveTitle = document.getElementById('live-title');
        const liveAuthor = document.getElementById('live-author');
        const marqueeWindow = document.getElementById('marquee-win-element');
        
        let isPlaying = false;
        let isLoaded = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('mp4-video-frame', {
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function computeMarqueeDynamics() {
            try {
                const videoData = player.playerInfo.videoData; 
                if (videoData && videoData.title) {
                    const cleanTitle = videoData.title.toUpperCase();
                    
                    // Temporarily wipe out active animations to reset geometry maps cleanly
                    liveTitle.className = "mp4-track-title";
                    liveTitle.innerText = cleanTitle;
                    liveAuthor.innerText = videoData.author ? videoData.author.toUpperCase() : "YOUTUBE AUDIO LAYER";

                    // Smart evaluation: Does text width exceed its structural chassis boundaries?
                    const windowWidth = marqueeWindow.offsetWidth;
                    const textWidth = liveTitle.scrollWidth;

                    if (textWidth > windowWidth) {
                        // Length overflow detected. Initialize left-scrolling ticker engine.
                        liveTitle.classList.add('animate-marquee');
                        
                        // Adaptive speed balancing based on physical title density
                        const scrollVelocityFactor = Math.max(10, Math.min(24, textWidth / 25));
                        liveTitle.style.animationDuration = `${scrollVelocityFactor}s`;
                    } else {
                        // Title fits safely. Lock text inside center alignment profiles.
                        liveTitle.classList.add('static-center');
                    }
                }
            } catch (error) {
                console.log("HUD metadata telemetry refresh cycle intercepted.");
            }
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.add('active-play');
                computeMarqueeDynamics();
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.remove('active-play');
            }
        }

        // Hardware Chassis Core Action Wireup
        playToggleBtn.addEventListener('click', () => {
            if (!player) return; 

            if (!isLoaded) {
                player.playVideo();
                isLoaded = true;
                playToggleBtn.innerText = "Connecting...";
                return;
            }

            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        document.getElementById('mp4-next').addEventListener('click', () => {
            if (player && isLoaded) player.nextVideo();
        });

        document.getElementById('mp4-prev').addEventListener('click', () => {
            if (player && isLoaded) player.previousVideo();
        });

        // Recalculate layout rules dynamically if device rotates or shifts boundaries
        window.addEventListener('resize', () => {
            if (isPlaying) computeMarqueeDynamics();
        });
    </script>
</body>
</html>
