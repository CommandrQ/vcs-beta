<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        /* --- MP4 CHASSIS DESIGN PROFILES --- */
        .mp4-chassis {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: rgba(12, 10, 18, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            margin: 0 auto; /* Completely blocks displacement to center the unit */
        }

        .mp4-chassis::before {
            content: ''; position: absolute; top: 0; left: 0; width: 30%; height: 2px;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        .mp4-screen-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #020105;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .mp4-screen-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .mp4-metadata-deck {
            text-align: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.2);
            margin-bottom: 1.5rem;
            min-height: 60px; 
        }

        .mp4-track-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            white-space: normal;
            word-wrap: break-word;
        }

        .mp4-track-author {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
            white-space: normal;
            word-wrap: break-word;
        }

        .mp4-controls-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        .mp4-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.3) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            padding: 12px 24px;
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .mp4-btn:hover {
            transform: translateY(-2px);
            border-color: var(--gold);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
            color: var(--gold);
        }

        .mp4-btn.active-load {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .mp4-btn.active-play {
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="starfield-canvas" id="canvas-starfield-engine"></div>
    <div class="comet-canvas" id="canvas-comet-engine"></div>
    <div class="cyber-grid"></div>
    <div class="ambient-flare"></div>

    <main class="terminal-container" id="main-scroller">
        
        <header class="identity-module">
            <div class="hud-ring">
                <img src="../images/headshot.jpg" alt="Quincy Jones" class="avatar-img">
            </div>
            <h1 class="commander-title">Music Player</h1>
            <a class="commander-role" href="../" style="text-decoration: none; border-bottom: 1px dashed var(--gold); transition: all 0.3s ease;">
                ← Back to Control Deck
            </a>
        </header>

        <section class="mp4-chassis">

            <div class="mp4-screen-viewport">
                <iframe id="mp4-video-frame" src="https://www.youtube.com/embed/videoseries?listType=playlist&list=PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP&enablejsapi=1&rel=0&modestbranding=1&vq=hd1080" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="mp4-metadata-deck">
                <div id="live-title" class="mp4-track-title">STATION STANDBY</div>
                <div id="live-author" class="mp4-track-author">Tap Load Array</div>
            </div>

            <div class="mp4-controls-wheel">
                <button class="mp4-btn" id="mp4-prev">Prev</button>
                <button class="mp4-btn active-load" id="mp4-play-toggle">Load</button>
                <button class="mp4-btn" id="mp4-next">Next</button>
            </div>

        </section>

    </main>

    <footer class="system-dock">
        <div class="center-logo-container">
            <img src="../images/vklogo.png" alt="VK Logo" class="dock-logo">
        </div>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            const mainScroller = document.getElementById('main-scroller');

            // FADE-IN SCROLLBAR ENGINE
            let mainScrollTimeout;

            function triggerScrollbar(element, timeoutRef) {
                element.classList.add('scrolling');
                clearTimeout(timeoutRef);
                return setTimeout(() => {
                    element.classList.remove('scrolling');
                }, 1000);
            }

            mainScroller.addEventListener('scroll', () => {
                mainScrollTimeout = triggerScrollbar(mainScroller, mainScrollTimeout);
            });

            // STARFIELD DRIFT ENGINE
            const starfield = document.getElementById('canvas-starfield-engine');
            const totalStars = window.innerWidth > 1024 ? 120 : 50;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const speed = Math.random() * 30 + 20;
                const size = Math.random() * 1.5 + 0.5;
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = Math.random() * 0.7 + 0.3;
                star.style.animation = `starDrift ${speed}s linear infinite`;
                star.style.animationDelay = `-${Math.random() * speed}s`;
                
                starfield.appendChild(star);
            }

            // DYNAMIC COMET ENGINE
            const canvas = document.getElementById('canvas-comet-engine');
            
            function launchComet() {
                const comet = document.createElement('div');
                comet.classList.add('comet');
                
                const startX = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.6);
                const startY = Math.random() * (window.innerHeight * 0.4);
                
                comet.style.left = `${startX}px`;
                comet.style.top = `${startY}px`;
                
                const duration = Math.random() * 0.8 + 0.6; 
                comet.style.animation = `streak ${duration}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                canvas.appendChild(comet);
                
                setTimeout(() => {
                    comet.remove();
                }, duration * 1000);
            }

            function queueNextComet() {
                const nextSpawnDelay = Math.random() * 4000 + 2000;
                setTimeout(() => {
                    launchComet();
                    queueNextComet();
                }, nextSpawnDelay);
            }
            queueNextComet();
        });

        // PLAYER HARDWARE ENGINE WIRE-UP
        let player;
        const playToggleBtn = document.getElementById('mp4-play-toggle');
        const liveTitle = document.getElementById('live-title');
        const liveAuthor = document.getElementById('live-author');
        
        let hasInitialized = false;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('mp4-video-frame', {
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function updateMetadataDisplay() {
            if (player && typeof player.getVideoData === 'function') {
                const videoData = player.getVideoData();
                if (videoData) {
                    if (videoData.title) liveTitle.innerText = videoData.title.toUpperCase();
                    if (videoData.author) liveAuthor.innerText = videoData.author.toUpperCase();
                }
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                updateMetadataDisplay();
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.remove('active-load');
                playToggleBtn.classList.add('active-play');
            }
        }

        playToggleBtn.addEventListener('click', () => {
            if (!hasInitialized) {
                player.playVideo();
                hasInitialized = true;
                return;
            }

            if (isPlaying) {
                player.pauseVideo();
                isPlaying = false;
                playToggleBtn.innerText = "Play";
                playToggleBtn.classList.remove('active-play');
            } else {
                player.playVideo();
                isPlaying = true;
                playToggleBtn.innerText = "Pause";
                playToggleBtn.classList.add('active-play');
            }
        });

        document.getElementById('mp4-next').addEventListener('click', () => {
            player.nextVideo();
            hasInitialized = true;
        });

        document.getElementById('mp4-prev').addEventListener('click', () => {
            player.previousVideo();
            hasInitialized = true;
        });
    </script>
</body>
</html>
