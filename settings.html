<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Settings</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- GOLDEN STARFIELD --- */
        #vanguard-universe {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        .star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 40px 60px, var(--gold), transparent),
                radial-gradient(1.5px 1.5px at 150px 200px, #fff, transparent);
            background-size: 400px 400px;
            animation: rotate 220s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- UI WRAPPER --- */
        #app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow-y: auto;
            text-align: center;
            scrollbar-width: none;
        }

        header {
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
            padding: 25px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-bottom: 2px solid var(--gold);
        }

        .user-name { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .id-number { color: var(--gold); font-size: 0.9rem; letter-spacing: 2px; font-weight: bold; margin-top: 5px; }

        .window {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            margin: 20px 0;
            border-radius: 4px;
        }

        h2 { color: var(--gold); font-size: 1.2rem; text-transform: uppercase; margin-bottom: 25px; }

        .input-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--glass-border);
            color: var(--white);
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 2px;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover { background: var(--gold); color: #000; }

        .link { margin-top: 15px; font-size: 0.8rem; cursor: pointer; text-decoration: underline; display: block; }

        footer {
            width: 100%;
            padding: 30px;
            margin-top: auto;
            font-size: 0.7rem;
            letter-spacing: 4px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div id="vanguard-universe"><div class="star-layer"></div></div>

    <main id="app-wrapper">
        
        <header>
            <div style="font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 8px;">IDENTITY CARD</div>
            <div class="user-name" id="user-name">Guest</div>
            <div class="id-number" id="user-id">VCS-OFFLINE</div>
        </header>

        <div class="window">
            <div id="login-view">
                <h2>Sign In</h2>
                <input type="email" id="login-email" class="input-box" placeholder="EMAIL">
                <input type="password" id="login-pass" class="input-box" placeholder="PASSWORD">
                <button class="btn" onclick="signIn()">Sign In</button>
                <span class="link" onclick="toggle()">Need an account?</span>
            </div>

            <div id="reg-view" style="display: none;">
                <h2>Register</h2>
                <input type="text" id="reg-name" class="input-box" placeholder="FULL NAME">
                <input type="email" id="reg-email" class="input-box" placeholder="EMAIL">
                <input type="password" id="reg-pass" class="input-box" placeholder="PASSWORD">
                <button class="btn" onclick="signUp()">Create Profile</button>
                <span class="link" onclick="toggle()">Already have an account?</span>
            </div>
            
            <div id="signed-in-view" style="display: none;">
                <h2>Welcome</h2>
                <p style="margin-bottom: 20px;">You are currently signed in.</p>
                <button class="btn" onclick="signOut()">Sign Out</button>
            </div>
        </div>

        <div style="margin-bottom: 60px; width: 90%; max-width: 500px;">
            <a href="hub.html" class="btn" style="border-color: #fff; color: #fff;">Return to Hub</a>
        </div>

        <footer>Vanguard &copy; <span id="year"></span></footer>
    </main>

    <script>
        const supabaseUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const supabaseKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function toggle() {
            const l = document.getElementById('login-view'), r = document.getElementById('reg-view');
            l.style.display = l.style.display === 'none' ? 'block' : 'none';
            r.style.display = r.style.display === 'none' ? 'block' : 'none';
        }

        async function signUp() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            const { data, error } = await supabaseClient.auth.signUp({
                email, password: pass, options: { data: { full_name: name } }
            });

            if (error) alert(error.message);
            else if (data.user) {
                // Attach details to the 'citizens' table
                const newID = "VCS-" + Math.floor(1000 + Math.random() * 9000);
                await supabaseClient.from('citizens').insert([{ id: data.user.id, full_name: name, citizen_number: newID }]);
                alert("Profile created! Check your email to confirm.");
            }
        }

        async function signIn() {
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message); else window.location.reload();
        }

        async function signOut() { await supabaseClient.auth.signOut(); window.location.reload(); }

        async function load() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('signed-in-view').style.display = 'block';

                // Look up the citizen_number in the table using the user's ID
                const { data: profile } = await supabaseClient
                    .from('citizens').select('full_name, citizen_number').eq('id', user.id).single();

                if (profile) {
                    document.getElementById('user-name').innerText = profile.full_name;
                    document.getElementById('user-id').innerText = profile.citizen_number;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            load();
        });
    </script>
</body>
</html>
