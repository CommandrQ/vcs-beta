<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | My Settings</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #vanguard-universe { position: fixed; inset: 0; z-index: 0; background: #000; }
        .star-layer {
            position: absolute; inset: -50%; width: 200%; height: 200%;
            background-image: radial-gradient(2px 2px at 50px 80px, var(--gold), transparent), radial-gradient(1px 1px at 150px 250px, #fff, transparent);
            background-size: 500px 500px; animation: move 200s linear infinite;
        }
        @keyframes move { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #app-wrapper {
            position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100%; overflow-y: auto; text-align: center; scrollbar-width: none;
        }

        header {
            width: 90%; max-width: 500px; margin-top: 30px; padding: 30px;
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-bottom: 2px solid var(--gold);
        }

        .window {
            width: 90%; max-width: 500px; background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 40px 30px; margin: 20px 0;
        }

        .status-pill {
            display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.6rem;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border: 1px solid #fff;
        }

        .box { width: 100%; background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); color: var(--white); padding: 16px; margin-bottom: 15px; text-align: center; }
        .btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--gold); color: var(--gold); text-transform: uppercase; font-weight: 900; cursor: pointer; }
        .btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="vanguard-universe"><div class="star-layer"></div></div>

    <main id="app-wrapper">
        
        <header>
            <div id="status-indicator" class="status-pill">System: Waiting</div>
            <div style="font-size: 1.4rem; font-weight: 900;" id="top-name">GUEST</div>
            <div style="color: var(--gold); font-weight: bold;" id="top-id">VCS-OFFLINE</div>
        </header>

        <div class="window">
            <div id="login-form">
                <input type="email" id="email-in" class="box" placeholder="EMAIL">
                <input type="password" id="pass-in" class="box" placeholder="PASSWORD">
                <button class="btn" onclick="signIn()">Sign In</button>
            </div>

            <div id="user-profile" style="display: none;">
                <p id="profile-email">...</p>
                <button class="btn" onclick="signOut()" style="margin-top: 20px;">Sign Out</button>
            </div>
        </div>

        <a href="hub.html" class="btn" style="max-width: 500px; border-color: #fff; color: #fff;">Back to Hub</a>

    </main>

    <script>
        // Using your exact URL and Key
        const supabase = supabase.createClient(
            'https://dvyjupytbwbrcoyouxpf.supabase.co', 
            'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk'
        );

        function setStatus(msg, color = "#fff") {
            const el = document.getElementById('status-indicator');
            el.innerText = `System: ${msg}`;
            el.style.borderColor = color;
            el.style.color = color;
        }

        async function signIn() {
            const email = document.getElementById('email-in').value;
            const pass = document.getElementById('pass-in').value;
            setStatus("Authenticating...");
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) {
                setStatus("Auth Failed", "#ff4d4d");
                alert(error.message);
            } else {
                window.location.reload();
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        async function verifyIdentity() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('profile-email').innerText = user.email;
                
                setStatus("Checking Table...");

                // EXPLICIT LOOKUP using the 'email' field
                const { data, error } = await supabase
                    .from('citizens')
                    .select('full_name, citizen_number')
                    .eq('email', user.email)
                    .single();

                if (error) {
                    console.error("Lookup Error:", error);
                    setStatus("No Table Match", "#ffaa00");
                    document.getElementById('top-name').innerText = "Not Found";
                    document.getElementById('top-id').innerText = "VCS-PENDING";
                } else if (data) {
                    setStatus("Match Found", "#D4AF37");
                    document.getElementById('top-name').innerText = data.full_name;
                    document.getElementById('top-id').innerText = data.citizen_number;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', verifyIdentity);
    </script>
</body>
</html>
