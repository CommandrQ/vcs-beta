<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | My Settings</title>
    
    <!-- Supabase Connection Tool -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* --- BASIC SETUP --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- THE GOLDEN STARS --- */
        #vanguard-universe {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
            overflow: hidden;
        }

        .star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 50px 80px, var(--gold), transparent),
                radial-gradient(1px 1px at 150px 250px, #fff, transparent);
            background-size: 500px 500px;
            animation: move-stars 200s linear infinite;
        }

        @keyframes move-stars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- MAIN CONTAINER --- */
        #app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            background: transparent;
            overflow-y: auto;
            text-align: center;
            scrollbar-width: none;
        }

        #app-wrapper::-webkit-scrollbar { display: none; }

        /* --- HEADER WINDOW --- */
        header {
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-bottom: 2px solid var(--gold);
        }

        .name-text {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .number-text {
            color: var(--gold);
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- CONTENT WINDOWS --- */
        .window {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            margin: 20px 0;
            border-radius: 4px;
        }

        h2 {
            color: var(--gold);
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .detail-row {
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .detail-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        /* --- BUTTONS & INPUTS --- */
        .input-box {
            width: 100%;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
            color: var(--white);
            padding: 16px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
        }

        .btn:hover { background: var(--gold); color: #000; }

        .link-text {
            margin-top: 15px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
            display: block;
        }

        footer {
            width: 100%;
            padding: 30px;
            margin-top: auto;
            font-size: 0.7rem;
            letter-spacing: 3px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div id="vanguard-universe">
        <div class="star-layer"></div>
    </div>

    <main id="app-wrapper">
        
        <!-- TOP IDENTITY DISPLAY -->
        <header>
            <div class="name-text" id="header-name">GUEST</div>
            <div class="number-text" id="header-id">VCS-OFFLINE</div>
        </header>

        <!-- MAIN ACCOUNT WINDOW -->
        <div class="window">
            
            <!-- VIEW FOR SIGNED-IN USERS -->
            <div id="signed-in-area" style="display: none;">
                <h2>My Information</h2>
                <div class="detail-row">
                    <span class="detail-label">Verified Email</span>
                    <span id="display-email">...</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Account Status</span>
                    <span>Active Member</span>
                </div>
                <button class="btn" onclick="logOut()">Sign Out</button>
            </div>

            <!-- VIEW FOR GUESTS (LOGIN) -->
            <div id="login-area">
                <h2>Sign In</h2>
                <input type="email" id="in-email" class="input-box" placeholder="EMAIL ADDRESS">
                <input type="password" id="in-pass" class="input-box" placeholder="PASSWORD">
                <button class="btn" onclick="logIn()">Sign In</button>
                <span class="link-text" onclick="toggleViews()">Need to create an account?</span>
            </div>

            <!-- VIEW FOR GUESTS (REGISTER) -->
            <div id="register-area" style="display: none;">
                <h2>Create Account</h2>
                <input type="text" id="reg-name" class="input-box" placeholder="FULL NAME">
                <input type="email" id="reg-email" class="input-box" placeholder="EMAIL ADDRESS">
                <input type="password" id="reg-pass" class="input-box" placeholder="PASSWORD">
                <button class="btn" onclick="registerUser()">Join Vanguard</button>
                <span class="link-text" onclick="toggleViews()">Already have an account?</span>
            </div>

        </div>

        <div class="window">
            <h2>Support</h2>
            <p>If you have questions about your information, reach out to our team.</p>
            <a href="support.html" class="btn" style="border-color: #fff; color: #fff;">Contact Help</a>
        </div>

        <div style="margin-bottom: 60px; width: 90%; max-width: 500px;">
            <a href="hub.html" class="btn" style="border-color: #fff; color: #fff;">Return to Hub</a>
        </div>

        <footer>Vanguard &copy; <span id="year"></span></footer>
    </main>

    <script>
        const supabaseUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const supabaseKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function toggleViews() {
            const login = document.getElementById('login-area');
            const register = document.getElementById('register-area');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            register.style.display = register.style.display === 'none' ? 'block' : 'none';
        }

        async function registerUser() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            const { data, error } = await supabase.auth.signUp({
                email, password: pass, options: { data: { full_name: name } }
            });

            if (error) alert(error.message);
            else if (data.user) {
                // Creates a new entry in your 'citizens' table
                const newNum = "VCS-" + Math.floor(1000 + Math.random() * 9000);
                await supabase.from('citizens').insert([{ 
                    id: data.user.id, 
                    full_name: name, 
                    email: email,
                    citizen_number: newNum 
                }]);
                alert("Welcome! Check your email to confirm your account.");
            }
        }

        async function logIn() {
            const email = document.getElementById('in-email').value;
            const pass = document.getElementById('in-pass').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Error: " + error.message); 
            else window.location.reload();
        }

        async function logOut() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        async function fetchUserDetails() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('signed-in-area').style.display = 'block';
                document.getElementById('display-email').innerText = user.email;

                // Pull the fields from your 'citizens' table
                const { data: profile } = await supabase
                    .from('citizens')
                    .select('full_name, citizen_number')
                    .eq('id', user.id)
                    .single();

                if (profile) {
                    document.getElementById('header-name').innerText = profile.full_name;
                    document.getElementById('header-id').innerText = profile.citizen_number;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            fetchUserDetails();
        });
    </script>
</body>
</html>
