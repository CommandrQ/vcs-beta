<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | My Settings</title>
    
    <!-- This is the tool that lets us talk to your database -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.2);
        }

        /* --- BASIC SETUP --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- THE GOLDEN STARS --- */
        #vanguard-stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        .star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 50px 80px, var(--gold), transparent), 
                radial-gradient(1px 1px at 150px 250px, #fff, transparent);
            background-size: 500px 500px;
            animation: rotate-stars 240s linear infinite;
        }

        @keyframes rotate-stars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- CENTERED BOXES --- */
        #app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow-y: auto;
            text-align: center;
            scrollbar-width: none;
        }

        #app-wrapper::-webkit-scrollbar { display: none; }

        header {
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--gold);
        }

        .user-name { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .user-id { color: var(--gold); font-weight: bold; margin-top: 5px; letter-spacing: 1px; }

        .window {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 40px 30px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .input-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 16px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover { background: var(--gold); color: #000; }

        footer {
            width: 100%;
            padding: 30px;
            margin-top: auto;
            font-size: 0.7rem;
            letter-spacing: 3px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div id="vanguard-stars"><div class="star-layer"></div></div>

    <main id="app-wrapper">
        
        <header>
            <div style="font-size: 0.6rem; margin-bottom: 10px; opacity: 0.6;" id="load-status">System: Ready</div>
            <div class="user-name" id="name-field">GUEST</div>
            <div class="user-id" id="id-field">OFFLINE</div>
        </header>

        <div class="window">
            
            <!-- This shows up if you need to log in -->
            <div id="login-view">
                <h2 style="color: var(--gold); margin-bottom: 20px;">Sign In</h2>
                <input type="email" id="email-input" class="input-box" placeholder="EMAIL">
                <input type="password" id="pass-input" class="input-box" placeholder="PASSWORD">
                <button class="btn" onclick="runLogin()">Sign In</button>
            </div>

            <!-- This shows up once you are logged in -->
            <div id="profile-view" style="display: none;">
                <h2 style="color: var(--gold); margin-bottom: 10px;">My Account</h2>
                <p id="email-label" style="margin-bottom: 25px; opacity: 0.8;"></p>
                <button class="btn" onclick="runLogout()">Sign Out</button>
            </div>

        </div>

        <div style="margin-bottom: 60px; width: 90%; max-width: 500px;">
            <a href="hub.html" class="btn" style="border-color: #fff; color: #fff;">Return to Hub</a>
        </div>

        <footer>Vanguard &copy; <span id="year"></span></footer>
    </main>

    <script>
        // Use a unique name for the connection to avoid syntax errors
        const vanguardData = supabase.createClient(
            'https://dvyjupytbwbrcoyouxpf.supabase.co', 
            'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk'
        );

        function setLabel(text) {
            document.getElementById('load-status').innerText = "System: " + text;
        }

        async function runLogin() {
            const e = document.getElementById('email-input').value;
            const p = document.getElementById('pass-input').value;
            setLabel("Checking Credentials...");
            
            const { error } = await vanguardData.auth.signInWithPassword({ email: e, password: p });
            if (error) {
                alert(error.message);
                setLabel("Error");
            } else {
                window.location.reload();
            }
        }

        async function runLogout() {
            await vanguardData.auth.signOut();
            window.location.reload();
        }

        async function checkIdentity() {
            // Get the current user session
            const { data: { user } } = await vanguardData.auth.getUser();

            if (user) {
                // Adjust the UI
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('profile-view').style.display = 'block';
                document.getElementById('email-label').innerText = user.email;

                setLabel("Searching Table...");

                // Look for the user's email in your citizens table
                // We use .ilike to ignore capital letters
                const { data, error } = await vanguardData
                    .from('citizens')
                    .select('full_name, citizen_number')
                    .ilike('email', user.email)
                    .single();

                if (error) {
                    console.log("Database says:", error.message);
                    setLabel("No Match Found");
                    document.getElementById('name-field').innerText = "Unregistered";
                } else if (data) {
                    setLabel("Verified");
                    document.getElementById('name-field').innerText = data.full_name;
                    document.getElementById('id-field').innerText = data.citizen_number;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            checkIdentity();
        });
    </script>
</body>
</html>
