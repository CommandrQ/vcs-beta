<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fort Toward | Profile & Privacy</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --v-curve: cubic-bezier(0.4, 0, 0.2, 1); }

        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        .universe-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star-layer { position: absolute; inset: -500px; background-image: radial-gradient(2px 2px at 20px 30px, #fff, transparent); background-size: 300px 300px; animation: drift 180s linear infinite; opacity: 0.2; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(500px); } }

        .viewport-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; padding: 15px; box-sizing: border-box;
        }

        /* --- SETTINGS TERMINAL --- */
        .directory-terminal {
            width: 100%; max-width: 600px;
            max-height: 90vh; display: flex; flex-direction: column;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .terminal-header { padding: 35px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .greeting-text { color: var(--gold); font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .role-tag { font-size: 0.7rem; color: #fff; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; opacity: 0.7; }

        /* --- CONTENT & FORMS --- */
        .settings-content { padding: 30px; overflow-y: auto; }
        
        .form-group { margin-bottom: 25px; }
        .form-group label { 
            display: block; color: #fff; font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 2px; 
            margin-bottom: 10px; font-weight: bold;
        }

        .form-input {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            padding: 14px 18px; color: #fff; font-size: 1rem;
            box-sizing: border-box; transition: 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.1); }

        /* --- BUTTONS --- */
        .btn-gold {
            width: 100%; background: var(--gold); color: #000;
            border: none; padding: 16px; border-radius: 50px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; font-size: 0.85rem; margin-bottom: 15px;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); }

        .btn-outline {
            width: 100%; background: transparent; color: #fff;
            border: 1px solid rgba(255,255,255,0.3); padding: 14px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; font-size: 0.8rem; text-decoration: none; display: block; text-align: center;
            box-sizing: border-box; margin-bottom: 10px;
        }
        .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); }

        .danger-zone { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 25px; }
        .status-msg { margin-bottom: 15px; font-size: 0.8rem; text-align: center; min-height: 1.2rem; }
    </style>
</head>
<body>

    <div class="universe-bg"><div class="star-layer"></div></div>

    <div class="viewport-wrapper">
        <article class="directory-terminal">
            <header class="terminal-header">
                <div class="greeting-text">Sanctuary Records</div>
                <div id="role-display" class="role-tag">Validating Identity...</div>
            </header>

            <div class="settings-content">
                <div id="status-msg" class="status-msg"></div>

                <form id="profile-form">
                    <div class="form-group">
                        <label>Assigned Email</label>
                        <input type="email" id="email-display" class="form-input" readonly style="opacity: 0.4;">
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="full-name" class="form-input" placeholder="Citizen Name">
                    </div>

                    <button type="submit" class="btn-gold">Apply Changes</button>
                    <a href="directory.html" class="btn-outline">Return to Hub</a>
                </form>

                <div class="danger-zone">
                    <button id="btn-reset" class="btn-outline" style="border-color: #f87171; color: #f87171;">Sign Out & Clear Cache</button>
                </div>
            </div>
        </article>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const ui = {
            form: document.getElementById('profile-form'),
            name: document.getElementById('full-name'),
            email: document.getElementById('email-display'),
            role: document.getElementById('role-display'),
            status: document.getElementById('status-msg'),
            logout: document.getElementById('btn-reset')
        };

        // --- THE CACHE ENGINE ---
        function updateCache(profile) {
            localStorage.setItem('vanguard_profile', JSON.stringify(profile));
        }

        function getCache() {
            const cached = localStorage.getItem('vanguard_profile');
            return cached ? JSON.parse(cached) : null;
        }

        async function init() {
            // 1. Check Cache first for instant load
            const cached = getCache();
            if (cached) {
                ui.name.value = cached.name;
                ui.role.innerText = `Role: ${cached.role}`;
                ui.email.value = cached.email || "";
            }

            // 2. Fetch fresh data from Supabase
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                const profile = {
                    name: user.user_metadata?.full_name || "Citizen",
                    role: user.user_metadata?.role || "Citizen",
                    email: user.email
                };
                
                // Update UI and Cache with fresh data
                ui.name.value = profile.name;
                ui.role.innerText = `Role: ${profile.role}`;
                ui.email.value = profile.email;
                updateCache(profile);
            } else {
                localStorage.removeItem('vanguard_profile');
                window.location.href = 'directory.html';
            }
        }

        ui.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            ui.status.innerText = "Syncing with Sanctuary...";
            ui.status.style.color = "#fff";

            const { data, error } = await supabaseClient.auth.updateUser({
                data: { full_name: ui.name.value }
            });

            if (error) {
                ui.status.innerText = error.message;
                ui.status.style.color = "#f87171";
            } else {
                ui.status.innerText = "Records Updated Successfully.";
                ui.status.style.color = "#4ade80";
                
                // Refresh cache
                const cached = getCache();
                updateCache({ ...cached, name: ui.name.value });
            }
        });

        ui.logout.addEventListener('click', async () => {
            // Clear EVERYTHING
            localStorage.clear();
            await supabaseClient.auth.signOut();
            window.location.href = 'directory.html';
        });

        window.onload = init;
    </script>
</body>
</html>
