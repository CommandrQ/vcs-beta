<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account | Vanguard Citizen Services</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- BRANDING & VARIABLES --- */
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-dark: #05040a;
            --white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(15, 15, 20, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            color: var(--white);
            background: linear-gradient(180deg, #020108 0%, #0a0815 40%, #1a1005 75%, #D4AF37 120%);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- THE ENVIRONMENT (Stars & Comets) --- */
        #environment { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .starfield {
            position: absolute; width: 200vw; height: 200vh; top: -50%; left: -50%;
            background-image: 
                radial-gradient(1.5px 1.5px at 10% 10%, #fff, transparent),
                radial-gradient(2px 2px at 30% 40%, var(--gold), transparent),
                radial-gradient(1px 1px at 80% 20%, #fff, transparent),
                radial-gradient(2.5px 2.5px at 50% 80%, var(--gold), transparent);
            background-size: 350px 350px;
            animation: stellar-drift 400s linear infinite;
            opacity: 0.5;
        }
        @keyframes stellar-drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .comet {
            position: absolute; width: 120px; height: 2px;
            background: linear-gradient(90deg, #fff 0%, var(--gold) 20%, transparent 100%);
            border-radius: 50%; box-shadow: 0 0 15px var(--gold-glow);
            animation: comet-strike 2s var(--ease-smooth) forwards; opacity: 0;
        }
        @keyframes comet-strike {
            0% { transform: translate(0, 0) rotate(-35deg); opacity: 1; }
            100% { transform: translate(-1000px, 600px) rotate(-35deg); opacity: 0; }
        }

        /* --- LAYOUT & CONTAINERS --- */
        .settings-container {
            width: 90%;
            max-width: 450px;
            z-index: 10;
            padding: 60px 0 30px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: auto 0;
            animation: fadeUp 0.6s var(--ease-smooth) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title { 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px var(--glass-border);
            width: 100%;
            margin-bottom: 25px; 
        }

        h2 { color: var(--gold); margin-bottom: 20px; font-size: 1.4rem; font-weight: 700; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }

        /* --- USER PROFILE DISPLAY --- */
        .user-info { margin-bottom: 30px; background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .greeting-text { font-size: 1.2rem; color: var(--white); margin-bottom: 20px; line-height: 1.4; }
        .greeting-text strong { font-size: 1.4rem; color: var(--gold); display: block; margin-top: 5px; }
        
        .label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .citizen-id { font-size: 1.5rem; font-weight: 600; color: var(--white); letter-spacing: 2px; margin-bottom: 20px; }
        .user-email { font-size: 0.9rem; color: var(--text-muted); }

        /* --- FORMS & INPUTS --- */
        input { 
            width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(0, 0, 0, 0.4); color: white; 
            font-family: inherit; font-size: 1rem; transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); background: rgba(0, 0, 0, 0.6); }
        input::placeholder { color: rgba(255, 255, 255, 0.3); }

        .name-row { display: flex; gap: 12px; width: 100%; }

        .action-btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            background: var(--white); color: var(--bg-dark); font-weight: 700; font-size: 1.05rem;
            cursor: pointer; transition: all 0.3s var(--ease-smooth); text-decoration: none; display: inline-block;
        }
        .action-btn:hover { background: var(--gold); box-shadow: 0 0 20px var(--gold-glow); transform: translateY(-2px); }
        
        /* Secondary buttons (Clear Cache, Sign Out, Back to Hub) */
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: var(--white); margin-top: 15px; }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--white); box-shadow: none; transform: none; }

        .btn-danger { color: #ff6b6b; border-color: rgba(255, 107, 107, 0.3); }
        .btn-danger:hover { background: rgba(255, 107, 107, 0.1); border-color: #ff6b6b; color: #ff6b6b; }

        .toggle-link {
            margin-top: 20px; font-size: 0.95rem; color: var(--text-muted);
            cursor: pointer; display: inline-block; transition: color 0.2s;
        }
        .toggle-link:hover { color: var(--white); text-decoration: underline; }

        .hidden { display: none !important; }

        /* --- FOOTER --- */
        footer { 
            text-align: center; color: var(--white); font-size: 0.75rem; 
            letter-spacing: 2px; text-transform: uppercase; width: 100%; 
            margin-top: auto; padding-bottom: 30px; opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Environmental Background -->
    <div id="environment"><div class="starfield"></div></div>

    <div class="settings-container">
        <h1 class="page-title">Your Account</h1>

        <main class="glass-card">
            
            <!-- Login & Sign Up Form -->
            <div id="auth-form" class="hidden">
                <h2 id="auth-title">Create Your Profile</h2>
                <p class="subtitle" id="auth-subtitle">Join the community and get involved.</p>
                
                <div class="name-row" id="signup-name-row">
                    <input type="text" id="signup-first" placeholder="First Name">
                    <input type="text" id="signup-last" placeholder="Last Name">
                </div>
                
                <input type="email" id="signup-email" placeholder="Email Address">
                <input type="password" id="signup-pass" placeholder="Password">
                
                <button id="auth-submit-btn" class="action-btn" onclick="handleAuthAction()">Sign Up</button>
                
                <span id="auth-toggle-btn" class="toggle-link" onclick="toggleAuthMode()">Already a member? Sign in here.</span>
            </div>

            <!-- Logged In User View -->
            <div id="user-profile" class="hidden">
                <h2>Welcome Back</h2>
                
                <div class="user-info">
                    <div id="display-greeting" class="greeting-text">Hello, <strong>Neighbor</strong></div>
                    
                    <div class="label">Citizen Number</div>
                    <div id="display-id" class="citizen-id">Loading...</div>
                    
                    <div class="label">Contact</div>
                    <div id="display-email" class="user-email">...</div>
                </div>
                
                <button class="action-btn btn-outline" onclick="handleLogout()">Sign Out</button>
            </div>

            <!-- Maintenance Options -->
            <div id="maintenance-section" style="margin-top: 40px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1);">
                <button class="action-btn btn-outline btn-danger" style="padding: 14px;" onclick="wipeCache()">Clear Browser Data</button>
            </div>

        </main>

        <!-- Links back to index.html -->
        <a href="index.html" class="action-btn btn-outline" style="border: none; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);">Back to Home</a>
    </div>

    <footer>Powered by Vanguard Citizen Services</footer>

    <script>
        /* --- 1. COMET ANIMATION --- */
        function spawnComet() {
            const container = document.getElementById('environment');
            const comet = document.createElement('div');
            comet.classList.add('comet');
            comet.style.top = `${Math.random() * 40}vh`;
            comet.style.left = `${50 + (Math.random() * 50)}vw`;
            container.appendChild(comet);
            setTimeout(() => comet.remove(), 2000);
        }
        setInterval(spawnComet, 3500);
        spawnComet();

        /* --- 2. SUPABASE SETUP --- */
        const sbUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const sbKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(sbUrl, sbKey);
        
        let isSignUpMode = true;

        /* --- 3. CHECK USER STATUS --- */
        async function checkSession() {
            const authForm = document.getElementById('auth-form');
            const userProfile = document.getElementById('user-profile');

            try {
                // getSession() checks local storage instantly without waiting on a slow server response
                const { data, error } = await supabaseClient.auth.getSession();
                
                if (data.session && data.session.user) {
                    const user = data.session.user;
                    
                    userProfile.classList.remove('hidden');
                    authForm.classList.add('hidden');
                    document.getElementById('display-email').innerText = user.email;
                    
                    const { data: profileData } = await supabaseClient
                        .from('master_roster')
                        .select('first_name, last_name, citizenship_number')
                        .eq('id', user.id) 
                        .single();

                    if (profileData) {
                        const fullName = `${profileData.first_name} ${profileData.last_name}`;
                        document.getElementById('display-greeting').innerHTML = `Hello, <strong>${fullName}</strong>`;
                        document.getElementById('display-id').innerText = profileData.citizenship_number || "Pending Setup";
                        
                        localStorage.setItem('vanguard_session_status', 'active');
                        localStorage.setItem('vanguard_citizen_name', fullName);
                    } else {
                        document.getElementById('display-greeting').innerHTML = `Hello, <strong>Neighbor</strong>`;
                        document.getElementById('display-id').innerText = "Processing";
                    }
                } else {
                    // No session found, immediately display the auth form
                    authForm.classList.remove('hidden');
                    userProfile.classList.add('hidden');
                }
            } catch (err) {
                console.error("Session check failed. Displaying sign-in form.", err);
                authForm.classList.remove('hidden');
                userProfile.classList.add('hidden');
            }
        }

        /* --- 4. SWITCH BETWEEN LOGIN AND SIGN UP --- */
        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const nameRow = document.getElementById('signup-name-row');
            const submitBtn = document.getElementById('auth-submit-btn');
            const toggleLink = document.getElementById('auth-toggle-btn');

            if (isSignUpMode) {
                title.innerText = "Create Your Profile";
                subtitle.innerText = "Join the community and get involved.";
                nameRow.classList.remove('hidden');
                submitBtn.innerText = "Sign Up";
                toggleLink.innerText = "Already a member? Sign in here.";
            } else {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Sign in to access your community account.";
                nameRow.classList.add('hidden'); // Hide names for standard login
                submitBtn.innerText = "Sign In";
                toggleLink.innerText = "Need an account? Register here.";
            }
        }

        function handleAuthAction() {
            if (isSignUpMode) {
                handleSignup();
            } else {
                handleLogin();
            }
        }

        /* --- 5. AUTHENTICATION LOGIC --- */
        async function handleLogin() {
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-pass').value.trim();

            if (!email || !pass) {
                alert("Please fill in both your email and password.");
                return;
            }

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            
            if (error) {
                alert("We couldn't sign you in: " + error.message);
            } else {
                localStorage.setItem('vanguard_session_status', 'active');
                location.reload();
            }
        }

        async function handleSignup() {
            const first = document.getElementById('signup-first').value.trim();
            const last = document.getElementById('signup-last').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-pass').value.trim();

            if (!first || !last || !email || pass.length < 6) {
                alert("Please fill in all details. Make sure your password is at least 6 characters long!");
                return;
            }

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: pass,
                options: {
                    data: {
                        first_name: first,
                        last_name: last,
                        initial_focus: 'unspecified'
                    }
                }
            });
            
            if (error) {
                alert("There was an issue creating your account: " + error.message);
            } else {
                localStorage.setItem('vanguard_session_status', 'active');
                localStorage.setItem('vanguard_citizen_name', `${first} ${last}`);
                location.reload();
            }
        }

        /* --- 6. CLEANUP TOOLS --- */
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('vanguard_session_status');
            localStorage.removeItem('vanguard_citizen_name');
            location.reload();
        }

        function wipeCache() {
            if (confirm("This will clear your local website data and sign you out. Are you sure?")) {
                localStorage.clear();
                sessionStorage.clear();
                alert("Data cleared successfully.");
                location.reload();
            }
        }

        // Start the check exactly when the document elements are ready
        document.addEventListener('DOMContentLoaded', checkSession);
    </script>
</body>
</html>
