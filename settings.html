<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project V | Command Center</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Core -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper">

        <!-- HEADER: Title on Left, Big Button on Right -->
        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status">
                <h1 id="settings-title">Settings</h1>
                <a href="hub.html" class="back-btn">HUB →</a>
            </div>
        </header>

        <!-- SCROLLABLE CORE -->
        <section id="directory-core">
            <div id="directory-list">
                
                <!-- 1. AUTHENTICATION (The Entrance) -->
                <div id="auth-section" class="link-card">
                    <h3 class="card-title">Sanctuary Access</h3>
                    <p class="card-desc" id="auth-status">Enter your frequency to connect to the network.</p>
                    
                    <!-- Guest View -->
                    <div id="guest-view" style="width: 100%;">
                        <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                            <label style="font-size: 0.8rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">EMAIL ADDRESS</label>
                            <input type="email" id="auth-email" class="settings-input" style="margin-top: 10px;" placeholder="citizen@example.com">
                        </div>
                        <button onclick="handleAuth()" class="gate-button">Send Access Link</button>
                    </div>

                    <!-- Citizen View -->
                    <div id="citizen-view" style="width: 100%; display: none;">
                        <button onclick="signOut()" class="gate-button" style="border-color: var(--danger); color: var(--danger);">Disconnect / Logout</button>
                    </div>
                    
                    <div id="auth-msg" style="margin-top: 20px; font-size: 0.9rem; font-weight: 700;"></div>
                </div>

                <!-- 2. IDENTITY (Who Are You?) -->
                <div id="identity-section" class="link-card" style="display: none;">
                    <h3 class="card-title">Who are you?</h3>
                    <p class="card-desc">Your Hero Name is how you are known in the sanctuary.</p>
                    
                    <div class="form-group" style="width: 100%; text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 0.8rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">HERO NAME</label>
                        <input type="text" id="new-name" class="settings-input" style="margin-top: 10px;" placeholder="Update name...">
                    </div>

                    <div class="button-group">
                        <button onclick="updateName()" class="card-btn">Save Identity</button>
                        <button onclick="sendRestoreLink()" class="card-btn secondary">Email Restore Link</button>
                    </div>
                </div>

                <!-- 3. MAINTENANCE (Is It Broken?) -->
                <div class="link-card">
                    <h3 class="card-title">Is it broken?</h3>
                    <p class="card-desc">If the interface feels unstable, use these protocols to refresh your connection.</p>
                    
                    <div class="button-group">
                        <button onclick="clearCache()" class="card-btn">Fix My App</button>
                        <button onclick="fullReset()" class="card-btn danger">Clean Slate</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- FOOTER -->
        <footer id="bottom-glass-panel" class="glass-module">
            <div class="footer-container">
                <p class="footer-msg active">Vanguard Security Core Active</p>
            </div>
        </footer>

    </main>

    <script src="app.js"></script>
    <script>
        // --- AUTH & STATE MANAGEMENT ---
        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const guestView = document.getElementById('guest-view');
            const citizenView = document.getElementById('citizen-view');
            const identitySection = document.getElementById('identity-section');
            const statusLabel = document.getElementById('auth-status');
            const title = document.getElementById('settings-title');

            if (user) {
                guestView.style.display = 'none';
                citizenView.style.display = 'block';
                identitySection.style.display = 'flex';
                title.innerText = "Command Center";
                statusLabel.innerText = `Connected: ${user.email}`;
                
                const cached = JSON.parse(localStorage.getItem('vanguard_profile')) || {};
                if(cached.name) document.getElementById('new-name').value = cached.name;
            } else {
                guestView.style.display = 'block';
                citizenView.style.display = 'none';
                identitySection.style.display = 'none';
                title.innerText = "Connect";
            }
        }

        document.addEventListener('DOMContentLoaded', checkSession);

        // --- HANDLERS ---
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const msg = document.getElementById('auth-msg');
            if(!email) return alert("Frequency (Email) required.");
            
            msg.innerText = "Initializing link...";
            const { error } = await supabaseClient.auth.signInWithOtp({
                email: email,
                options: { emailRedirectTo: window.location.origin + '/hub.html' }
            });

            if(error) {
                msg.innerText = "Error: " + error.message;
                msg.style.color = "var(--danger)";
            } else {
                msg.innerText = "Link sent. Check your inbox.";
                msg.style.color = "#4ade80";
            }
        }

        async function updateName() {
            const name = document.getElementById('new-name').value;
            const cached = JSON.parse(localStorage.getItem('vanguard_profile')) || {};
            cached.name = name;
            localStorage.setItem('vanguard_profile', JSON.stringify(cached));
            alert("Identity synchronized.");
            location.reload();
        }

        async function sendRestoreLink() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { error } = await supabaseClient.auth.resetPasswordForEmail(user.email);
            alert(error ? error.message : "Restore link dispatched to your email.");
        }

        function clearCache() {
            const prof = localStorage.getItem('vanguard_profile');
            localStorage.clear();
            if(prof) localStorage.setItem('vanguard_profile', prof);
            alert("Interface repaired. Refreshing...");
            location.reload();
        }

        function fullReset() {
            if(confirm("DANGER: This will wipe all local data and logout. Proceed?")) {
                localStorage.clear();
                signOut();
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('vanguard_profile');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
