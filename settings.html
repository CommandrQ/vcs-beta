<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Terminal Settings</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .settings-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
        }
        .settings-card h3 {
            color: #D4AF37; font-size: 0.9rem; text-transform: uppercase;
            margin-bottom: 15px; letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }
        .vanguard-input {
            width: 100%; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 12px 15px; border-radius: 8px;
            margin-bottom: 15px; font-size: 0.9rem; box-sizing: border-box;
        }
        .action-btn {
            background: rgba(15,15,15,0.9); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-weight: 800; font-size: 0.8rem;
            text-transform: uppercase; width: 100%;
        }
        .auth-toggle {
            text-align: center; font-size: 0.8rem; margin-top: 15px; color: rgba(255,255,255,0.6);
        }
        .auth-toggle span { color: #D4AF37; cursor: pointer; text-decoration: underline; }
        #register-section { display: none; }
    </style>
</head>
<body>
    <div id="vanguard-universe"><div class="gold-star-layer"></div></div>
    <main id="app-wrapper" style="display: flex; flex-direction: column; height: 100vh;">
        <header id="top-glass-panel" style="padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h1 style="font-size: 1.2rem; color: #fff; margin: 0;">Terminal Settings</h1>
                <a href="hub.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 8px;">HUB →</a>
            </div>
        </header>

        <section style="flex-grow: 1; overflow-y: auto; padding: 25px;">
            <div class="settings-card" id="auth-module">
                <div id="login-section">
                    <h3>Terminal Access</h3>
                    <input type="email" id="login-email" class="vanguard-input" placeholder="Email">
                    <input type="password" id="login-pass" class="vanguard-input" placeholder="Password">
                    <button class="action-btn" onclick="processLogin()">Establish Uplink</button>
                    <div class="auth-toggle">No clearance? <span onclick="toggleAuth()">Register</span></div>
                </div>
                <div id="register-section">
                    <h3>Citizen Registration</h3>
                    <input type="text" id="reg-name" class="vanguard-input" placeholder="Full Name">
                    <input type="email" id="reg-email" class="vanguard-input" placeholder="Email">
                    <input type="password" id="reg-pass" class="vanguard-input" placeholder="Password">
                    <button class="action-btn" onclick="processRegistration()">Initialize Profile</button>
                    <div class="auth-toggle">Have clearance? <span onclick="toggleAuth()">Login</span></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const supabaseUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const supabaseKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function toggleAuth() {
            const login = document.getElementById('login-section');
            const reg = document.getElementById('register-section');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            reg.style.display = reg.style.display === 'none' ? 'block' : 'none';
        }

        async function processRegistration() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const { data, error } = await supabaseClient.auth.signUp({
                email, password: pass, options: { data: { full_name: name } }
            });
            if (error) alert(error.message);
            else { window.location.href = 'hub.html'; }
        }

        async function processLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message);
            else { sessionStorage.setItem('just_logged_in', 'true'); window.location.href = 'hub.html'; }
        }
    </script>
</body>
</html>
