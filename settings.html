<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fort Toward | Citizen Profile</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1); 
        }

        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        .universe-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star-layer { position: absolute; inset: -500px; background-image: radial-gradient(2px 2px at 20px 30px, #fff, transparent); background-size: 300px 300px; animation: drift 180s linear infinite; opacity: 0.2; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(500px); } }

        .viewport-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; padding: 15px; box-sizing: border-box;
        }

        /* --- SETTINGS TERMINAL --- */
        .directory-terminal {
            width: 100%; max-width: 600px; /* Slimmer for form focus */
            height: auto; max-height: 85vh; display: flex; flex-direction: column;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .terminal-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .greeting-text { color: var(--gold); font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; }

        /* --- FORM STYLING --- */
        .settings-content { padding: 30px; overflow-y: auto; }
        
        .form-group { margin-bottom: 25px; }
        .form-group label { 
            display: block; color: #fff; font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 2px; 
            margin-bottom: 10px; font-weight: bold;
        }

        .form-input {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            padding: 12px 15px; color: #fff; font-size: 1rem;
            box-sizing: border-box; transition: 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.08); }

        .btn-row { display: flex; gap: 15px; margin-top: 10px; }

        .btn-gold {
            flex: 2; background: var(--gold); color: #000;
            border: none; padding: 15px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; font-size: 0.85rem;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        .btn-outline {
            flex: 1; background: transparent; color: #fff;
            border: 1px solid rgba(255,255,255,0.3); padding: 15px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; font-size: 0.8rem; text-align: center; text-decoration: none;
        }
        .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); }

        .status-msg { margin-top: 20px; font-size: 0.85rem; text-align: center; min-height: 1.2rem; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>

    <div class="universe-bg"><div class="star-layer"></div></div>

    <div class="viewport-wrapper">
        <article class="directory-terminal">
            <header class="terminal-header">
                <div class="greeting-text">Citizen Profile</div>
                <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-top: 5px;">Update Sanctuary Records</div>
            </header>

            <div class="settings-content">
                <form id="profile-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email-display" class="form-input" readonly style="opacity: 0.5; cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="full-name" class="form-input" placeholder="e.g. John Doe">
                    </div>

                    <div class="btn-row">
                        <button type="submit" class="btn-gold">Update Profile</button>
                        <a href="directory.html" class="btn-outline">Return</a>
                    </div>
                </form>
                
                <div id="status-msg" class="status-msg"></div>

                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">
                
                <button id="btn-logout" class="btn-outline" style="width: 100%; border-color: #f87171; color: #f87171;">Sign Out of Sanctuary</button>
            </div>
        </article>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const form = document.getElementById('profile-form');
        const nameInput = document.getElementById('full-name');
        const emailDisplay = document.getElementById('email-display');
        const statusMsg = document.getElementById('status-msg');
        const logoutBtn = document.getElementById('btn-logout');

        async function loadProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                emailDisplay.value = user.email;
                nameInput.value = user.user_metadata?.full_name || '';
            } else {
                // If not logged in, send them back to the Hub
                window.location.href = 'directory.html';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusMsg.innerText = "Syncing with Sanctuary...";
            statusMsg.className = "status-msg";

            const { data, error } = await supabaseClient.auth.updateUser({
                data: { full_name: nameInput.value }
            });

            if (error) {
                statusMsg.innerText = "Error: " + error.message;
                statusMsg.classList.add('error');
            } else {
                statusMsg.innerText = "Profile updated successfully.";
                statusMsg.classList.add('success');
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'directory.html';
        });

        window.onload = loadProfile;
    </script>
</body>
</html>
