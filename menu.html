<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Project V</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
        }

        /* Fade Overlays */
        #fade-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            z-index: 9999;
            pointer-events: none;
            opacity: 1; /* Starts black and fades in */
            transition: opacity 0.8s ease-out;
        }

        /* Space Canvas */
        #space-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* Main UI Layer */
        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        /* Logo */
        .logo-container {
            position: relative;
            width: 180px; 
            animation: float 4s ease-in-out infinite;
            margin-bottom: 2rem;
        }
        .logo-container img { width: 100%; height: auto; display: block; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Carousel Menu */
        .menu-carousel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-arrow {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            transition: 0.2s;
            outline: none;
        }
        .nav-arrow:hover { filter: drop-shadow(0 0 8px #00ffff); transform: scale(1.1); }
        .nav-arrow svg { width: 100%; height: 100%; }

        .menu-display {
            width: 300px;
            height: 60px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.4);
            background: rgba(0, 255, 255, 0.05);
            border-radius: 5px;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 0 10px rgba(0,255,255,0.1);
        }

        #current-menu-item {
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: absolute;
            width: 100%;
            text-align: center;
            transition: 0.3s;
        }
        #current-menu-item:hover { color: #fff; text-shadow: 0 0 15px #00ffff; }

        /* Animation Classes for Carousel */
        .slide-out-up { animation: slideOutUp 0.3s forwards; }
        .slide-in-up { animation: slideInUp 0.3s forwards; }
        .slide-out-down { animation: slideOutDown 0.3s forwards; }
        .slide-in-down { animation: slideInDown 0.3s forwards; }

        @keyframes slideOutUp { to { transform: translateY(-150%); opacity: 0; } }
        @keyframes slideInUp { from { transform: translateY(150%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideOutDown { to { transform: translateY(150%); opacity: 0; } }
        @keyframes slideInDown { from { transform: translateY(-150%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Legal Links Under Menu */
        .legal-mini-links {
            margin-top: 1.5rem;
            display: flex;
            gap: 20px;
        }
        .legal-link {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            color: rgba(160, 196, 255, 0.6);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }
        .legal-link:hover { color: #00ffff; }

        /* POPUP MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-window {
            background: #0a0f1e;
            border: 1px solid #00ffff;
            width: 90%;
            max-width: 500px;
            max-height: 70vh;
            padding: 30px;
            border-radius: 10px;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        .modal-window h2 {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .modal-window p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 15px;
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            color: #ff3366;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        /* Footer */
        .footer-banner {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; 
            background: rgba(10, 15, 30, 0.9);
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 20; overflow: hidden; 
        }
        .footer-text-container { display: flex; flex-direction: column; animation: bannerWipe 8s infinite cubic-bezier(0.65, 0, 0.35, 1); }
        .footer-text { height: 50px; display: flex; justify-content: center; align-items: center; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 2px; color: #a0c4ff; text-align: center; }
        .highlight-text { color: #00ffff; font-weight: 700; text-shadow: 0 0 5px #00ffff; }

        @keyframes bannerWipe {
            0%, 40% { transform: translateY(0); } 
            45%, 85% { transform: translateY(-50px); } 
            90%, 100% { transform: translateY(-100px); } 
        }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <canvas id="space-canvas"></canvas>

    <div id="ui-layer">
        <div class="logo-container">
            <img src="./images/vanguardorglogo.png" alt="Vanguard Organization Logo">
        </div>

        <div class="menu-carousel">
            <button id="btn-up" class="nav-arrow" aria-label="Previous">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </button>
            
            <div class="menu-display">
                <a href="#" id="current-menu-item">About The Vanguard</a>
            </div>

            <button id="btn-down" class="nav-arrow" aria-label="Next">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
        </div>

        <div class="legal-mini-links">
            <span class="legal-link" onclick="openModal('privacy')">Privacy Policy</span>
            <span class="legal-link" onclick="openModal('terms')">Terms of Use</span>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">[X]</span>
            <div id="modal-content">
                </div>
        </div>
    </div>

    <div class="footer-banner">
        <div class="footer-text-container">
            <div class="footer-text">&copy; 2026 Vanguard Citizen Services</div>
            <div class="footer-text highlight-text">Empower . Educate . Elevate</div>
            <div class="footer-text">&copy; 2026 Vanguard Citizen Services</div>
        </div>
    </div>

    <script src="force-refresh.js"></script>

    <script>
        // Menu Data
        const menuItems = [
            { text: "About The Vanguard", link: "about.html" },
            { text: "Our Team", link: "team.html" },
            { text: "Contact Us", link: "contact.html" }
        ];

        // Policy Content - REPLACE TEXT BELOW
        const policyText = {
            privacy: `
                <h2>Privacy Policy</h2>
                <p>Vanguard Citizen Services respects your digital footprint. As a citizen of Musubi, your data is shielded by Vanguard encryption protocols.</p>
                <p>We do not sell your data to entropic forces or third-party conglomerates.</p>
            `,
            terms: `
                <h2>Terms of Use</h2>
                <p>By entering Project V, you agree to the Vanguard Academy Code of Conduct.</p>
                <p>Users must defend Musubi against Thanvir and report all entropic anomalies immediately.</p>
            `
        };

        let currentIndex = 0;
        const currentMenuItem = document.getElementById('current-menu-item');
        const overlay = document.getElementById('fade-overlay');
        const uiLayer = document.getElementById('ui-layer');

        // Initial Fade In
        window.onload = () => { overlay.style.opacity = '0'; };

        // Handle Menu Clicks (Fade Out)
        currentMenuItem.addEventListener('click', (e) => {
            e.preventDefault();
            const target = currentMenuItem.getAttribute('href');
            if (target === "#") return;

            overlay.style.transition = "opacity 0.5s ease-in";
            overlay.style.opacity = '1';
            
            setTimeout(() => {
                window.location.href = target;
            }, 600);
        });

        // Carousel Logic
        let isAnimating = false;
        function cycleMenu(direction) {
            if (isAnimating) return;
            isAnimating = true;
            const exit = direction === 'up' ? 'slide-out-up' : 'slide-out-down';
            const enter = direction === 'up' ? 'slide-in-up' : 'slide-in-down';
            currentMenuItem.classList.add(exit);
            setTimeout(() => {
                currentIndex = direction === 'up' ? (currentIndex - 1 + menuItems.length) % menuItems.length : (currentIndex + 1) % menuItems.length;
                currentMenuItem.textContent = menuItems[currentIndex].text;
                currentMenuItem.href = menuItems[currentIndex].link;
                currentMenuItem.classList.remove(exit);
                currentMenuItem.classList.add(enter);
                setTimeout(() => { currentMenuItem.classList.remove(enter); isAnimating = false; }, 300);
            }, 300);
        }

        document.getElementById('btn-up').addEventListener('click', () => cycleMenu('up'));
        document.getElementById('btn-down').addEventListener('click', () => cycleMenu('down'));

        // Modal Logic
        function openModal(type) {
            document.getElementById('modal-content').innerHTML = policyText[type];
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Space Background Logic
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 400; i++) stars.push({
                x: (Math.random() - 0.5) * width,
                y: (Math.random() - 0.5) * height,
                z: Math.random() * width,
                pz: 0
            });
        }
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, width, height);
            stars.forEach(s => {
                s.z -= 4;
                if (s.z < 1) s.z = width;
                let sx = (s.x / s.z) * width + width/2;
                let sy = (s.y / s.z) * height + height/2;
                let r = (1 - s.z / width) * 2;
                ctx.beginPath();
                ctx.fillStyle = "white";
                ctx.arc(sx, sy, r, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
