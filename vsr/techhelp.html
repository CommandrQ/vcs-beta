<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Consumer Consulting</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <!-- Pathing back to your root CSS -->
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* Persona Grid */
        .persona-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .persona-btn {
            background: rgba(15,15,15,0.9);
            border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.7);
            padding: 20px 10px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s var(--v-curve);
        }

        .persona-btn:hover { border-color: rgba(212, 175, 55, 0.5); }
        .persona-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }

        .price-tag { font-size: 1.5rem; color: var(--gold); font-weight: 900; margin: 15px 0; }
        
        .service-features {
            list-style: none; padding: 0; margin: 20px 0;
            text-align: left; border-top: 1px solid var(--glass-border); padding-top: 15px;
        }

        .service-features li {
            font-size: 0.9rem; margin-bottom: 10px;
            color: rgba(255,255,255,0.7);
            display: flex; align-items: flex-start; gap: 10px;
        }
        .service-features li::before { content: '•'; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper">

        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h1>Tech Lab</h1>
                <a href="../hub.html" class="back-btn">HUB →</a>
            </div>
        </header>

        <section id="directory-core" style="flex-grow: 1; overflow-y: auto;">
            <div id="directory-list" style="padding: 20px;">
                
                <h3 class="card-title" style="text-align: center; margin-bottom: 20px; font-size: 1rem;">Identify Your Identity</h3>
                
                <!-- The Identity Selection -->
                <div class="persona-grid" id="persona-controls">
                    <button class="persona-btn active" onclick="loadPersona('senior')">The Senior</button>
                    <button class="persona-btn" onclick="loadPersona('parent')">The Parent</button>
                    <button class="persona-btn" onclick="loadPersona('student')">The Student</button>
                    <button class="persona-btn" onclick="loadPersona('gamer')">The Gamer</button>
                    <button class="persona-btn" onclick="window.location.href='commercial.html'" style="border-color: #4ade80; color: #4ade80;">Commercial →</button>
                </div>

                <!-- Dynamic Packages Inject Here -->
                <div id="packages-container"></div>

            </div>
        </section>

    </main>

    <script>
        // Data Structure for Hardin County Adjusted Rates
        const packageData = {
            senior: [
                {
                    title: "Basic Diagnostic",
                    desc: "Quick troubleshooting for frozen devices, password resets, or checking a suspicious message.",
                    price: "$20 flat",
                    features: ["15-30 Minute Session", "Password & Account Recovery", "Scam / Phishing Verification"]
                },
                {
                    title: "The Golden Protocol",
                    desc: "A comprehensive hour of patience. We set up your device to be easy, readable, and highly secure.",
                    price: "$50 flat",
                    features: ["60 Minute Deep-Dive", "Text size & visibility tuning", "Video call mastery", "Security lockdown"]
                }
            ],
            parent: [
                {
                    title: "Basic Setup",
                    desc: "Quickly lock down a single device or check your current router safety.",
                    price: "$30 flat",
                    features: ["15-30 Minute Session", "Single-device content filter", "Quick safety Q&A"]
                },
                {
                    title: "The Digital Household",
                    desc: "Whole-house network sweep and comprehensive family digital boundaries.",
                    price: "$75 flat",
                    features: ["60-90 Minute Strategy", "Network-wide safety sweep", "Screen-time automation", "Microsoft Family Safety setup"]
                }
            ],
            student: [
                {
                    title: "Basic Unblock",
                    desc: "Affordable triage for campus network issues or software formatting bugs.",
                    price: "$20 flat",
                    features: ["15-30 Minute Session", "Software / Formatting fixes", "Campus Wi-Fi routing"]
                },
                {
                    title: "The Scholar Uplink",
                    desc: "Deep workflow optimization to keep you focused and prevent data loss.",
                    price: "$45 flat",
                    features: ["60 Minute Session", "Automated cloud backups", "Workflow optimization", "Hardware lifespan extension"]
                }
            ],
            gamer: [
                {
                    title: "Basic Diagnostic",
                    desc: "Quick checks for latency, ping drops, or Discord routing issues.",
                    price: "$35 flat",
                    features: ["30 Minute Check", "Ping / Latency diagnostics", "Discord / Comm setup"]
                },
                {
                    title: "The Competitor's Edge",
                    desc: "Advanced hardware and OS optimization for maximum frame rates and zero latency.",
                    price: "$85 flat",
                    features: ["60-90 Minute Deep-Dive", "OS stripping for max FPS", "Stream-lab configuration", "Deep network optimization"]
                }
            ]
        };

        function loadPersona(type) {
            // Update Active Button Style
            document.querySelectorAll('.persona-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Render the cards
            const container = document.getElementById('packages-container');
            const data = packageData[type];
            
            container.innerHTML = data.map(pkg => `
                <div class="link-card" style="animation: fadeUp 0.4s ease;">
                    <h3 class="card-title">${pkg.title}</h3>
                    <p class="card-desc">${pkg.desc}</p>
                    <div class="price-tag">${pkg.price}</div>
                    <ul class="service-features">
                        ${pkg.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <a href="../support.html" class="gate-button" style="display: block; text-decoration: none; padding: 15px !important; margin-top: 10px;">Select</a>
                </div>
            `).join('');
        }

        // Add a simple fade-up animation to the CSS dynamically
        const style = document.createElement('style');
        style.innerHTML = `@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }`;
        document.head.appendChild(style);

        // Auto-load Senior on boot
        document.addEventListener('DOMContentLoaded', () => loadPersona('senior'));
    </script>
</body>
</html>
