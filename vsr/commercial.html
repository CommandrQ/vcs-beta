<!-- Replace the JS and Modal section in commercial.html with this logic -->
<script>
    let selectedItem = "";
    function openModal(item) { selectedItem = item; document.getElementById('service-modal').style.display = 'flex'; showStep1(); }
    function closeModal() { document.getElementById('service-modal').style.display = 'none'; }
    function showStep1() { document.getElementById('step-agreement').style.display = 'block'; document.getElementById('step-details').style.display = 'none'; }
    function showStep2() { document.getElementById('step-agreement').style.display = 'none'; document.getElementById('step-details').style.display = 'block'; }

    function generateDraft() {
        const name = document.getElementById('req-name').value;
        const email = document.getElementById('req-email').value;
        const phone = document.getElementById('req-phone').value;
        const addr = document.getElementById('req-address').value;
        const msg = document.getElementById('req-message').value;

        if(!name || !email || !phone || !addr) return alert("All fields are required for commercial requests.");

        const subject = `[COMMERCIAL UPLINK] ${selectedItem} - ${name}`;
        const body = `COMMERCIAL IDENTITY:\nOrganization/Name: ${name}\nEmail: ${email}\nPhone: ${phone}\n\nSERVICE ADDRESS:\n${addr}\n\nPACKAGE REQUESTED:\n${selectedItem}\n\nMESSAGE:\n${msg}`;

        window.location.href = `mailto:commandrq@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
</script>
