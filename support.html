<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Support Terminal</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* --- TERMINAL SPECIFIC OVERRIDES --- */
        #directory-core {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .support-card {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            animation: terminalFade 0.6s var(--v-curve) forwards;
        }

        .instruction-box {
            background: rgba(212, 175, 55, 0.05);
            border: 1px dashed var(--dark-gold);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .instruction-box p {
            margin: 0;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
        }

        /* --- UPLINK FORM --- */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            width: 100%;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.6);
        }

        textarea.form-input {
            min-height: 120px;
            resize: none;
        }

        select.form-input {
            cursor: pointer;
        }

        /* --- SLOW FILL SUBMIT --- */
        .uplink-btn {
            position: relative;
            width: 100%;
            padding: 18px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            background: transparent;
            border: 1px solid var(--gold);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            transition: color 0.8s ease;
            z-index: 1;
        }

        .uplink-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 100%;
            background: var(--gold);
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .uplink-btn:hover::before {
            width: 100%;
        }

        .uplink-btn:hover {
            color: #000;
        }

        #sys-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

    <!-- LAYER 1: Deep Canvas -->
    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <!-- LAYER 2: App Wrapper -->
    <main id="app-wrapper">

        <!-- HEADER -->
        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status">
                <a href="hub.html" class="back-btn">← BACK TO HUB</a>
                <h1 id="user-greeting">Support Terminal</h1>
            </div>
        </header>

        <!-- CORE TERMINAL -->
        <section id="directory-core">
            <div class="support-card">
                
                <div class="instruction-box">
                    <p><strong>UPLINK PROTOCOL:</strong> Fill out the form below. Reviewing the draft will initialize your local email client. Ensure your message is complete before transmission.</p>
                </div>

                <!-- CATEGORY -->
                <div class="form-group">
                    <label>Inquiry Type</label>
                    <select id="f-category" class="form-input">
                        <option value="Technical Uplink">Technical Support</option>
                        <option value="Mastery Guidance">Mastery Guidance</option>
                        <option value="Guild Inquiry">Guild Inquiry</option>
                        <option value="General Comms">General Communications</option>
                    </select>
                </div>

                <!-- NAME -->
                <div class="form-group">
                    <label>Citizen Identity</label>
                    <input type="text" id="f-name" class="form-input" placeholder="Name Loading...">
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label>Return Frequency (Email)</label>
                    <input type="email" id="f-email" class="form-input" placeholder="Frequency Loading...">
                </div>

                <!-- MESSAGE -->
                <div class="form-group">
                    <label>The Message</label>
                    <textarea id="f-msg" class="form-input" placeholder="Transmission details..."></textarea>
                </div>

                <button class="uplink-btn" onclick="compileDraft()">Initialize Uplink</button>

                <div id="sys-msg"></div>

            </div>
        </section>

        <!-- FOOTER -->
        <footer id="bottom-glass-panel" class="glass-module">
            <div class="footer-container">
                <p id="footer-msg-1" class="footer-msg active">Vanguard Citizen Services &copy; <span id="current-year"></span></p>
                <p id="footer-msg-2" class="footer-msg">Direct Uplink Enabled</p>
            </div>
        </footer>

    </main>

    <script src="app.js"></script>
    <script>
        // --- AUTO-POPULATE IDENTITY ---
        document.addEventListener('DOMContentLoaded', () => {
            const cached = JSON.parse(localStorage.getItem('vanguard_profile'));
            if (cached) {
                if (cached.name) document.getElementById('f-name').value = cached.name;
                if (cached.email) document.getElementById('f-email').value = cached.email;
            }
        });

        // --- MAILTO COMPILER ---
        function compileDraft() {
            const category = document.getElementById('f-category').value;
            const name = document.getElementById('f-name').value.trim();
            const email = document.getElementById('f-email').value.trim();
            const msgText = document.getElementById('f-msg').value.trim();
            const sysMsg = document.getElementById('sys-msg');

            if (!name || !msgText) {
                sysMsg.innerText = "Error: Citizen ID or Message missing.";
                sysMsg.style.color = "#ff4d4d";
                return;
            }

            sysMsg.innerText = "Uplink Established. Opening client...";
            sysMsg.style.color = "var(--gold)";

            const destination = "support@vcscitizen.org";
            const subject = encodeURIComponent(`[${category}] Uplink from ${name}`);
            
            const body = encodeURIComponent(
`CITIZEN IDENTIFICATION:
-------------------------
NAME: ${name}
RETURN FREQUENCY: ${email || "NOT PROVIDED"}
CATEGORY: ${category}

MESSAGE TRANSCRIPTION:
-------------------------
${msgText}

-------------------------
VANGUARD SECURE TRANSITION`
            );

            setTimeout(() => {
                window.location.href = `mailto:${destination}?subject=${subject}&body=${body}`;
                sysMsg.innerText = "Uplink successful. Transmission drafted.";
                sysMsg.style.color = "#4ade80";
            }, 600);
        }
    </script>
</body>
</html>
