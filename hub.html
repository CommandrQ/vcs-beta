<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Central Hub</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        #category-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        #category-bar::-webkit-scrollbar {
            display: none;
        }
        
        .cat-btn {
            background: rgba(15,15,15,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .cat-btn.active {
            border-color: #D4AF37;
            color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper" style="display: flex; flex-direction: column; height: 100vh;">
        <header id="top-glass-panel" style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h1 id="user-greeting" style="font-size: 1.2rem; color: #fff; margin: 0;">Welcome</h1>
                <a href="settings.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 8px;">⚙️ SETTINGS</a>
            </div>
        </header>

        <section id="directory-core" style="flex-grow: 1; overflow-y: auto; padding: 25px;">
            <nav id="category-bar"></nav>
            <div id="directory-list"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
