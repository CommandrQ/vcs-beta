<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Fort Toward Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --solid-black: #000000;
            --deep-gray: #111111;
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- FOUNDATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            background: #000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- THE GOLDEN STARFIELD --- */
        #vanguard-universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Lowest layer */
            background: #000;
            overflow: hidden;
        }

        .star-engine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 50px 80px, var(--gold), transparent),
                radial-gradient(1.5px 1.5px at 200px 300px, #ffffff, transparent),
                radial-gradient(2px 2px at 400px 150px, var(--gold), transparent),
                radial-gradient(1.2px 1.2px at 600px 450px, #ffffff, transparent);
            background-size: 600px 600px;
            animation: star-drift 180s linear infinite;
            opacity: 0.9;
        }

        @keyframes star-drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- THE INTERFACE (CENTERED) --- */
        #app-wrapper {
            position: relative;
            z-index: 10; /* Above the stars */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            background: transparent; /* Allows stars to show */
        }

        header {
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #user-greeting {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffffff;
            animation: white-pulse 4s infinite ease-in-out;
        }

        .config-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #ffffff;
            padding: 10px 20px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .config-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* --- NAVIGATION --- */
        #category-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            width: 90%;
        }

        .cat-btn {
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 12px 25px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
        }

        .cat-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* --- SOLID SERVICE WINDOWS --- */
        #directory-list {
            flex-grow: 1;
            width: 90%;
            max-width: 500px;
            overflow-y: auto;
            padding-bottom: 60px;
            scrollbar-width: none;
        }

        #directory-list::-webkit-scrollbar { display: none; }

        .service-window {
            background: #000000; /* Solid Background */
            border: 1px solid #222222;
            padding: 45px 30px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-radius: 2px;
        }

        .window-title {
            color: var(--gold);
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            animation: gold-glow 3s infinite ease-in-out;
        }

        .window-desc {
            color: #ffffff;
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .access-btn {
            width: 100%;
            max-width: 220px;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .access-btn:hover {
            background: var(--gold);
            color: #000;
        }

        /* --- FOOTER --- */
        footer {
            width: 100%;
            padding: 25px;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
            border-top: 1px solid #222222;
            background: #000;
        }

        /* --- ANIMATIONS --- */
        @keyframes white-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes gold-glow {
            0%, 100% { text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
            50% { text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); }
        }
    </style>
</head>
<body>

    <!-- Unified Star Engine -->
    <div id="vanguard-universe">
        <div class="star-engine"></div>
    </div>

    <!-- Interface Wrapper -->
    <main id="app-wrapper">
        <header>
            <h1 id="user-greeting">Welcome, Citizen</h1>
            <a href="settings.html" class="config-btn">⚙️ Config Terminal</a>
        </header>

        <nav id="category-bar"></nav>

        <section id="directory-list"></section>

        <footer>
            Vanguard Citizen Services &copy; <span id="year"></span>
        </footer>
    </main>

    <script>
        const HUB_CONTENT = {
            "Tech Lab": [
                { title: "Consulting", desc: "Expert strategy and support sessions for system health and digital security.", url: "vsr/techhelp.html" }
            ],
            "System": [
                { title: "Mission", desc: "Our history and commitment to the citizens of Hardin County.", url: "about.html" },
                { title: "Support", desc: "Connect with our team for technical inquiries and uplink assistance.", url: "support.html" }
            ]
        };

        const supabaseUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const supabaseKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let activeCat = Object.keys(HUB_CONTENT)[0];

        function renderHub(cat = activeCat) {
            activeCat = cat;
            
            const nav = document.getElementById('category-bar');
            nav.innerHTML = Object.keys(HUB_CONTENT).map(c => `
                <button class="cat-btn ${c === activeCat ? 'active' : ''}" onclick="renderHub('${c}')">${c}</button>
            `).join('');

            const list = document.getElementById('directory-list');
            list.innerHTML = HUB_CONTENT[activeCat].map(item => `
                <div class="service-window">
                    <h2 class="window-title">${item.title}</h2>
                    <p class="window-desc">${item.desc}</p>
                    <a href="${item.url}" class="access-btn">Open Uplink</a>
                </div>
            `).join('');
        }

        async function updateCitizenGreeting() {
            const el = document.getElementById('user-greeting');
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                const { data: profile } = await supabaseClient
                    .from('citizens')
                    .select('full_name')
                    .eq('id', user.id)
                    .single();

                el.innerText = `Welcome, ${profile?.full_name || "Citizen"}`;
            } else {
                el.innerText = "Welcome, Citizen";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            updateCitizenGreeting();
            renderHub();
        });
    </script>
</body>
</html>
