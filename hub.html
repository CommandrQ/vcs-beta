<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Central Hub</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Navigation Tabs */
        #category-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        #category-bar::-webkit-scrollbar {
            display: none;
        }
        
        .cat-btn {
            background: rgba(15,15,15,0.9);
            border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.6);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            transition: all 0.3s var(--v-curve);
        }

        .cat-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* Toast Notification */
        #login-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #4ade80;
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.5s var(--v-curve);
            z-index: 2000;
        }

        #login-toast.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper">
        <header id="top-glass-panel" class="glass-module">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h1 id="user-greeting" style="font-size: 1.2rem; color: #fff; margin: 0;">Welcome</h1>
                <!-- Dedicated Settings Button -->
                <a href="settings.html" class="back-btn" style="border-color: var(--glass-border); color: rgba(255,255,255,0.7);">⚙️ SETTINGS</a>
            </div>
        </header>

        <section id="directory-core" style="flex-grow: 1; overflow-y: auto; padding: 25px;">
            
            <!-- Category Navigation -->
            <nav id="category-bar"></nav>

            <!-- Link Directory -->
            <div id="directory-list"></div>

        </section>

        <footer id="bottom-nav-bar" class="glass-module">
            <div style="font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">
                Vanguard Citizen Services &copy; <span id="current-year"></span>
            </div>
        </footer>
    </main>

    <div id="login-toast"></div>

    <script src="app.js"></script>
</body>
</html>
