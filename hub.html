<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Terminal Hub</title>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.15);
        }

        /* --- BASIC SETUP --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- THE GOLDEN STARS --- */
        #vanguard-stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        .star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 40px 60px, var(--gold), transparent),
                radial-gradient(1.5px 1.5px at 150px 200px, var(--white), transparent);
            background-size: 400px 400px;
            animation: rotate-stars 240s linear infinite;
        }

        @keyframes rotate-stars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- MAIN WRAPPER --- */
        #app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            background: transparent;
        }

        header {
            width: 90%;
            max-width: 600px;
            padding: 30px;
            margin-top: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--gold);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Update: Account settings text is now full white */
        header a {
            color: var(--white); 
            font-size: 0.6rem; 
            text-decoration: none; 
            margin-top: 10px; 
            display: inline-block; 
            opacity: 1; /* Removed transparency */
            letter-spacing: 1px;
        }

        /* --- CENTERED SWIPE BAR --- */
        #category-bar {
            display: flex;
            justify-content: center; 
            gap: 12px;
            padding: 20px 40px; 
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        #category-bar::-webkit-scrollbar { display: none; }

        @media (max-width: 600px) {
            #category-bar {
                justify-content: flex-start;
            }
        }

        .cat-btn {
            flex-shrink: 0;
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            padding: 10px 20px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* --- DIRECTORY LIST --- */
        #directory-list {
            flex-grow: 1;
            width: 90%;
            max-width: 550px;
            overflow-y: auto;
            padding-bottom: 60px;
            scrollbar-width: none;
        }
        #directory-list::-webkit-scrollbar { display: none; }

        .service-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 25px 20px; /* Update: Shortened height by reducing padding */
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .card-title { color: var(--gold); font-size: 1.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .card-desc { font-size: 0.9rem; margin-bottom: 20px; line-height: 1.5; }
        
        .action-link {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .action-link:hover { background: var(--gold); color: #000; }

        /* --- DESKTOP SPECIFIC UPDATES --- */
        @media (min-width: 1024px) {
            .action-link {
                padding: 15px 60px; /* Wider buttons */
                font-size: 1rem;    /* Slightly larger font */
            }
        }

        footer {
            width: 100%;
            padding: 20px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div id="vanguard-stars"><div class="star-layer"></div></div>

    <main id="app-wrapper">
        <header>
            <h1 id="user-greeting">Welcome, Citizen</h1>
            <a href="settings.html">⚙️ ACCOUNT SETTINGS</a>
        </header>

        <nav id="category-bar"></nav>

        <section id="directory-list"></section>

        <footer>Vanguard &copy; <span id="year"></span></footer>
    </main>

    <script>
        const vanguardHub = supabase.createClient(
            'https://dvyjupytbwbrcoyouxpf.supabase.co', 
            'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk'
        );

        let hubData = {};
        let activeCat = "";

        async function loadContent() {
            try {
                const response = await fetch('directory.json');
                hubData = await response.json();
                activeCat = Object.keys(hubData)[0];
                render();
            } catch (err) { console.error(err); }
        }

        function render() {
            const nav = document.getElementById('category-bar');
            nav.innerHTML = Object.keys(hubData).map(cat => `
                <button class="cat-btn ${cat === activeCat ? 'active' : ''}" 
                        onclick="switchCat('${cat}')">${cat}</button>
            `).join('');

            const list = document.getElementById('directory-list');
            list.innerHTML = hubData[activeCat].map(item => `
                <div class="service-card">
                    <h2 class="card-title">${item.title}</h2>
                    <p class="card-desc">${item.desc}</p>
                    <a href="${item.url}" class="action-link">Open</a>
                </div>
            `).join('');
        }

        function switchCat(cat) { activeCat = cat; render(); }

        async function fetchName() {
            const { data: { user } } = await vanguardHub.auth.getUser();
            if (user) {
                const { data: profile } = await vanguardHub
                    .from('citizens')
                    .select('full_name')
                    .ilike('email', user.email)
                    .single();

                if (profile) {
                    document.getElementById('user-greeting').innerText = `Welcome, ${profile.full_name}`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            loadContent();
            fetchName();
        });
    </script>
</body>
</html>
