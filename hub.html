<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --solid-black: #080808;
            --window-border: #222222;
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- BASE RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            background-color: #000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- THE ANIMATED GOLDEN STARFIELD --- */
        /* Fixed visibility issues by ensuring explicit dimensions and z-indexing */
        #vanguard-universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: black;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 40px 60px, var(--gold), transparent),
                radial-gradient(1.5px 1.5px at 150px 200px, #ffffff, transparent),
                radial-gradient(2.5px 2.5px at 300px 100px, var(--gold), transparent),
                radial-gradient(1px 1px at 400px 350px, #ffffff, transparent);
            background-size: 500px 500px;
            animation: orbital-drift 200s linear infinite;
        }

        @keyframes orbital-drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- LAYOUT ENGINE (CENTERED) --- */
        #app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        header {
            width: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 900;
            animation: pulse-white 4s ease-in-out infinite;
        }

        .settings-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            border: 1px solid #ffffff;
            padding: 8px 16px;
            border-radius: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .settings-link:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* --- NAVIGATION --- */
        #category-bar {
            display: flex;
            gap: 10px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .cat-btn {
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 10px 20px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* --- SOLID SERVICE WINDOWS --- */
        #directory-list {
            flex-grow: 1;
            width: 90%;
            max-width: 500px;
            overflow-y: auto;
            padding-bottom: 50px;
            scrollbar-width: none;
        }

        #directory-list::-webkit-scrollbar { display: none; }

        .link-card {
            background: var(--solid-black); /* Solid Background Fix */
            border: 2px solid var(--window-border);
            padding: 40px 25px;
            margin-bottom: 25px;
            border-radius: 4px; /* Hardened edges for a professional look */
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: border-color 0.4s;
        }

        .link-card:hover {
            border-color: var(--gold);
        }

        .card-title {
            color: var(--gold);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .card-desc {
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .action-btn {
            width: 100%;
            max-width: 250px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: var(--gold);
            color: #000000;
        }

        /* --- FOOTER --- */
        footer {
            width: 100%;
            padding: 20px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: #000;
            border-top: 1px solid var(--window-border);
        }

        @keyframes pulse-white {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div id="vanguard-universe">
        <div class="stars"></div>
    </div>

    <main id="app-wrapper">
        <header>
            <h1 id="user-greeting">Welcome, Citizen</h1>
            <a href="settings.html" class="settings-link">⚙️ Terminal Config</a>
        </header>

        <nav id="category-bar"></nav>

        <section id="directory-list"></section>

        <footer>
            Vanguard Citizen Services &copy; <span id="year"></span>
        </footer>
    </main>

    <script>
        /* --- DIRECTORY DATA --- */
        const HUB_DATA = {
            "Tech Lab": [
                { title: "Consulting", desc: "Expert strategy and support sessions for system health and digital security.", url: "vsr/techhelp.html" }
            ],
            "System": [
                { title: "Mission", desc: "Our history and commitment to the citizens of Hardin County.", url: "about.html" },
                { title: "Support", desc: "Connect with our team for technical inquiries.", url: "support.html" }
            ]
        };

        /* --- SUPABASE --- */
        const supabaseUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const supabaseKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentCat = Object.keys(HUB_DATA)[0];

        /* --- ENGINE --- */
        function render(cat = currentCat) {
            currentCat = cat;
            
            const nav = document.getElementById('category-bar');
            nav.innerHTML = Object.keys(HUB_DATA).map(c => `
                <button class="cat-btn ${c === currentCat ? 'active' : ''}" onclick="render('${c}')">${c}</button>
            `).join('');

            const list = document.getElementById('directory-list');
            list.innerHTML = HUB_DATA[currentCat].map(item => `
                <div class="link-card">
                    <h2 class="card-title">${item.title}</h2>
                    <p class="card-desc">${item.desc}</p>
                    <a href="${item.url}" class="action-btn">Initialize Access</a>
                </div>
            `).join('');
        }

        async function bootGreeting() {
            const el = document.getElementById('user-greeting');
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                // Query the citizens table for full_name
                const { data: profile } = await supabaseClient
                    .from('citizens')
                    .select('full_name')
                    .eq('id', user.id)
                    .single();

                el.innerText = `Welcome, ${profile?.full_name || "Citizen"}`;
            } else {
                el.innerText = "Welcome, Citizen";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            bootGreeting();
            render();
        });
    </script>
</body>
</html>
