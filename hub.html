<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Terminal Hub</title>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.15);
        }

        /* --- BASIC SETUP --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- THE GOLDEN STARS --- */
        #vanguard-stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        .star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 40px 60px, var(--gold), transparent),
                radial-gradient(1.5px 1.5px at 150px 200px, var(--white), transparent);
            background-size: 400px 400px;
            animation: rotate-stars 240s linear infinite;
        }

        @keyframes rotate-stars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- MAIN WRAPPER --- */
        #app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            background: transparent;
        }

        header {
            width: 90%;
            max-width: 800px;
            padding: 30px;
            margin-top: 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--gold);
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- SWIPE-READY CATEGORY BAR --- */
        #category-bar {
            display: flex;
            justify-content: flex-start; /* Aligns items to the left to start scroll */
            gap: 15px;
            padding: 25px 5%; /* Padding on sides helps the "swipe" feel better */
            width: 100%;
            overflow-x: auto; /* The scroll magic */
            white-space: nowrap; /* Keeps everything on one line */
            scrollbar-width: none; /* Hides scrollbar on Firefox */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        #category-bar::-webkit-scrollbar {
            display: none; /* Hides scrollbar on Chrome/Safari */
        }

        .cat-btn {
            flex-shrink: 0; /* CRITICAL: Prevents buttons from squishing */
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            padding: 12px 25px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* --- SERVICE CARDS --- */
        #directory-list {
            flex-grow: 1;
            width: 90%;
            max-width: 550px;
            overflow-y: auto;
            padding-bottom: 80px;
            scrollbar-width: none;
        }
        #directory-list::-webkit-scrollbar { display: none; }

        .service-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 45px 25px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .card-title { color: var(--gold); font-size: 1.25rem; font-weight: 900; text-transform: uppercase; margin-bottom: 12px; }
        .card-desc { font-size: 0.95rem; margin-bottom: 30px; line-height: 1.7; opacity: 0.9; }
        
        .action-link {
            display: inline-block;
            padding: 14px 35px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .action-link:hover { background: var(--gold); color: #000; }

        footer {
            width: 100%;
            padding: 25px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div id="vanguard-stars"><div class="star-layer"></div></div>

    <main id="app-wrapper">
        <header>
            <h1 id="user-greeting">Welcome, Citizen</h1>
            <a href="settings.html" style="color: var(--white); font-size: 0.65rem; text-decoration: none; margin-top: 12px; display: inline-block; opacity: 0.5; letter-spacing: 2px;">⚙️ ACCOUNT CONFIG</a>
        </header>

        <nav id="category-bar"></nav>

        <section id="directory-list"></section>

        <footer>Vanguard &copy; <span id="year"></span></footer>
    </main>

    <script>
        // Database Connection
        const vanguardHub = supabase.createClient(
            'https://dvyjupytbwbrcoyouxpf.supabase.co', 
            'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk'
        );

        let hubData = {};
        let activeCat = "";

        // 1. CONTENT LOADING
        async function loadDirectory() {
            try {
                const response = await fetch('directory.json');
                hubData = await response.json();
                activeCat = Object.keys(hubData)[0];
                renderUI();
            } catch (err) { console.error("Data Load Error:", err); }
        }

        function renderUI() {
            // Render Categories (Horizontal Bar)
            const nav = document.getElementById('category-bar');
            nav.innerHTML = Object.keys(hubData).map(cat => `
                <button class="cat-btn ${cat === activeCat ? 'active' : ''}" 
                        onclick="updateActiveCategory('${cat}')">${cat}</button>
            `).join('');

            // Render Service Cards
            const list = document.getElementById('directory-list');
            list.innerHTML = hubData[activeCat].map(item => `
                <div class="service-card">
                    <h2 class="card-title">${item.title}</h2>
                    <p class="card-desc">${item.desc}</p>
                    <a href="${item.url}" class="action-link">Access Terminal</a>
                </div>
            `).join('');
        }

        function updateActiveCategory(cat) { 
            activeCat = cat; 
            renderUI(); 
        }

        // 2. IDENTITY LOOKUP (Fixed)
        async function fetchIdentity() {
            const { data: { user } } = await vanguardHub.auth.getUser();

            if (user) {
                // Same Email-based lookup used in Settings
                const { data: profile } = await vanguardHub
                    .from('citizens')
                    .select('full_name')
                    .ilike('email', user.email)
                    .single();

                if (profile) {
                    document.getElementById('user-greeting').innerText = `Welcome, ${profile.full_name}`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            loadDirectory();
            fetchIdentity();
        });
    </script>
</body>
</html>
